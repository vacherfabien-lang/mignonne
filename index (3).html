<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mignonne — Saint-Malo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f4ede1;--sand-light:#faf6ee;--stone:#e8ddc8;
  --ink:#1d2b36;--ink-soft:#3a4a56;--slate:#6b7a85;
  --ocean:#2d5f7c;--ocean-deep:#1a4159;--coral:#c8553d;
  --line:rgba(29,43,54,.12);--line-strong:rgba(29,43,54,.22);
  --ferie-bg:rgba(200,85,61,.07);--ferie-dot:#c8553d;
  --vac-bg:rgba(45,95,124,.06);--vac-dot:#2d5f7c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--sand);color:var(--ink);line-height:1.5;min-height:100vh;
  background-image:radial-gradient(ellipse at top,rgba(45,95,124,.05),transparent 50%),radial-gradient(ellipse at bottom right,rgba(200,85,61,.04),transparent 60%);
  padding-top:env(safe-area-inset-top)}

/* ── STICKY HEADER ── */
.sticky-header{position:sticky;top:0;z-index:50;background:var(--sand);border-bottom:1px solid var(--line);transition:box-shadow .2s}
.sticky-header.scrolled{box-shadow:0 2px 12px rgba(29,43,54,.08)}
.header-top{padding:1rem 1rem .4rem;max-width:1200px;margin:0 auto;text-align:center}
.subtitle{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--slate);font-weight:500}
.title{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(1.9rem,6.5vw,3rem);letter-spacing:-.02em;color:var(--ink);font-style:italic;line-height:1;margin-top:.3rem}

/* ── ONGLETS ── */
.tabs{display:flex;justify-content:center;max-width:1200px;margin:.5rem auto 0;padding:0 1rem;border-top:1px solid var(--line)}
.tab{background:none;border:none;padding:.55rem .4rem;font-size:.78rem;font-weight:500;color:var(--slate);cursor:pointer;position:relative;flex:1;max-width:130px;font-family:'Inter',sans-serif;white-space:nowrap}
.tab.active{color:var(--ocean-deep)}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:2px;background:var(--coral)}

/* ── TOOLBAR ── */
.toolbar{max-width:1200px;margin:.75rem auto 0;padding:0 1rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap}
.btn-add{background:var(--ink);color:var(--sand-light);border:none;padding:.6rem 1.1rem;font-size:.82rem;font-weight:500;cursor:pointer;border-radius:3px;display:inline-flex;align-items:center;gap:.45rem;font-family:'Inter',sans-serif}
.btn-add:active{background:var(--ocean-deep)}
.btn-add .plus{font-size:1rem;line-height:1}
.status{font-size:.72rem;color:var(--slate);font-style:italic}

/* Toggles jours fériés / vacances */
.display-toggles{display:flex;gap:.4rem;flex-wrap:wrap;padding:.4rem 1rem;max-width:1200px;margin:0 auto}
.toggle-btn{background:none;border:1px solid var(--line-strong);padding:.22rem .7rem;border-radius:100px;font-size:.68rem;cursor:pointer;color:var(--ink-soft);font-family:'Inter',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:.3rem;transition:all .15s}
.toggle-btn .tbdot{width:7px;height:7px;border-radius:50%;display:inline-block}
.toggle-btn.on{color:var(--ink);border-color:var(--ink)}
.toggle-btn.on.ferie{background:rgba(200,85,61,.1);border-color:var(--coral);color:var(--coral)}
.toggle-btn.on.vac{background:rgba(45,95,124,.1);border-color:var(--ocean);color:var(--ocean)}
.zone-select{background:var(--sand-light);border:1px solid var(--line-strong);padding:.22rem .55rem;border-radius:100px;font-size:.68rem;font-family:'Inter',sans-serif;color:var(--ink-soft);cursor:pointer;display:none}
.zone-select.show{display:inline-block}

/* ── BANDEAU DE SÉLECTION (sticky, corail, étapes 1/2 et 2/2) ── */
.select-hint{
  position:sticky;top:0;z-index:60;
  background:var(--coral);color:white;
  display:none;align-items:center;justify-content:space-between;gap:.6rem;
  padding:.55rem .9rem;font-family:'Inter',sans-serif;
  box-shadow:0 2px 10px rgba(200,85,61,.35);
  animation:slideDown .25s ease;
}
.select-hint.show{display:flex}
.select-hint .sh-step{
  background:rgba(255,255,255,.22);color:white;
  font-size:.62rem;font-weight:700;letter-spacing:.08em;
  padding:.18rem .55rem;border-radius:100px;flex-shrink:0;
}
.select-hint .sh-msg{
  flex:1;font-family:'Fraunces',serif;font-style:italic;
  font-size:.92rem;line-height:1.2;
}
.select-hint .sh-msg .sh-date{
  display:inline-block;background:rgba(255,255,255,.95);color:var(--coral);
  font-family:'Inter',sans-serif;font-style:normal;font-weight:600;
  padding:.05rem .4rem;border-radius:3px;margin-left:.3rem;font-size:.82rem;
}
.select-hint .sh-cancel{
  background:rgba(0,0,0,.18);color:white;border:none;
  padding:.32rem .75rem;border-radius:3px;font-size:.72rem;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;
}
.select-hint .sh-cancel:active{background:rgba(0,0,0,.32)}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* ── CELLULE ARRIVÉE : fond corail plein, texte blanc, label "ARRIVÉE" ── */
.cal-cell.is-arrival,
.big-day.is-arrival{
  background:var(--coral) !important;
  color:white !important;
}
.cal-cell.is-arrival .day-num-sm,
.big-day.is-arrival .big-day-num{
  color:white !important;font-weight:800;opacity:1;
}
.cal-cell.is-arrival .ferie-lbl,
.big-day.is-arrival .ferie-name{
  color:white !important;
}
.cal-cell.is-arrival::after{
  content:'ARRIVÉE';
  position:absolute;left:0;right:0;bottom:2px;
  text-align:center;
  color:white;font-size:.48rem;font-weight:800;letter-spacing:.06em;
  font-family:'Inter',sans-serif;
  pointer-events:none;
}
.big-day.is-arrival::after{
  content:'ARRIVÉE';
  position:absolute;left:0;right:0;bottom:3px;
  text-align:center;
  color:white;font-size:.6rem;font-weight:800;letter-spacing:.08em;
  font-family:'Inter',sans-serif;
  pointer-events:none;
}

/* ── VUES ── */
.view{max-width:1200px;margin:.8rem auto;padding:0 .75rem 4rem;display:none}
.view.active{display:block}

/* ══════════════════════
   VUE ANNÉE — cellules uniformes, bandes de séjour en overlay
   ══════════════════════ */
.year-nav{display:flex;justify-content:center;align-items:center;gap:1rem;margin-bottom:.75rem}
.nav-btn{background:none;border:1px solid var(--line-strong);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.05rem;color:var(--ink-soft);display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--ink);color:var(--sand)}
.year-lbl{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500;font-style:italic;min-width:80px;text-align:center}
.year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.month-card{background:var(--sand-light);border:1px solid var(--line);border-radius:5px;overflow:hidden}
.month-header{display:flex;justify-content:space-between;align-items:baseline;padding:.5rem .7rem .35rem;background:var(--stone);border-bottom:1px solid var(--line-strong)}
.month-name-lbl{font-family:'Fraunces',serif;font-size:.95rem;font-weight:500;color:var(--ink);text-transform:capitalize}
.month-nights{font-size:.63rem;color:var(--slate);font-style:italic;font-family:'Fraunces',serif}

/* Wrapper qui contient grille + overlay des bandes */
.cal-wrap{position:relative}

/* En-tête de calendrier (jours de la semaine) — hors grille pour éviter conflit */
.cal-head{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  background:var(--stone);
  border-bottom:1px solid var(--line-strong);
}
.cal-head-cell{
  font-size:.55rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--slate);text-align:center;
  padding:.3rem .1rem;
  border-right:1px solid var(--line);
}
.cal-head-cell:last-child{border-right:none}

/* Conteneur relatif autour de la grille pour l'overlay */
.cal-body-wrap{position:relative}

/* Grille des jours — toutes cellules 38px identiques */
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-auto-rows:38px;
  gap:0;
  position:relative;
}

/* Variante "grande" pour vue Mois : plus de place, cellules 70px */
.cal-grid.big{
  grid-auto-rows:70px;
}
.cal-grid.big + .cal-bands .cal-band{
  height:24px;
  font-size:.78rem;
}
.cal-grid.big ~ .cal-bands .cal-band{
  height:24px;
  font-size:.78rem;
}
/* Numéro plus grand en vue Mois */
.cal-grid.big .day-num-sm{
  font-size:.8rem;
  opacity:1;
  color:var(--ink-soft);
}
.cal-grid.big .cal-cell{padding:5px 7px}

/* Label du jour férié (visible uniquement en vue Mois grâce à la taille) */
.ferie-lbl{
  display:block;
  font-size:.58rem;
  color:var(--coral);
  font-style:italic;
  font-weight:400;
  margin-top:2px;
  line-height:1.1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.cal-grid:not(.big) .ferie-lbl{display:none} /* masquer en mini */

/* Cellule jour : propre, numéro en haut à gauche, fond uniforme */
.cal-cell{
  position:relative;
  background:white;
  cursor:pointer;user-select:none;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:3px 5px;
}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.empty{background:rgba(0,0,0,.02);cursor:default;pointer-events:none}
.cal-cell.is-ferie{background:var(--ferie-bg)}
.cal-cell.is-vac{background:var(--vac-bg)}
.cal-cell.is-ferie.is-vac{background:linear-gradient(135deg,var(--ferie-bg) 50%,var(--vac-bg) 50%)}
.cal-cell.today .day-num-sm{color:var(--coral);font-weight:800}

/* Numéro petit, en haut à gauche, discret */
.day-num-sm{
  font-size:.6rem;
  color:var(--slate);
  line-height:1;
  font-weight:500;
  opacity:.75;
  pointer-events:none;
}
.day-num-sm.ferie-mark{color:var(--coral);font-weight:700;opacity:1}

/* OVERLAY : les bandes de séjours, positionnées par-dessus la grille */
.cal-bands{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.cal-band{
  position:absolute;
  height:20px;
  border-radius:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 6px;
  color:white;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.01em;
  pointer-events:auto;
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  box-shadow:0 1px 2px rgba(0,0,0,.08);
  transition:transform .1s ease, box-shadow .1s ease;
}
.cal-band:hover{transform:translateY(-1px);box-shadow:0 2px 5px rgba(0,0,0,.12)}
.cal-band-continues-left{border-top-left-radius:0;border-bottom-left-radius:0}
.cal-band-continues-right{border-top-right-radius:0;border-bottom-right-radius:0}

/* Sélection visuelle */
.cal-cell.sel-start,.cal-cell.sel-end-hover{background:rgba(200,85,61,.15)!important}
.cal-cell.sel-range{background:rgba(200,85,61,.07)!important}

/* ── VUE MOIS ── */
.month-nav{display:flex;justify-content:center;align-items:center;gap:1rem;margin-bottom:1rem}
.current-month{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:500;font-style:italic;min-width:200px;text-align:center;text-transform:capitalize}
.big-cal{background:var(--sand-light);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.big-cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--stone)}
.big-cal-head div{padding:.42rem .2rem;text-align:center;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.big-cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.big-day{min-height:62px;padding:.28rem .28rem;border-right:1px solid var(--line);border-bottom:1px solid var(--line);cursor:pointer;user-select:none;position:relative;background:white}
.big-day.empty{background:rgba(0,0,0,.015);cursor:default;pointer-events:none}
.big-day:nth-child(7n){border-right:none}
.big-day.is-ferie{background:var(--ferie-bg)}
.big-day.is-vac{background:var(--vac-bg)}
.big-day-num{font-size:.76rem;color:var(--ink-soft);font-weight:500;display:flex;align-items:center;gap:3px}
.big-day-num .ferie-name{font-size:.58rem;color:var(--coral);font-style:italic;font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px}
.big-day.today .big-day-num{color:var(--coral);font-weight:700}
.big-day-booking{margin-top:3px;font-size:.62rem;padding:2px 5px;border-radius:2px;color:white;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.big-day.sel-start,.big-day.sel-end-hover{background:rgba(200,85,61,.15)!important}
.big-day.sel-range{background:rgba(200,85,61,.07)!important}
.legend{margin-top:1rem;padding:.8rem 1rem;background:var(--sand-light);border:1px solid var(--line);border-radius:4px}
.legend-title{font-family:'Fraunces',serif;font-size:.82rem;font-style:italic;color:var(--ink);margin-bottom:.45rem}
.legend-items{display:flex;flex-wrap:wrap;gap:.4rem .7rem}
.legend-item{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--ink-soft)}
.legend-dot{width:11px;height:11px;border-radius:2px}

/* ── LISTE ── */
.filter-bar{margin-bottom:.7rem;display:flex;gap:.3rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:.63rem;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;margin-right:.2rem;font-weight:600}
.chip{background:var(--sand-light);border:1px solid var(--line-strong);padding:.22rem .65rem;border-radius:100px;font-size:.7rem;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;gap:.3rem;font-family:'Inter',sans-serif}
.chip .dot{width:6px;height:6px;border-radius:50%}
.chip.active{background:var(--ink);color:var(--sand-light);border-color:var(--ink)}
.list-yr-head{font-family:'Fraunces',serif;font-size:.82rem;font-style:italic;color:var(--slate);margin:1rem 0 .4rem;padding-left:.2rem}
.list-yr-head:first-child{margin-top:.2rem}
.list-booking{background:var(--sand-light);border:1px solid var(--line);border-left:4px solid;border-radius:3px;padding:.75rem .95rem;margin-bottom:.45rem;display:grid;grid-template-columns:auto 1fr auto;gap:.85rem;align-items:center;cursor:pointer}
.list-booking.past{opacity:.52}
.list-date-range{font-family:'Fraunces',serif;font-size:.92rem;font-weight:500;color:var(--ink);font-style:italic}
.list-nights{font-size:.6rem;color:var(--slate);margin-top:2px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.list-info{min-width:0}
.list-name{font-weight:600;font-size:.9rem;color:var(--ink)}
.list-meta{font-size:.72rem;color:var(--slate);margin-top:1px}
.list-comment{font-size:.72rem;color:var(--ink-soft);margin-top:3px;font-style:italic}
.list-edit{font-size:.95rem;color:var(--slate);padding:.3rem}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--slate)}

/* ── HISTORIQUE ── */
.history-entry{background:var(--sand-light);border:1px solid var(--line);border-left:3px solid var(--slate);border-radius:3px;padding:.65rem .9rem;margin-bottom:.4rem}
.history-time{font-size:.62rem;color:var(--slate);margin-bottom:.18rem;font-weight:600;letter-spacing:.04em}
.history-action{font-size:.8rem;color:var(--ink)}
.history-detail{font-size:.72rem;color:var(--ink-soft);font-style:italic;margin-top:.1rem}
.history-who{display:inline-block;padding:.05rem .35rem;border-radius:2px;color:white;font-size:.65rem;font-weight:600;margin-right:.3rem;vertical-align:middle}

/* ── STATS ONGLET ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.stats-year-block{background:var(--sand-light);border:1px solid var(--line);border-radius:5px;padding:1.1rem 1rem}
.stats-year-title{font-family:'Fraunces',serif;font-size:1.3rem;font-style:italic;color:var(--ocean-deep);margin-bottom:.8rem;text-align:center}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:.4rem 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:.75rem;color:var(--ink-soft)}
.stat-row-val{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:500;color:var(--ink)}
.stat-row-val.record{color:var(--coral)}
.stats-people{margin-top:1rem}
.stats-people-title{font-family:'Fraunces',serif;font-size:.85rem;font-style:italic;color:var(--ink);margin-bottom:.6rem}
.people-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem}
.people-bar-wrap{flex:1;background:var(--stone);border-radius:100px;height:8px;overflow:hidden}
.people-bar{height:100%;border-radius:100px;transition:width .4s ease}
.people-label{font-size:.7rem;color:var(--ink-soft);min-width:90px}
.people-val{font-size:.72rem;color:var(--slate);min-width:50px;text-align:right}

/* ── VUE ZONES ── */
.zones-intro{
  font-family:'Fraunces',serif;
  font-size:.95rem;
  font-style:italic;
  color:var(--ink-soft);
  text-align:center;
  margin-bottom:1.2rem;
  padding:0 1rem;
}
.zones-map{
  display:flex;
  justify-content:center;
  margin:0 auto 1.5rem;
  max-width:500px;
}
.zones-map svg{width:100%;height:auto;display:block}
.zones-map .zA{fill:#c8553d;stroke:var(--sand);stroke-width:1.5;stroke-linejoin:round}
.zones-map .zB{fill:#b8862e;stroke:var(--sand);stroke-width:1.5;stroke-linejoin:round}
.zones-map .zC{fill:#8b4d3a;stroke:var(--sand);stroke-width:1.5;stroke-linejoin:round}
.zones-map .zCorse{fill:#a8927a;stroke:var(--sand);stroke-width:1.5;stroke-linejoin:round}
.zones-map .city-dot{fill:#1d2b36;stroke:white;stroke-width:1.5}
.zones-map .city-label{font-family:'Inter',sans-serif;font-size:11px;fill:#1d2b36;font-weight:600;paint-order:stroke;stroke:rgba(244,237,225,.85);stroke-width:3px;stroke-linejoin:round}
.zones-map .zone-letter{font-family:'Fraunces',serif;fill:white;font-weight:500;font-style:italic;pointer-events:none;paint-order:stroke;stroke:rgba(0,0,0,0.15);stroke-width:1px}

.zones-legend{
  display:grid;
  grid-template-columns:1fr;
  gap:.75rem;
  max-width:640px;
  margin:0 auto;
}
.zone-card{
  background:var(--sand-light);
  border:1px solid var(--line);
  border-left:5px solid;
  border-radius:4px;
  padding:.8rem 1rem;
}
.zone-card.zA{border-left-color:#c8553d}
.zone-card.zB{border-left-color:#b8862e}
.zone-card.zC{border-left-color:#8b4d3a}
.zone-card-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:.4rem;
}
.zone-card-title{
  font-family:'Fraunces',serif;
  font-size:1.1rem;
  font-weight:500;
  font-style:italic;
  color:var(--ink);
}
.zone-card-count{font-size:.68rem;color:var(--slate);letter-spacing:.08em;text-transform:uppercase;font-weight:600}
.zone-acads{font-size:.82rem;color:var(--ink-soft);line-height:1.5}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(29,43,54,.5);z-index:100;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-backdrop.show{display:flex}
.modal{background:var(--sand-light);border-radius:10px 10px 0 0;max-width:480px;width:100%;padding:1.4rem 1.2rem 1.2rem;max-height:92vh;overflow-y:auto;box-shadow:0 -10px 40px rgba(29,43,54,.25);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@media(min-width:600px){
  .modal-backdrop{align-items:center}
  .modal{border-radius:6px;max-height:88vh}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
}
.modal-handle{width:38px;height:4px;background:var(--line-strong);border-radius:100px;margin:-.4rem auto .85rem}
@media(min-width:600px){.modal-handle{display:none}}

<script type="module">
// ══════════════════════════════
// FIREBASE — stockage partagé temps réel
// ══════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyD_bPXVuY0qzm0AVWv8wfIggvGkWp3Z4ks",
  authDomain: "mignonne-saintmalo.firebaseapp.com",
  databaseURL: "https://mignonne-saintmalo-default-rtdb.europe-west1.firebasedatabase.app",

  messagingSenderId: "444724019938",
  appId: "1:444724019938:web:f33e2c18a4987949e714bb"
};

const fbApp = initializeApp(firebaseConfig);
const fbDb = getDatabase(fbApp);
const bookingsRef = ref(fbDb, 'bookings');
const historyRef = ref(fbDb, 'history');

// Mot de passe famille — envoyé à chaque écriture pour validation côté Firebase
const FAMILY_PASS = 'mignonne2026';

// Statut connexion
let isOnline = false;
function setConnState(ok){
  isOnline = ok;
  const s = document.getElementById('status');
  if(!ok && s && !s.dataset.offlineShown){
    s.dataset.offlineShown='1';
    s.textContent = '⚠ Hors-ligne';
    s.style.color = 'var(--coral)';

}
// ══════════════════════════════
// CONSTANTES
// ══════════════════════════════
const PAL=['#2d5f7c','#c8553d','#5b7553','#8b6f47','#7d4e7a','#b8862e','#4a6b7c','#a84a5e'];
const MFR=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DMINI=['L','M','M','J','V','S','D'];

// Jours fériés France (iso → label)
const FERIES={
  '2025-01-01':'Jour de l\'An','2025-04-21':'Lundi de Pâques','2025-05-01':'Fête du Travail',
  '2025-05-08':'Victoire 1945','2025-05-29':'Ascension','2025-06-09':'Lundi de Pentecôte',
  '2025-07-14':'Fête Nationale','2025-08-15':'Assomption','2025-11-01':'Toussaint',
  '2025-11-11':'Armistice','2025-12-25':'Noël',
  '2026-01-01':'Jour de l\'An','2026-04-06':'Lundi de Pâques','2026-05-01':'Fête du Travail',
  '2026-05-08':'Victoire 1945','2026-05-14':'Ascension','2026-05-25':'Lundi de Pentecôte',
  '2026-07-14':'Fête Nationale','2026-08-15':'Assomption','2026-11-01':'Toussaint',
  '2026-11-11':'Armistice','2026-12-25':'Noël',
};

// Vacances scolaires 2024-2026 par zone (début inclus → fin inclus, on va jusqu'à fin+1)
// Source : calendrier officiel Education Nationale
const VAC_ZONES={
  A:[
    // 2024-2025
    {s:'2024-10-19',e:'2024-11-04',label:'Toussaint'},
    {s:'2024-12-21',e:'2025-01-06',label:'Noël'},
    {s:'2025-02-08',e:'2025-02-24',label:'Hiver'},
    {s:'2025-04-05',e:'2025-04-22',label:'Printemps'},
    {s:'2025-07-05',e:'2025-09-01',label:'Été'},
    // 2025-2026
    {s:'2025-10-18',e:'2025-11-03',label:'Toussaint'},
    {s:'2025-12-20',e:'2026-01-05',label:'Noël'},
    {s:'2026-02-07',e:'2026-02-23',label:'Hiver'},
    {s:'2026-04-04',e:'2026-04-20',label:'Printemps'},
    {s:'2026-07-04',e:'2026-09-01',label:'Été'},
  ],
  B:[
    {s:'2024-10-19',e:'2024-11-04',label:'Toussaint'},
    {s:'2024-12-21',e:'2025-01-06',label:'Noël'},
    {s:'2025-02-22',e:'2025-03-10',label:'Hiver'},
    {s:'2025-04-19',e:'2025-05-05',label:'Printemps'},
    {s:'2025-07-05',e:'2025-09-01',label:'Été'},
    {s:'2025-10-18',e:'2025-11-03',label:'Toussaint'},
    {s:'2025-12-20',e:'2026-01-05',label:'Noël'},
    {s:'2026-02-21',e:'2026-03-09',label:'Hiver'},
    {s:'2026-04-18',e:'2026-05-04',label:'Printemps'},
    {s:'2026-07-04',e:'2026-09-01',label:'Été'},
  ],
  C:[
    {s:'2024-10-19',e:'2024-11-04',label:'Toussaint'},
    {s:'2024-12-21',e:'2025-01-06',label:'Noël'},
    {s:'2025-02-15',e:'2025-03-03',label:'Hiver'},
    {s:'2025-04-12',e:'2025-04-28',label:'Printemps'},
    {s:'2025-07-05',e:'2025-09-01',label:'Été'},
    {s:'2025-10-18',e:'2025-11-03',label:'Toussaint'},
    {s:'2025-12-20',e:'2026-01-05',label:'Noël'},
    {s:'2026-02-14',e:'2026-03-02',label:'Hiver'},
    {s:'2026-04-11',e:'2026-04-27',label:'Printemps'},
    {s:'2026-07-04',e:'2026-09-01',label:'Été'},
  ],
};

// ══════════════════════════════
// DONNÉES RÉSERVATIONS
// ══════════════════════════════
const SEED=[
  {id:'s01',name:'Yannick et Théa',          start:'2025-05-09',end:'2025-05-14',comment:''},
  {id:'s02',name:'Nicole et Jean-Claude',     start:'2025-05-30',end:'2025-06-02',comment:''},
  {id:'s03',name:'Fabien et Delphine',        start:'2025-07-18',end:'2025-07-20',comment:''},
  {id:'s04',name:'Sylvain et Elodie',         start:'2025-08-03',end:'2025-08-16',comment:''},
  {id:'s05',name:'Nicole et Jean-Claude',     start:'2026-04-12',end:'2026-04-18',comment:''},
  {id:'s06',name:'Hélène',                    start:'2026-04-18',end:'2026-04-26',comment:''},
  {id:'s07',name:'Pierrick et Lydwine',       start:'2026-04-26',end:'2026-05-01',comment:''},
  {id:'s08',name:'Chloé (fille de Stéphane)', start:'2026-05-01',end:'2026-05-08',comment:''},
  {id:'s09',name:'Dominique et Christine',    start:'2026-06-08',end:'2026-06-13',comment:'Amis Michel et Christiane'},
  {id:'s10',name:'Parents Théa',              start:'2026-07-16',end:'2026-07-25',comment:''},
  {id:'s11',name:'Sylvain et Justine',        start:'2026-07-25',end:'2026-08-02',comment:'Amis Yannick'},
  {id:'s12',name:'Sandrine et Mika',          start:'2026-08-02',end:'2026-08-16',comment:''},
];

// ══════════════════════════════
// ÉTAT
// ══════════════════════════════
let bookings=[];
let history=[];     // journal des modifications
let editingId=null;
let curMonthIdx=new Date().getMonth();
let curYearMonth=new Date().getFullYear();
let curYearView=2026;
let activeFilter='all';
let selState=null;
let newS=null,newE=null;
let showFerie=false;
let showVac=false;
let zone='B';
// Cache vacances (Set d'ISO)
let vacSet=new Set();

// ══════════════════════════════
// UTILS
// ══════════════════════════════
function colorFor(name){
  if(!name)return'#6b7a85';
  const n=name.trim().toLowerCase();let h=0;
  for(let i=0;i<n.length;i++){h=((h<<5)-h)+n.charCodeAt(i);h|=0}
  return PAL[Math.abs(h)%PAL.length];
}
function d2i(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function addD(iso,n){const d=new Date(iso+'T00:00');d.setDate(d.getDate()+n);return d2i(d)}
function fmtS(iso){return new Date(iso+'T00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
function fmtL(iso){return new Date(iso+'T00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function fmtDT(ts){return new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function nights(a,b){return Math.max(1,Math.round((new Date(b+'T00:00')-new Date(a+'T00:00'))/86400000))}
function bkAt(iso){return bookings.find(b=>iso>=b.start&&iso<b.end)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// === HELPERS NOM (compat ancien format) ===
// `occupants` = qui vient (affiché sur le calendrier)
// `bookedBy`  = référent qui a réservé, vide si identique
// L'ancien format n'a que `name` → on le considère comme occupants
function bkLabel(b){
  if(!b)return'';
  return (b.occupants||b.name||'').trim();
}
function bkBookedBy(b){
  if(!b)return'';
  const v=(b.bookedBy||'').trim();
  // Si bookedBy est identique aux occupants, on n'affiche rien
  if(!v||v===bkLabel(b))return'';
  return v;
}
function uniqNames(){
  return[...new Set(bookings.map(b=>bkLabel(b)))].filter(Boolean).sort();
}
function shortN(name){
  if(!name)return'';
  let n=name.replace(/\s*\(.*?\)/g,'').trim();
  const m=n.match(/^(.+?)\s+et\s+(.+)$/i);
  if(m){const a=m[1].trim(),b=m[2].trim().split(/[-\s]/)[0];return a+'&'+b}
  return n;
}
function buildVacSet(){
  vacSet.clear();
  const periods=VAC_ZONES[zone]||[];
  periods.forEach(p=>{
    let c=p.s;
    // end est le dernier jour inclus → on va jusqu'à e inclus
    const eNext=addD(p.e,1);
    while(c<eNext){vacSet.add(c);c=addD(c,1)}
  });
}
function isVac(iso){return showVac&&vacSet.has(iso)}
function isFerie(iso){return showFerie&&!!FERIES[iso]}

// ══════════════════════════════
// STORAGE
// ══════════════════════════════
async function load(){
  // Première charge : on lit une fois
  try{
    const [bkSnap, hSnap] = await Promise.all([get(bookingsRef), get(historyRef)]);
    bookings = bkSnap.exists() ? parseFbCollection(bkSnap.val()) : [];
    history = hSnap.exists() ? parseFbCollection(hSnap.val()) : [];

    // Si base vide, injecter les seeds
    if(!bookings.length){
      bookings = [...SEED];
      await saveBookings(false);
    }
    setConnState(true);
  }catch(e){
    console.error('Firebase load error:', e);
    bookings = [...SEED];
    history = [];
    setConnState(false);
  }
  updateStatus();
  render();

  // Écoute temps réel : dès que quelqu'un modifie, on recharge
  onValue(bookingsRef, (snap)=>{
    bookings = snap.exists() ? parseFbCollection(snap.val()) : [];
    updateStatus();render();
  }, (err)=>{console.error('Listen bookings error:', err);setConnState(false)});

  onValue(historyRef, (snap)=>{
    history = snap.exists() ? parseFbCollection(snap.val()) : [];
    renderHistoryView();
  }, (err)=>{console.error('Listen history error:', err)});
}

// Transforme l'objet Firebase en tableau, en filtrant les clés techniques (_pass)
function parseFbCollection(val){
  return Object.entries(val)
    .filter(([k,v]) => !k.startsWith('_') && typeof v === 'object' && v !== null)
    .map(([k,v]) => v);
}

async function saveBookings(notify=true){
  try{
    // On stocke le mot de passe famille dans un nœud racine
    // + les réservations indexées par id
    const obj = { _pass: FAMILY_PASS };
    bookings.forEach(b=>{obj[b.id]=b});
    await set(bookingsRef, obj);
  }catch(e){
    console.error('Firebase save error:',e);
    if(notify)toast('Erreur de sauvegarde — vérifiez votre connexion');
  }
}

async function saveHistory(){
  try{
    const last = history.slice(-100);
    const obj = { _pass: FAMILY_PASS };
    last.forEach((h,i)=>{obj['h_'+String(h.ts)+'_'+i]=h});
    await set(historyRef, obj);
  }catch(e){console.error('Firebase history save error:',e)}
}
function addHistory(action,bk,extra){
  history.push({
    ts:Date.now(),
    action,
    occupants:bkLabel(bk),
    bookedBy:bkBookedBy(bk),
    start:bk.start,
    end:bk.end,
    comment:bk.comment||'',
    extra:extra||''
  });
  saveHistory();
}
function updateStatus(){
  const n=bookings.length;
  document.getElementById('status').textContent=n===0?'Aucun séjour':n+' séjour'+(n>1?'s':'')+' enregistré'+(n>1?'s':'');
}

// ══════════════════════════════
// TOGGLES FERIES / VAC
// ══════════════════════════════
function toggleFerie(){
  showFerie=!showFerie;
  document.getElementById('btnFerie').classList.toggle('on',showFerie);
  render();
}
function toggleVac(){
  showVac=!showVac;
  document.getElementById('btnVac').classList.toggle('on',showVac);
  document.getElementById('zoneSelect').classList.toggle('show',showVac);
  buildVacSet();render();
}
function changeZone(z){zone=z;buildVacSet();render()}

// ══════════════════════════════
// ONGLETS
// ══════════════════════════════
document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    cancelSel();
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});
window.addEventListener('scroll',()=>{
  document.getElementById('stickyHeader').classList.toggle('scrolled',window.scrollY>30);
},{passive:true});

// ══════════════════════════════

// VUE ANNÉE — grille uniforme + overlay des bandes
// ══════════════════════════════
function renderYear(){
  const grid=document.getElementById('yearGrid');
  grid.innerHTML='';
  document.getElementById('currentYear').textContent=curYearView;
  const todayIso=d2i(new Date());

  for(let m=0;m<12;m++){
    const first=new Date(curYearView,m,1);
    const last=new Date(curYearView,m+1,0);
    let fw=first.getDay();fw=fw===0?6:fw-1;
    let nc=0;
    for(let d=1;d<=last.getDate();d++){if(bkAt(d2i(new Date(curYearView,m,d))))nc++}

    const card=document.createElement('div');card.className='month-card';
    const hdr=document.createElement('div');hdr.className='month-header';
    hdr.innerHTML=`<span class="month-name-lbl">${MFR[m]}</span>${nc?`<span class="month-nights">${nc} nuit${nc>1?'s':''}</span>`:''}`;
    card.appendChild(hdr);

    // Wrapper qui contient en-tête + grille
    const wrap=document.createElement('div');wrap.className='cal-wrap';

    // En-tête Lun…Dim (séparé de la grille)
    const head=document.createElement('div');head.className='cal-head';
    DMINI.forEach(d=>{const c=document.createElement('div');c.className='cal-head-cell';c.textContent=d;head.appendChild(c)});
    wrap.appendChild(head);

    // Conteneur position:relative pour la grille + overlay
    const bodyWrap=document.createElement('div');bodyWrap.className='cal-body-wrap';

    const cg=document.createElement('div');cg.className='cal-grid';

    // Cellules vides début
    for(let i=0;i<fw;i++){const c=document.createElement('div');c.className='cal-cell empty';cg.appendChild(c)}

    // Cellules des jours — CELLULES IDENTIQUES, juste numéro + fond
    for(let d=1;d<=last.getDate();d++){
      const iso=d2i(new Date(curYearView,m,d));
      const cell=document.createElement('div');
      cell.className='cal-cell';
      cell.dataset.iso=iso;
      if(iso===todayIso)cell.classList.add('today');
      if(isFerie(iso))cell.classList.add('is-ferie');
      if(isVac(iso))cell.classList.add('is-vac');
      // Marquer le jour d'arrivée
      const bkArrival=bookings.find(b=>b.start===iso);
      if(bkArrival)cell.classList.add('is-arrival');

      const num=document.createElement('div');
      num.className='day-num-sm';
      if(isFerie(iso))num.classList.add('ferie-mark');
      num.textContent=d;
      cell.appendChild(num);

      const bk=bkAt(iso);
      if(bk){
        cell.addEventListener('click',()=>openEdit(bk));
      } else {
        cell.addEventListener('click',()=>handleCellClick(iso,null));
      }
      cell.addEventListener('mouseenter',()=>handleHover(iso));
      cg.appendChild(cell);
    }

    bodyWrap.appendChild(cg);

    // OVERLAY : bandes de séjours, dans bodyWrap
    const overlay=document.createElement('div');
    overlay.className='cal-bands';
    bodyWrap.appendChild(overlay);

    wrap.appendChild(bodyWrap);
    card.appendChild(wrap);
    grid.appendChild(card);

    // Calcul des bandes APRÈS insertion dans le DOM
    requestAnimationFrame(()=>drawBands(cg,overlay,m,last.getDate(),fw,curYearView));
  }
}

// Index stable des prénoms (pour alternance de 2 couleurs)
function bookingColorIdx(booking){
  // Alternance simple selon l'ordre chronologique des séjours
  // Tous les séjours triés par start, puis index pair/impair
  const sorted=[...bookings].sort((a,b)=>a.start.localeCompare(b.start));
  const idx=sorted.findIndex(b=>b.id===booking.id);
  return idx%2;
}

const BAND_COLORS=['#c8553d','#b8862e']; // corail malouin & ocre ajonc, alternance chaude

function drawBands(gridEl,overlay,monthIdx,daysInMonth,firstWeekday,year){
  overlay.innerHTML='';

  const allCells=[...gridEl.children];
  if(!allCells.length)return;

  const jourCell=allCells.find(el=>!el.classList.contains('empty'));
  if(!jourCell)return;

  const cellW=jourCell.offsetWidth;
  const cellH=jourCell.offsetHeight;
  // Hauteur de bande selon taille de cellule
  const isBig=gridEl.classList.contains('big');
  const bandH=isBig?24:20;

  // Pour chaque séjour qui intersecte ce mois
  const yr = year !== undefined ? year : curYearView;
  const monthStart=new Date(yr,monthIdx,1);
  const monthEnd=new Date(yr,monthIdx+1,0);
  const monthStartIso=d2i(monthStart);
  const nextMonthIso=addD(d2i(monthEnd),1);

  const bkInMonth=bookings.filter(b=>b.start<nextMonthIso && b.end>monthStartIso);

  bkInMonth.forEach(b=>{
    const visStart=b.start<monthStartIso?monthStartIso:b.start;
    const visEnd=b.end>nextMonthIso?nextMonthIso:b.end;
    const continuesLeft=b.start<monthStartIso;
    const continuesRight=b.end>nextMonthIso;

    let c=visStart;
    while(c<visEnd){
      // Trouver la cellule de `c` dans allCells
      const cell=allCells.find(el=>el.dataset && el.dataset.iso===c);
      if(!cell)break;

      const dateC=new Date(c+'T00:00');
      let dow=dateC.getDay();dow=dow===0?6:dow-1;
      const daysUntilEndOfWeek=6-dow;
      let bandEndIso=addD(c,daysUntilEndOfWeek+1);
      if(bandEndIso>visEnd)bandEndIso=visEnd;

      // Position de la cellule de départ dans la grille
      const startIdx=allCells.indexOf(cell);
      const row=Math.floor(startIdx/7);
      const col=startIdx%7;
      const spanDays=Math.round((new Date(bandEndIso+'T00:00')-new Date(c+'T00:00'))/86400000);

      // Géométrie dans bodyWrap (overlay et grille au même niveau)
      const left=col*cellW+2;
      const width=spanDays*cellW-4;
      // Position : bande en bas de la cellule, laisse de la place pour le numéro en haut
      const top=row*cellH + cellH - bandH - 2;

      const band=document.createElement('div');
      band.className='cal-band';
      band.style.left=left+'px';
      band.style.width=width+'px';
      band.style.top=top+'px';
      band.style.height=bandH+'px';
      band.style.background=BAND_COLORS[bookingColorIdx(b)];

      const isBandFirst=c===visStart;
      const isBandLast=bandEndIso===visEnd;
      // Chaque bande (sauf la première du séjour) "continue à gauche"
      if(!isBandFirst||continuesLeft)band.classList.add('cal-band-continues-left');
      if(!isBandLast||continuesRight)band.classList.add('cal-band-continues-right');

      band.textContent=shortN(bkLabel(b));
      band.title=`${bkLabel(b)} · ${fmtS(b.start)} → ${fmtS(b.end)}`;
      band.addEventListener('click',e=>{e.stopPropagation();openEdit(b)});

      overlay.appendChild(band);

      c=bandEndIso;
    }
  });
}

function renderMonth(){

  const card=document.getElementById('monthCard');
  card.innerHTML='';

  const first=new Date(curYearMonth,curMonthIdx,1);

  let fw=first.getDay();fw=fw===0?6:fw-1;
  const today=d2i(new Date());

  let nc=0;
  for(let d=1;d<=last.getDate();d++){if(bkAt(d2i(new Date(curYearMonth,curMonthIdx,d))))nc++}

  // En-tête du mois
  const hdr=document.createElement('div');hdr.className='month-header';
  hdr.innerHTML=`<span class="month-name-lbl">${MFR[curMonthIdx]+' '+curYearMonth}</span>${nc?`<span class="month-nights">${nc} nuit${nc>1?'s':''}</span>`:''}`;
  card.appendChild(hdr);

  const head=document.createElement('div');head.className='cal-head';
  DMINI.forEach(d=>{const c=document.createElement('div');c.className='cal-head-cell';c.textContent=d;head.appendChild(c)});
  wrap.appendChild(head);

  const bodyWrap=document.createElement('div');bodyWrap.className='cal-body-wrap';
  const cg=document.createElement('div');cg.className='cal-grid big';

  // Cellules vides début
  for(let i=0;i<fw;i++){const c=document.createElement('div');c.className='cal-cell empty';cg.appendChild(c)}

  // Cellules des jours
  for(let d=1;d<=last.getDate();d++){
    const iso=d2i(new Date(curYearMonth,curMonthIdx,d));
    const cell=document.createElement('div');
    cell.className='cal-cell';
    cell.dataset.iso=iso;
    if(iso===today)cell.classList.add('today');
    if(isFerie(iso))cell.classList.add('is-ferie');
    if(isVac(iso))cell.classList.add('is-vac');
    // Marquer le jour d'arrivée
    const bkArrival=bookings.find(b=>b.start===iso);
    if(bkArrival)cell.classList.add('is-arrival');

    const num=document.createElement('div');
    num.className='day-num-sm';
    if(isFerie(iso))num.classList.add('ferie-mark');
    num.textContent=d;
    // Nom du jour férié (visible en vue mois car plus d'espace)
    if(isFerie(iso)){
      const fn=document.createElement('span');
      fn.className='ferie-lbl';
      fn.textContent=FERIES[iso];
      num.appendChild(fn);
    }
    cell.appendChild(num);

    const bk=bkAt(iso);
    if(bk){
      cell.addEventListener('click',()=>openEdit(bk));
    } else {
      cell.addEventListener('click',()=>handleCellClick(iso,null));
    }
    cell.addEventListener('mouseenter',()=>handleHover(iso));
    cg.appendChild(cell);
  }

  bodyWrap.appendChild(cg);
  const overlay=document.createElement('div');overlay.className='cal-bands';
  bodyWrap.appendChild(overlay);
  wrap.appendChild(bodyWrap);
  card.appendChild(wrap);

  requestAnimationFrame(()=>drawBands(cg,overlay,curMonthIdx,last.getDate(),fw,curYearMonth));
}

// SÉLECTION DOUBLE-CLIC
// ══════════════════════════════
function setHint(step,msg){
  const hint=document.getElementById('selectHint');
  document.getElementById('shStep').textContent=step;
  document.getElementById('shMsg').innerHTML=msg;
  hint.classList.add('show');
}
function handleCellClick(iso,bk){
  if(selState===null){
    if(bk){openEdit(bk);return}
    selState={start:iso};
    setHint('2/2',`Arrivée : <span class="sh-date">${fmtS(iso)}</span> · Cliquez maintenant la date de <strong>départ</strong>`);
    updateSelVis(iso);return;
  }
  if(selState.start===null){
    if(bk){openEdit(bk);cancelSel();return}
    selState={start:iso};
    setHint('2/2',`Arrivée : <span class="sh-date">${fmtS(iso)}</span> · Cliquez maintenant la date de <strong>départ</strong>`);
    updateSelVis(iso);return;
  }
  let s=selState.start,e=iso;
  if(e<s){const t=s;s=e;e=t}
  cancelSel();
  openNewModal(s,addD(e,1));
}
function handleHover(iso){if(!selState||!selState.start)return;updateSelVis(iso)}
function updateSelVis(hover){
  if(!selState||!selState.start)return;
  const lo=selState.start<=hover?selState.start:hover;
  const hi=selState.start<=hover?hover:selState.start;
  document.querySelectorAll('[data-iso]').forEach(el=>{
    const d=el.dataset.iso;
    el.classList.remove('sel-start','sel-range','sel-end-hover');
    if(d===selState.start)el.classList.add('sel-start');
    else if(d>lo&&d<hi)el.classList.add('sel-range');
    else if(d===hover&&d!==selState.start)el.classList.add('sel-end-hover');
  });
}
function cancelSel(){
  selState=null;
  document.getElementById('selectHint').classList.remove('show');
  document.querySelectorAll('[data-iso]').forEach(el=>el.classList.remove('sel-start','sel-range','sel-end-hover'));
}
function startNew(){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('[data-view="month"]').classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-month').classList.add('active');
  cancelSel();selState={start:null};
  setHint('1/2',"Cliquez la date d'<strong>arrivée</strong> sur le calendrier");
}

function updateNewDatesInfo(){
  const s=document.getElementById('fnStart').value;
  const e=document.getElementById('fnEnd').value;
  const info=document.getElementById('newDatesInfo');
  if(!s||!e){info.textContent='Sélectionnez les dates';info.style.color='var(--coral)';return}
  if(e<=s){info.textContent='⚠ La date de départ doit être après l\'arrivée';info.style.color='var(--coral)';return}
  const n=nights(s,e);
  info.style.color='';
  info.textContent=`${fmtL(s)} → ${fmtL(addD(e,-1))} · ${n} nuit${n>1?'s':''}`;
}
function openNewModal(s,e){
  newS=s;newE=e;
  // Pré-remplir les dates dans les champs (modifiables)
  document.getElementById('fnStart').value=s;
  document.getElementById('fnEnd').value=e;
  updateNewDatesInfo();
  document.getElementById('fnOccupants').value='';
  document.getElementById('fnBookedBy').value='';
  document.getElementById('fnComment').value='';
  const cf=bookings.find(b=>!(e<=b.start||s>=b.end));
  if(cf&&!confirm(`⚠️ Chevauchement avec ${bkLabel(cf)}.\nContinuer ?`))return;
  document.getElementById('modalNew').classList.add('show');
  setTimeout(()=>document.getElementById('fnOccupants').focus(),200);
}
function cancelNew(){document.getElementById('modalNew').classList.remove('show')}
async function saveNew(){
  const occupants=document.getElementById('fnOccupants').value.trim();
  const bookedBy=document.getElementById('fnBookedBy').value.trim();
  const start=document.getElementById('fnStart').value;
  const end=document.getElementById('fnEnd').value;
  if(!occupants){toast('Indiquez qui vient');return}
  if(!start||!end||end<=start){toast('Dates invalides');return}
  // Re-vérifier les chevauchements avec les dates (potentiellement modifiées)
  const cf=bookings.find(b=>!(end<=b.start||start>=b.end));
  if(cf&&!confirm(`⚠️ Chevauchement avec ${bkLabel(cf)}.\nContinuer ?`))return;
  const bk={
    id:'b_'+Date.now(),
    occupants,
    bookedBy:bookedBy||'',
    start,
    end,
    comment:document.getElementById('fnComment').value.trim(),
    createdAt:new Date().toISOString()
  };
  bookings.push(bk);
  addHistory('Ajout',bk);
  await saveBookings();cancelNew();await load();toast('Séjour ajouté ✓');
}
function openEdit(b){
  editingId=b.id;
  document.getElementById('fOccupants').value=bkLabel(b);
  document.getElementById('fBookedBy').value=(b.bookedBy||'');
  document.getElementById('fStart').value=b.start;
  document.getElementById('fEnd').value=b.end;
  document.getElementById('fComment').value=b.comment||'';
  document.getElementById('modal').classList.add('show');
}
function closeEdit(){document.getElementById('modal').classList.remove('show');editingId=null}
async function saveBk(){
  const occupants=document.getElementById('fOccupants').value.trim();
  const bookedBy=document.getElementById('fBookedBy').value.trim();
  const start=document.getElementById('fStart').value,end=document.getElementById('fEnd').value;
  if(!occupants||!start||!end||end<=start){toast('Données invalides');return}
  const cf=bookings.find(b=>b.id!==editingId&&!(end<=b.start||start>=b.end));
  if(cf&&!confirm(`⚠️ Conflit avec ${bkLabel(cf)}. Continuer ?`))return;
  const idx=bookings.findIndex(b=>b.id===editingId);
  if(idx>=0){
    const old=bookings[idx];
    // Nettoyer les anciens champs (name, people) si présents pour avoir un objet propre
    const updated={
      id:old.id,
      occupants,
      bookedBy:bookedBy||'',
      start,
      end,
      comment:document.getElementById('fComment').value.trim(),
      createdAt:old.createdAt||new Date().toISOString()
    };
    addHistory('Modification',updated,`Avant : ${bkLabel(old)} ${fmtS(old.start)}→${fmtS(old.end)}`);
    bookings[idx]=updated;
  }
  await saveBookings();closeEdit();await load();toast('Séjour modifié');
}
async function deleteBk(){
  const b=bookings.find(x=>x.id===editingId);if(!b)return;
  if(!confirm(`Supprimer le séjour de ${bkLabel(b)} ?`))return;
  addHistory('Suppression',b);
  bookings=bookings.filter(x=>x.id!==editingId);
  await saveBookings();closeEdit();await load();toast('Séjour supprimé');
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeEdit()});
document.getElementById('modalNew').addEventListener('click',e=>{if(e.target.id==='modalNew')cancelNew()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeEdit();cancelNew();cancelSel()}});

    const h=document.createElement('div');h.className='list-yr-head';h.textContent=yr;body.appendChild(h);
    byY[yr].forEach(b=>{
      const past=b.end<=today,n=nights(b.start,b.end);

      card.innerHTML=`<div><div class="list-date-range">${fmtS(b.start)} → ${fmtS(b.end)}</div><div class="list-nights">${n} nuit${n>1?'s':''}</div></div><div class="list-info"><div class="list-name">${esc(lbl)}</div>${resa?`<div class="list-meta">Réservé par ${esc(resa)}</div>`:''}${b.comment?`<div class="list-comment">« ${esc(b.comment)} »</div>`:''}</div><div class="list-edit">✎</div>`;
      card.onclick=()=>openEdit(b);body.appendChild(card);
    });
  });
}

// STATS
// ══════════════════════════════
function computeStats(yr){
  const s0=yr+'-01-01',s1=(yr+1)+'-01-01';
  const occ=new Set();let stays=0;
  bookings.forEach(b=>{
    const s=b.start<s0?s0:b.start,e=b.end>s1?s1:b.end;
    if(s>=e)return;stays++;let c=s;
    while(c<e){occ.add(c);c=addD(c,1)}
  });
  const sorted=[...occ].sort();
  let mx=0,cur=0,prev=null;
  for(const d of sorted){cur=(prev&&addD(prev,1)===d)?cur+1:1;if(cur>mx)mx=cur;prev=d}
  return{days:occ.size,stays,record:mx};
}

function renderStatsView(){
  const body=document.getElementById('statsBody');
  const s25=computeStats(2025),s26=computeStats(2026);

  function yearBlock(yr,s){
    return`<div class="stats-year-block">
      <div class="stats-year-title">${yr}</div>
      <div class="stat-row"><span class="stat-row-label">Jours occupés</span><span class="stat-row-val">${s.days}</span></div>
      <div class="stat-row"><span class="stat-row-label">Séjours</span><span class="stat-row-val">${s.stays}</span></div>
      <div class="stat-row"><span class="stat-row-label">Record d'affilée</span><span class="stat-row-val record">${s.record}</span></div>
    </div>`;
  }
  body.innerHTML=`<div class="stats-grid">${yearBlock(2025,s25)}${yearBlock(2026,s26)}</div>`;
}

// ══════════════════════════════
// LÉGENDE VUE MOIS — uniquement quand jours fériés ou vacances sont actifs
// ══════════════════════════════
function renderLegend(){
  const el=document.getElementById('legendMonth');
  if(!showFerie && !showVac){el.style.display='none';return}
  el.style.display='block';
  let html='<div class="legend-items">';
  if(showFerie)html+=`<div class="legend-item"><span style="width:11px;height:11px;background:var(--ferie-bg);border:1px solid var(--ferie-dot);border-radius:2px;display:inline-block"></span><span>Jour férié</span></div>`;
  if(showVac)html+=`<div class="legend-item"><span style="width:11px;height:11px;background:var(--vac-bg);border:1px solid var(--vac-dot);border-radius:2px;display:inline-block"></span><span>Vacances scolaires zone ${zone}</span></div>`;
  html+='</div>';
  el.innerHTML=html;
}

// ══════════════════════════════
// NAVIGATION
// ══════════════════════════════
function navMonth(d){curMonthIdx+=d;if(curMonthIdx<0){curMonthIdx=11;curYearMonth--}if(curMonthIdx>11){curMonthIdx=0;curYearMonth++}renderMonth()}
function navYear(d){curYearView+=d;renderYear()}

// ══════════════════════════════
// TOAST
// ══════════════════════════════
let tt;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2600)}
