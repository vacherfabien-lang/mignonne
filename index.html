de branches de coriandre\n1 à 2 citrons verts\n3 cuillers à soupe d'huile d'olive\nSel. Poivre","preparation":"Mettre les filets de dorade 15 mn au congélateur afin de pouvoir les couper facilement en tranches.\n\nRéfrigérer aussi les assiettes de service. Hacher les échalotes.\n\nEbouillanter, peler et couper en dés les tomates\n\nMouliner fin les graines de coriandre et ciseler les branches de coriandre.\n\nCouper les filets en dés. Mélanger échalotes, citron, huile d'olive et coriandre. Saler, poivrer.\n\nMouler ce tartare en forme de quenelles a l'aide d'une cuiller à soupe.\n\nGarnissez de concassée de tomates et de coriandre en brins.\n\nServir très frais avec du pain de campagne grillé et de quartiers de citron vert.","source":"louli"},{"id":"lo_121","titre":"Tartare de dorade et Saint-Jacques","auteur":"Louli","ingredients":"**Ingrédients pour 4 personnes:**\n600g de filets de dorade\n16 noix de Saint-Jacques surgelées ou 8 fraîches\n1 échalote\n2 tomates\n1 bouquet de branches de coriandre\n2 à 3 citrons verts\n3 cuillères à soupe d'huile d'olive\nSel. Poivre","preparation":"Si les Saint-Jacques sont congelées, les faire décongeler dans un mélange moitié eau et moitié lait.\n\nRéfrigérer les assiettes de service. Hacher les échalotes.\n\nEbouillanter, peler, épépiner et couper en dés les tomates\n\nCiseler deux ou trois branches de coriandre.\n\nLever les filets de dorade avec un couteau bien aiguisé.\n\nCouper les filets en tranches fines (peu importe que les morceaux se séparent)\n\nHacher les Saint-Jacques au couteau\n\nMélanger échalotes, citron, huile d'olive et coriandre avec poisson et Saint-Jacques. Saler, poivrer.\n\nMouler ce tartare en forme de quenelles à l'aide d'une cuillère à soupe en essorant le jus.\n\nGarnissez de concassée de tomates.\n\nServir très frais avec du pain de campagne grillé.","source":"louli"},{"id":"lo_122","titre":"Tarte à la rhubarbe","auteur":"Louli","ingredients":"**Ingrédients :**\n1 kg environ de rhubarbe\n400 g de sucre\n1 pâte à tarte sablée\n.","preparation":"Enlever la peau des tiges de rhubarbe en essayant d’ôter le maximum de fils puis coupez la tige en tronçons de 3 cm environ.\n\nMettre la rhubarbe et le sucre dans un saladier et laisser la rhubarbe rendre du jus pendant quelques heures.\n\nMettre le tout dans une casserole et laisser cuire environ une demi-heure à gros bouillons. Remuer de temps en temps. La rhubarbe doit devenir de la compote puis réduire un peu pour ne pas détremper la pâte.\n\nFaire cuire la pâte sablée en posant un papier et des haricots dessus pendant 10 minutes. Ajouter la compote et finir de cuire 10 minutes.","source":"louli"},{"id":"lo_123","titre":"Tarte au citron meringuée","auteur":"Louli","ingredients":"**Ingrédients :**\n100 g de sucre\n100 g de beurre\n3 citrons\n3 œufs\n1 paquet de pâte brisée\n.","preparation":"Mélanger le sucre, le beurre, le jus de 3 citrons et le zeste de 2 et 3 jaunes d’œufs dans une casserole sur feu doux. Faire cuire 5 minutes à partir des premiers bouillons en remuant régulièrement.\n\nFaire cuire la pâte brisée avec un papier et des haricots secs dessus pendant 20 minutes.\n\nMettre la crème au citron sur la pâte puis recouvrir des blancs en neige battus avec un peu de sucre.\n\nPasser (très rapidement) sous le grill pour dorer le dessus.","source":"louli"},{"id":"lo_124","titre":"Tarte tatin","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n1 paquet de pâte brisée\n4 ou 5 pommes\nbeurre doux\ncaramel\n1 cuillerée à soupe de sucre","preparation":"Beurrez un moule rond à bord haut. Epluchez et coupez les pommes en huit.\n\nFaites fondre 50 g de beurre dans le fond du moule et versez-y le caramel.\n\nPlacez les morceaux de pommes dessus et saupoudrez les de sucre.\n\nPlacez la pâte par-dessus les pommes en glissant le bord entre les pommes et le moule. Découpez un petit trou de deux cm pour laisser la vapeur s’évacuer.\n\nEnfournez à Th 6 pour 30 minutes.\n\nRetournez la tarte pour la servir.\n\n**Variante **: On peut servir avec un peu de crème fraîche.","source":"louli"},{"id":"lo_125","titre":"Tiramitsu","auteur":"Isabelle Alby","ingredients":"","preparation":"**I****ngrédients :**\nIngrédients pour 4 personnes:\n12 biscuits à la cuiller\n3 cuillères à soupe de Marsala ou de rhum\n6 cuillères à soupe de café très fort\n2 cuillères à soupe de cacao amer\n2 œufs\n3 cuillères à soupe de sucre\n250 g de Mascarpone\n**Recette :**\nDisposer les biscuits à la cuiller dans un plat creux assez large. Mélanger l'alcool choisi avec le café et verser le tout sur les biscuits. Les laisser absorber le liquide.\nFouettez ensemble les jaunes d'œufs et le sucre jusqu'à obtenir un mélange mousseux et bien blanc; y incorporer le mascarpone.\nMonter les blancs d'œufs en neige très ferme. Les incorporer à la préparation précédente sans les casser, en soulevant avec une spatule.\nEtaler la crème sur les biscuits imbibés d'alcool et mettre au frais pendant 4h au moins. (moi je l'avais mis au congélateur, c'est plus pratique pour faire des tranches)\nSaupoudrer de cacao amer juste avant de servir.\nOn peut aussi alterner les couches de biscuits et de crème.","source":"louli"},{"id":"lo_126","titre":"Tomates provençales","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n8 tomates bien mûres\nail\npersil\nchapelure\nsel, poivre","preparation":"Coupez les tomates en deux puis mettez-les face coupée dans une poêle contenant un peu d’huile. Au bout de quelques minutes retournez-les et baissez le feu. Continuez la cuisson en les retournant régulièrement. Salez et poivrez .\n\nHachez l’ail et le persil avec la chapelure.\n\nLorsque les tomates sont presque cuites, laissez-les « creux en l’air » et saupoudrez-les du hachis et terminez la cuisson.\n\n**Remarque :**\n\nCette recette sera réussie avec des tomates bien mûres. Plus on mettra d’huile, plus les tomates seront « confites ».","source":"louli"},{"id":"lo_127","titre":"Tuiles","auteur":"Simone","ingredients":"**Ingrédients :**\n1 bol de crème fraîche\n1 bol de farine\n1 bol de sucre\n.","preparation":"Mélanger les ingrédients puis faire de petits tas sur une tôle beurrée. Faire cuire 10 à 20 minutes à four chaud.\n\nAligot\t1\n\nBaba au rhum\t2\n\nBeignets de crevette, sauce pékinoise\t3\n\nBiscuit au beurre\t4\n\nBisque d’étrilles\t5\n\nBlanquette de veau\t6\n\nBlinis\t7\n\nBœuf aux poivrons\t8\n\nBouillabaisse\t9\n\nBouillabaisse de morue\t10\n\nBoulettes de kefta aux tomates\t11\n\nBoulettes de porc au vermicelle\t12\n\nBrioche\t13\n\nBrochettes d’agneau\t14\n\nBrochettes de porc (Solomilllo)\t15\n\nBrochettes de poulet\t16\n\nBrochettes vietnamiennes\t17\n\nCake\t18\n\nCake de Simone\t19\n\nCalmars au riz\t20\n\nCalmars farcis aux légumes\t21\n\nCalmar farci\t22\n\nCanard à l’orange\t23\n\nCanard au lait de coco\t24\n\nCanard laqué\t25\n\nCarpaccio de thon\t26\n\nCassoulet Toulousain\t27\n\nChaussons à la viande\t28\n\nChoucroute\t29\n\nConfit de canard\t30\n\nConfitures\t31\n\nConfiture d’abricots\t31\n\nConfiture de coings\t31\n\nConfiture de figues\t31\n\nConfiture de groseilles\t31\n\nConfiture d’oranges\t32\n\nConfiture de pastèques\t32\n\nCoquilles Saint-Jacques\t33\n\nCouscous\t34\n\nCouscous au poisson\t35\n\nCrêpes\t39\n\nCrevettes sautées\t40\n\nCrumble aux pommes\t41\n\nDaube de sanglier\t43\n\nDaurade au four\t44\n\nDaurade farcie aux légumes\t45\n\nEpaule de mouton à la vapeur\t46\n\nEpaule de mouton façon méchoui\t47\n\nEscalopes comtoises\t48\n\nFar breton\t49\n\nFilets de poisson\t50\n\nFilet de loup aux olives et au citron confit\t51\n\nFlan aux poires\t52\n\nFoie de canard au naturel\t53\n\nFoie gras d’oie ou de canard\t54\n\nFondue de légumes\t55\n\nFumet de poissons\t56\n\nGalette de pommes de terre\t57\n\nGambas au curry (créole)\t58\n\nGaspacho\t59\n\nGâteau aux oranges\t60\n\nGâteau aux pommes\t61\n\nGâteau de semoule\t62\n\nGaufres\t63\n\nGibier sauce grand veneur\t64\n\nGratin dauphinois\t65\n\nHarira\t66\n\nJambalaya\t68\n\nLapin aux pruneaux\t69\n\nLapin grillé au c let recettes = [];                  // recettes famille (Firebase)
let recFilter = 'all';              // 'all' | 'louli' | 'fam'
let editingRecId = null;
let recPhotosBuffer = [];           // photos en cours d'édition (data URL base64)
const REC_MAX_PHOTOS = 3;
const REC_PHOTO_MAX_SIZE = 1200;    // max width/height en pixels
const REC_PHOTO_QUALITY = 0.75;     // qualité JPEG

function escTxt(s){return (s||'').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}

// Convertit le markdown gras (**texte**) en <strong>
function mdBold(s){
  return escTxt(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
}

// === LOAD/SAVE famille (Firebase) ===
async function loadRecettes(){
  try{
    const snap = await get(recettesRef);
    recettes = snap.exists() ? parseFbCollection(snap.val()) : [];
  }catch(e){
    console.error('Firebase recettes load error:', e);
    recettes = [];
  }
  renderRecettes();

  // Écoute temps réel : dès que quelqu'un ajoute/modifie une recette, on recharge
  onValue(recettesRef, (snap)=>{
    recettes = snap.exists() ? parseFbCollection(snap.val()) : [];
    renderRecettes();
  }, (err)=>{console.error('Listen recettes error:', err)});
}
async function saveRecettes(){
  try{
    const obj = { _pass: FAMILY_PASS };
    recettes.forEach(r=>{obj[r.id]=r});
    await set(recettesRef, obj);
  }catch(e){
    console.error('Firebase recettes save error:',e);
    toast('Erreur de sauvegarde — vérifiez votre connexion');
  }
}

// === RENDU LISTE RECETTES ===
function renderRecettes(){
  const grid = document.getElementById('recGrid');
  const filtersEl = document.getElementById('recFilters');
  if(!grid)return;

  const q = (document.getElementById('recSearch').value||'').trim().toLowerCase();

  // Construction des chips de filtre
  const nLouli = RECETTES_LOULI.length;
  const nFam = recettes.length;
  filtersEl.innerHTML = '';
  [
    {k:'all',  lbl:'Toutes',  n: nLouli + nFam},
    {k:'louli',lbl:'Louli',   n: nLouli},
    {k:'fam',  lbl:'Famille', n: nFam},
  ].forEach(f=>{
    const c = document.createElement('button');
    c.className = 'chip'+(recFilter===f.k?' active':'');
    c.textContent = `${f.lbl} (${f.n})`;
    c.onclick = ()=>{recFilter=f.k;renderRecettes()};
    filtersEl.appendChild(c);
  });

  // Fusion + filtre source + tri alphabétique
  let all = [];
  if(recFilter==='all' || recFilter==='louli')all = all.concat(RECETTES_LOULI);
  if(recFilter==='all' || recFilter==='fam')  all = all.concat(recettes);
  if(q){
    all = all.filter(r =>
      (r.titre||'').toLowerCase().includes(q) ||
      (r.auteur||'').toLowerCase().includes(q)
    );
  }
  all.sort((a,b)=>(a.titre||'').localeCompare(b.titre||'','fr',{sensitivity:'base'}));

  if(!all.length){
    grid.innerHTML = `<div class="rec-empty"><div class="rec-empty-icon">🍽️</div><div>Aucune recette ne correspond.</div></div>`;
    return;
  }

  grid.innerHTML = '';
  all.forEach(r=>{
    const isFam = r.source==='fam';
    const card = document.createElement('div');
    card.className = 'rec-card';
    const photo = r.photos && r.photos[0];
    const imgStyle = photo ? `style="background-image:url('${photo}')"` : '';
    const previewSrc = (r.preparation||r.ingredients||'').replace(/\*\*/g,'').slice(0,140);
    card.innerHTML = `
      <div class="rec-card-img" ${imgStyle}>
        ${photo ? '' : '🍴'}
        <span class="rec-card-badge ${isFam?'fam':''}">${isFam?'Famille':'Louli'}</span>
      </div>
      <div class="rec-card-body">
        <div class="rec-card-title">${escTxt(r.titre)}</div>
        <div class="rec-card-author">${escTxt(r.auteur||'—')}</div>
        ${previewSrc?`<div class="rec-card-preview">${escTxt(previewSrc)}…</div>`:''}
      </div>
    `;
    card.onclick = ()=>openRecRead(r);
    grid.appendChild(card);
  });
}

// === MODAL LECTURE ===
function openRecRead(r){
  const body = document.getElementById('recReadBody');
  const actions = document.getElementById('recReadActions');
  const isFam = r.source==='fam';

  let photosHtml = '';
  if(r.photos && r.photos.length){
    photosHtml = '<div class="rec-read-photos">' +
      r.photos.map(p=>`<img src="${p}" alt="" onclick="openRecLightbox('${p}')">`).join('') +
      '</div>';
  }

  let ingrHtml = '';
  if(r.ingredients && r.ingredients.trim()){
    const lines = r.ingredients.split('\n').map(l=>mdBold(l)).join('<br>');
    ingrHtml = `<div class="rec-section-title">Ingrédients</div><div class="rec-section-body">${lines}</div>`;
  }

  const prepLines = (r.preparation||'').split('\n').map(l=>mdBold(l)).join('<br>');
  const prepHtml = `<div class="rec-section-title">Préparation</div><div class="rec-section-body">${prepLines}</div>`;

  body.innerHTML = `
    <div class="rec-read-title">${escTxt(r.titre)}</div>
    <div class="rec-read-author">${escTxt(r.auteur||'—')}${isFam?'  ·  Recette famille':'  ·  Carnet de Louli'}</div>
    ${photosHtml}
    ${ingrHtml}
    ${prepHtml}
  `;

  // Boutons : Modifier/Supprimer disponibles uniquement pour les recettes famille
  if(isFam){
    actions.innerHTML = `
      <button class="btn btn-secondary" onclick="closeRecRead()">Fermer</button>
      <button class="btn btn-primary" onclick="openRecEdit('${r.id}')">Modifier</button>
    `;
  } else {
    actions.innerHTML = `<button class="btn btn-secondary" onclick="closeRecRead()">Fermer</button>`;
  }
  document.getElementById('modalRecRead').classList.add('show');
}
function closeRecRead(){document.getElementById('modalRecRead').classList.remove('show')}

// === LIGHTBOX PHOTO ===
function openRecLightbox(src){
  document.getElementById('recLightboxImg').src = src;
  document.getElementById('recLightbox').classList.add('show');
}
function closeRecLightbox(){
  document.getElementById('recLightbox').classList.remove('show');
}

// === MODAL ÉDITION (création ou modification) ===
function openRecNew(){
  editingRecId = null;
  recPhotosBuffer = [];
  document.getElementById('recEditTitle').textContent = 'Nouvelle recette';
  document.getElementById('frTitre').value = '';
  document.getElementById('frAuteur').value = '';
  document.getElementById('frIngredients').value = '';
  document.getElementById('frPreparation').value = '';
  document.getElementById('recDeleteBtn').style.display = 'none';
  renderRecPhotosEdit();
  document.getElementById('modalRecEdit').classList.add('show');
  setTimeout(()=>document.getElementById('frTitre').focus(),200);
}
function openRecEdit(id){
  const r = recettes.find(x=>x.id===id);
  if(!r){toast('Recette introuvable');return}
  editingRecId = id;
  recPhotosBuffer = [...(r.photos||[])];
  document.getElementById('recEditTitle').textContent = 'Modifier la recette';
  document.getElementById('frTitre').value = r.titre||'';
  document.getElementById('frAuteur').value = r.auteur||'';
  document.getElementById('frIngredients').value = r.ingredients||'';
  document.getElementById('frPreparation').value = r.preparation||'';
  document.getElementById('recDeleteBtn').style.display = '';
  renderRecPhotosEdit();
  closeRecRead();
  document.getElementById('modalRecEdit').classList.add('show');
}
function closeRecEdit(){
  document.getElementById('modalRecEdit').classList.remove('show');
  recPhotosBuffer = [];
}
function renderRecPhotosEdit(){
  const wrap = document.getElementById('recPhotosEdit');
  wrap.innerHTML = '';
  recPhotosBuffer.forEach((src,i)=>{
    const t = document.createElement('div');
    t.className = 'rec-photo-thumb';
    t.style.backgroundImage = `url('${src}')`;
    t.innerHTML = `<button type="button" class="rec-photo-del" onclick="removeRecPhoto(${i})" title="Supprimer">×</button>`;
    wrap.appendChild(t);
  });
  // Cacher le bouton ajouter si on a atteint le max
  const btn = document.querySelector('.rec-photo-add-btn');
  if(btn)btn.style.display = recPhotosBuffer.length >= REC_MAX_PHOTOS ? 'none' : '';
}
function removeRecPhoto(i){
  recPhotosBuffer.splice(i,1);
  renderRecPhotosEdit();
}

// === COMPRESSION PHOTO ===
function onRecPhotoSelected(ev){
  const files = Array.from(ev.target.files||[]);
  if(!files.length)return;
  const slots = REC_MAX_PHOTOS - recPhotosBuffer.length;
  if(slots <= 0){toast('Maximum 3 photos');ev.target.value='';return}
  const toProcess = files.slice(0, slots);
  if(files.length > slots)toast(`Seulement ${slots} photo(s) ajoutée(s) — max ${REC_MAX_PHOTOS}`);

  toast('Compression de la photo…');
  Promise.all(toProcess.map(compressPhoto))
    .then(dataUrls=>{
      dataUrls.forEach(d=>{if(d)recPhotosBuffer.push(d)});
      renderRecPhotosEdit();
    })
    .catch(err=>{console.error('Photo compression error:',err);toast('Impossible de traiter la photo')})
    .finally(()=>{ev.target.value=''});
}

function compressPhoto(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onerror = ()=>reject(new Error('Lecture impossible'));
    reader.onload = ()=>{
      const img = new Image();
      img.onerror = ()=>reject(new Error('Image invalide'));
      img.onload = ()=>{
        // Redimensionnement : on respecte le ratio, max côté = REC_PHOTO_MAX_SIZE
        let {width,height} = img;
        const ratio = Math.min(REC_PHOTO_MAX_SIZE/width, REC_PHOTO_MAX_SIZE/height, 1);
        width = Math.round(width * ratio);
        height = Math.round(height * ratio);
        const canvas = document.createElement('canvas');
        canvas.width = width;canvas.height = height;
        const ctx = canvas.getContext('2d');
        // Fond blanc en cas de PNG avec transparence (JPEG ne gère pas)
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0,0,width,height);
        ctx.drawImage(img,0,0,width,height);
        const dataUrl = canvas.toDataURL('image/jpeg', REC_PHOTO_QUALITY);
        resolve(dataUrl);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

// === SAVE / DELETE ===
async function saveRec(){
  const titre = document.getElementById('frTitre').value.trim();
  const auteur = document.getElementById('frAuteur').value.trim();
  const ingredients = document.getElementById('frIngredients').value.trim();
  const preparation = document.getElementById('frPreparation').value.trim();
  if(!titre){toast('Indiquez un titre');return}
  if(!auteur){toast('Indiquez un auteur');return}
  if(!preparation){toast('Indiquez la préparation');return}

  if(editingRecId){
    // Modification
    const idx = recettes.findIndex(r=>r.id===editingRecId);
    if(idx>=0){
      recettes[idx] = {
        ...recettes[idx],
        titre, auteur, ingredients, preparation,
        photos: [...recPhotosBuffer],
        updatedAt: new Date().toISOString()
      };
    }
  } else {
    // Création
    recettes.push({
      id: 'r_'+Date.now(),
      titre, auteur, ingredients, preparation,
      photos: [...recPhotosBuffer],
      source: 'fam',
      createdAt: new Date().toISOString()
    });
  }
  await saveRecettes();
  closeRecEdit();
  renderRecettes();
  toast(editingRecId?'Recette modifiée ✓':'Recette ajoutée ✓');
}

async function deleteRec(){
  if(!editingRecId)return;
  const r = recettes.find(x=>x.id===editingRecId);
  if(!r)return;
  if(!confirm(`Supprimer la recette « ${r.titre} » ?`))return;
  recettes = recettes.filter(x=>x.id!==editingRecId);
  await saveRecettes();
  closeRecEdit();
  renderRecettes();
  toast('Recette supprimée');
}

// Charger les recettes famille au démarrage
loadRecettes();


// INIT
load();
</script>
