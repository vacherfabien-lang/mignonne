<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mignonne — Saint-Malo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --sand:#f4ede1;--sand-light:#faf6ee;--stone:#e8ddc8;
  --ink:#1d2b36;--ink-soft:#3a4a56;--slate:#6b7a85;
  --ocean:#2d5f7c;--ocean-deep:#1a4159;--coral:#c8553d;
  --line:rgba(29,43,54,.12);--line-strong:rgba(29,43,54,.22);
  --ferie-bg:rgba(200,85,61,.07);--ferie-dot:#c8553d;
  --vac-bg:rgba(45,95,124,.06);--vac-dot:#2d5f7c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--sand);color:var(--ink);line-height:1.5;min-height:100vh;
  background-image:radial-gradient(ellipse at top,rgba(45,95,124,.05),transparent 50%),radial-gradient(ellipse at bottom right,rgba(200,85,61,.04),transparent 60%);
  padding-top:env(safe-area-inset-top)}

/* ── STICKY HEADER ── */
.sticky-header{position:sticky;top:0;z-index:50;background:var(--sand);border-bottom:1px solid var(--line);transition:box-shadow .2s}
.sticky-header.scrolled{box-shadow:0 2px 12px rgba(29,43,54,.08)}
.header-top{padding:1rem 1rem .4rem;max-width:1200px;margin:0 auto;text-align:center}
.subtitle{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--slate);font-weight:500}
.title{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(1.9rem,6.5vw,3rem);letter-spacing:-.02em;color:var(--ink);font-style:italic;line-height:1;margin-top:.3rem}

/* ── ONGLETS ── */
.tabs{display:flex;justify-content:center;max-width:1200px;margin:.5rem auto 0;padding:0 1rem;border-top:1px solid var(--line)}
.tab{background:none;border:none;padding:.55rem .4rem;font-size:.78rem;font-weight:500;color:var(--slate);cursor:pointer;position:relative;flex:1;max-width:130px;font-family:'Inter',sans-serif;white-space:nowrap}
.tab.active{color:var(--ocean-deep)}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:15%;right:15%;height:2px;background:var(--coral)}

/* Onglets principaux (gros) : Réservations / Recettes */
.tabs-main{
  border-top:none;
  margin-top:.7rem;
  padding-bottom:.1rem;
  gap:.4rem;
}
.tab-main{
  background:none;border:none;cursor:pointer;
  font-family:'Fraunces',serif;font-style:italic;
  font-size:1rem;font-weight:500;
  padding:.45rem 1.1rem;
  color:var(--slate);
  border-radius:100px;
  border:1px solid transparent;
  transition:all .15s;
}
.tab-main:active{transform:scale(.97)}
.tab-main.active{
  color:var(--coral);
  border-color:var(--coral);
  background:rgba(200,85,61,.06);
}

/* Sous-onglets : visibles uniquement quand la section parente est active */
.tabs-sub{display:none;margin-top:.4rem}
.tabs-sub.show{display:flex}

/* ── TOOLBAR ── */
.toolbar{max-width:1200px;margin:.75rem auto 0;padding:0 1rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;flex-wrap:wrap}
.btn-add{background:var(--ink);color:var(--sand-light);border:none;padding:.6rem 1.1rem;font-size:.82rem;font-weight:500;cursor:pointer;border-radius:3px;display:inline-flex;align-items:center;gap:.45rem;font-family:'Inter',sans-serif}
.btn-add:active{background:var(--ocean-deep)}
.btn-add .plus{font-size:1rem;line-height:1}
.status{font-size:.72rem;color:var(--slate);font-style:italic}

/* Toggles jours fériés / vacances */
.display-toggles{display:flex;gap:.4rem;flex-wrap:wrap;padding:.4rem 1rem;max-width:1200px;margin:0 auto}
.toggle-btn{background:none;border:1px solid var(--line-strong);padding:.22rem .7rem;border-radius:100px;font-size:.68rem;cursor:pointer;color:var(--ink-soft);font-family:'Inter',sans-serif;font-weight:500;display:inline-flex;align-items:center;gap:.3rem;transition:all .15s}
.toggle-btn .tbdot{width:7px;height:7px;border-radius:50%;display:inline-block}
.toggle-btn.on{color:var(--ink);border-color:var(--ink)}
.toggle-btn.on.ferie{background:rgba(200,85,61,.1);border-color:var(--coral);color:var(--coral)}
.toggle-btn.on.vac{background:rgba(45,95,124,.1);border-color:var(--ocean);color:var(--ocean)}
.zone-select{background:var(--sand-light);border:1px solid var(--line-strong);padding:.22rem .55rem;border-radius:100px;font-size:.68rem;font-family:'Inter',sans-serif;color:var(--ink-soft);cursor:pointer;display:none}
.zone-select.show{display:inline-block}

/* ── BANDEAU DE SÉLECTION (sticky, corail, étapes 1/2 et 2/2) ── */
.select-hint{
  position:sticky;top:0;z-index:60;
  background:var(--coral);color:white;
  display:none;align-items:center;justify-content:space-between;gap:.6rem;
  padding:.55rem .9rem;font-family:'Inter',sans-serif;
  box-shadow:0 2px 10px rgba(200,85,61,.35);
  animation:slideDown .25s ease;
}
.select-hint.show{display:flex}
.select-hint .sh-step{
  background:rgba(255,255,255,.22);color:white;
  font-size:.62rem;font-weight:700;letter-spacing:.08em;
  padding:.18rem .55rem;border-radius:100px;flex-shrink:0;
}
.select-hint .sh-msg{
  flex:1;font-family:'Fraunces',serif;font-style:italic;
  font-size:.92rem;line-height:1.2;
}
.select-hint .sh-msg .sh-date{
  display:inline-block;background:rgba(255,255,255,.95);color:var(--coral);
  font-family:'Inter',sans-serif;font-style:normal;font-weight:600;
  padding:.05rem .4rem;border-radius:3px;margin-left:.3rem;font-size:.82rem;
}
.select-hint .sh-cancel{
  background:rgba(0,0,0,.18);color:white;border:none;
  padding:.32rem .75rem;border-radius:3px;font-size:.72rem;font-weight:600;
  cursor:pointer;font-family:'Inter',sans-serif;flex-shrink:0;
}
.select-hint .sh-cancel:active{background:rgba(0,0,0,.32)}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

/* ── CELLULE ARRIVÉE : fond corail plein, texte blanc, label "ARRIVÉE" ── */
.cal-cell.is-arrival,
.big-day.is-arrival{
  background:var(--coral) !important;
  color:white !important;
}
.cal-cell.is-arrival .day-num-sm,
.big-day.is-arrival .big-day-num{
  color:white !important;font-weight:800;opacity:1;
}
.cal-cell.is-arrival .ferie-lbl,
.big-day.is-arrival .ferie-name{
  color:white !important;
}
.cal-cell.is-arrival::after{
  content:'ARRIVÉE';
  position:absolute;left:0;right:0;bottom:2px;
  text-align:center;
  color:white;font-size:.48rem;font-weight:800;letter-spacing:.06em;
  font-family:'Inter',sans-serif;
  pointer-events:none;
}
.big-day.is-arrival::after{
  content:'ARRIVÉE';
  position:absolute;left:0;right:0;bottom:3px;
  text-align:center;
  color:white;font-size:.6rem;font-weight:800;letter-spacing:.08em;
  font-family:'Inter',sans-serif;
  pointer-events:none;
}

/* ── VUES ── */
.view{max-width:1200px;margin:.8rem auto;padding:0 .75rem 4rem;display:none}
.view.active{display:block}

/* ══════════════════════
   VUE ANNÉE — cellules uniformes, bandes de séjour en overlay
   ══════════════════════ */
.year-nav{display:flex;justify-content:center;align-items:center;gap:1rem;margin-bottom:.75rem}
.nav-btn{background:none;border:1px solid var(--line-strong);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.05rem;color:var(--ink-soft);display:flex;align-items:center;justify-content:center}
.nav-btn:active{background:var(--ink);color:var(--sand)}
.year-lbl{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:500;font-style:italic;min-width:80px;text-align:center}
.year-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem}
.month-card{background:var(--sand-light);border:1px solid var(--line);border-radius:5px;overflow:hidden}
.month-header{display:flex;justify-content:space-between;align-items:baseline;padding:.5rem .7rem .35rem;background:var(--stone);border-bottom:1px solid var(--line-strong)}
.month-name-lbl{font-family:'Fraunces',serif;font-size:.95rem;font-weight:500;color:var(--ink);text-transform:capitalize}
.month-nights{font-size:.63rem;color:var(--slate);font-style:italic;font-family:'Fraunces',serif}

/* Wrapper qui contient grille + overlay des bandes */
.cal-wrap{position:relative}

/* En-tête de calendrier (jours de la semaine) — hors grille pour éviter conflit */
.cal-head{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  background:var(--stone);
  border-bottom:1px solid var(--line-strong);
}
.cal-head-cell{
  font-size:.55rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:var(--slate);text-align:center;
  padding:.3rem .1rem;
  border-right:1px solid var(--line);
}
.cal-head-cell:last-child{border-right:none}

/* Conteneur relatif autour de la grille pour l'overlay */
.cal-body-wrap{position:relative}

/* Grille des jours — toutes cellules 38px identiques */
.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-auto-rows:38px;
  gap:0;
  position:relative;
}

/* Variante "grande" pour vue Mois : plus de place, cellules 70px */
.cal-grid.big{
  grid-auto-rows:70px;
}
.cal-grid.big + .cal-bands .cal-band{
  height:24px;
  font-size:.78rem;
}
.cal-grid.big ~ .cal-bands .cal-band{
  height:24px;
  font-size:.78rem;
}
/* Numéro plus grand en vue Mois */
.cal-grid.big .day-num-sm{
  font-size:.8rem;
  opacity:1;
  color:var(--ink-soft);
}
.cal-grid.big .cal-cell{padding:5px 7px}

/* Label du jour férié (visible uniquement en vue Mois grâce à la taille) */
.ferie-lbl{
  display:block;
  font-size:.58rem;
  color:var(--coral);
  font-style:italic;
  font-weight:400;
  margin-top:2px;
  line-height:1.1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.cal-grid:not(.big) .ferie-lbl{display:none} /* masquer en mini */

/* Cellule jour : propre, numéro en haut à gauche, fond uniforme */
.cal-cell{
  position:relative;
  background:white;
  cursor:pointer;user-select:none;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:3px 5px;
}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell.empty{background:rgba(0,0,0,.02);cursor:default;pointer-events:none}
.cal-cell.is-ferie{background:var(--ferie-bg)}
.cal-cell.is-vac{background:var(--vac-bg)}
.cal-cell.is-ferie.is-vac{background:linear-gradient(135deg,var(--ferie-bg) 50%,var(--vac-bg) 50%)}
.cal-cell.today .day-num-sm{color:var(--coral);font-weight:800}

/* Numéro petit, en haut à gauche, discret */
.day-num-sm{
  font-size:.6rem;
  color:var(--slate);
  line-height:1;
  font-weight:500;
  opacity:.75;
  pointer-events:none;
}
.day-num-sm.ferie-mark{color:var(--coral);font-weight:700;opacity:1}

/* OVERLAY : les bandes de séjours, positionnées par-dessus la grille */
.cal-bands{
  position:absolute;
  inset:0;
  pointer-events:none;
}
.cal-band{
  position:absolute;
  height:20px;
  border-radius:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 6px;
  color:white;
  font-size:.65rem;
  font-weight:600;
  letter-spacing:.01em;
  pointer-events:auto;
  cursor:pointer;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  box-shadow:0 1px 2px rgba(0,0,0,.08);
  transition:transform .1s ease, box-shadow .1s ease;
}
.cal-band:hover{transform:translateY(-1px);box-shadow:0 2px 5px rgba(0,0,0,.12)}
.cal-band-continues-left{border-top-left-radius:0;border-bottom-left-radius:0}
.cal-band-continues-right{border-top-right-radius:0;border-bottom-right-radius:0}

/* Sélection visuelle */
.cal-cell.sel-start,.cal-cell.sel-end-hover{background:rgba(200,85,61,.15)!important}
.cal-cell.sel-range{background:rgba(200,85,61,.07)!important}

/* ── VUE MOIS ── */
.month-nav{display:flex;justify-content:center;align-items:center;gap:1rem;margin-bottom:1rem}
.current-month{font-family:'Fraunces',serif;font-size:1.25rem;font-weight:500;font-style:italic;min-width:200px;text-align:center;text-transform:capitalize}
.big-cal{background:var(--sand-light);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.big-cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--stone)}
.big-cal-head div{padding:.42rem .2rem;text-align:center;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.big-cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.big-day{min-height:62px;padding:.28rem .28rem;border-right:1px solid var(--line);border-bottom:1px solid var(--line);cursor:pointer;user-select:none;position:relative;background:white}
.big-day.empty{background:rgba(0,0,0,.015);cursor:default;pointer-events:none}
.big-day:nth-child(7n){border-right:none}
.big-day.is-ferie{background:var(--ferie-bg)}
.big-day.is-vac{background:var(--vac-bg)}
.big-day-num{font-size:.76rem;color:var(--ink-soft);font-weight:500;display:flex;align-items:center;gap:3px}
.big-day-num .ferie-name{font-size:.58rem;color:var(--coral);font-style:italic;font-weight:400;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px}
.big-day.today .big-day-num{color:var(--coral);font-weight:700}
.big-day-booking{margin-top:3px;font-size:.62rem;padding:2px 5px;border-radius:2px;color:white;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.big-day.sel-start,.big-day.sel-end-hover{background:rgba(200,85,61,.15)!important}
.big-day.sel-range{background:rgba(200,85,61,.07)!important}
.legend{margin-top:1rem;padding:.8rem 1rem;background:var(--sand-light);border:1px solid var(--line);border-radius:4px}
.legend-title{font-family:'Fraunces',serif;font-size:.82rem;font-style:italic;color:var(--ink);margin-bottom:.45rem}
.legend-items{display:flex;flex-wrap:wrap;gap:.4rem .7rem}
.legend-item{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--ink-soft)}
.legend-dot{width:11px;height:11px;border-radius:2px}

/* ── LISTE ── */
.filter-bar{margin-bottom:.7rem;display:flex;gap:.3rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:.63rem;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;margin-right:.2rem;font-weight:600}
.chip{background:var(--sand-light);border:1px solid var(--line-strong);padding:.22rem .65rem;border-radius:100px;font-size:.7rem;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;gap:.3rem;font-family:'Inter',sans-serif}
.chip .dot{width:6px;height:6px;border-radius:50%}
.chip.active{background:var(--ink);color:var(--sand-light);border-color:var(--ink)}
.list-yr-head{font-family:'Fraunces',serif;font-size:.82rem;font-style:italic;color:var(--slate);margin:1rem 0 .4rem;padding-left:.2rem}
.list-yr-head:first-child{margin-top:.2rem}
.list-booking{background:var(--sand-light);border:1px solid var(--line);border-left:4px solid;border-radius:3px;padding:.75rem .95rem;margin-bottom:.45rem;display:grid;grid-template-columns:auto 1fr auto;gap:.85rem;align-items:center;cursor:pointer}
.list-booking.past{opacity:.52}
.list-date-range{font-family:'Fraunces',serif;font-size:.92rem;font-weight:500;color:var(--ink);font-style:italic}
.list-nights{font-size:.6rem;color:var(--slate);margin-top:2px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
.list-info{min-width:0}
.list-name{font-weight:600;font-size:.9rem;color:var(--ink)}
.list-meta{font-size:.72rem;color:var(--slate);margin-top:1px}
.list-comment{font-size:.72rem;color:var(--ink-soft);margin-top:3px;font-style:italic}
.list-edit{font-size:.95rem;color:var(--slate);padding:.3rem}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--slate)}

/* ── HISTORIQUE ── */
.history-entry{background:var(--sand-light);border:1px solid var(--line);border-left:3px solid var(--slate);border-radius:3px;padding:.65rem .9rem;margin-bottom:.4rem}
.history-time{font-size:.62rem;color:var(--slate);margin-bottom:.18rem;font-weight:600;letter-spacing:.04em}
.history-action{font-size:.8rem;color:var(--ink)}
.history-detail{font-size:.72rem;color:var(--ink-soft);font-style:italic;margin-top:.1rem}
.history-who{display:inline-block;padding:.05rem .35rem;border-radius:2px;color:white;font-size:.65rem;font-weight:600;margin-right:.3rem;vertical-align:middle}

/* ── STATS ONGLET ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.stats-year-block{background:var(--sand-light);border:1px solid var(--line);border-radius:5px;padding:1.1rem 1rem}
.stats-year-title{font-family:'Fraunces',serif;font-size:1.3rem;font-style:italic;color:var(--ocean-deep);margin-bottom:.8rem;text-align:center}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:.4rem 0;border-bottom:1px solid var(--line)}
.stat-row:last-child{border-bottom:none}
.stat-row-label{font-size:.75rem;color:var(--ink-soft)}
.stat-row-val{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:500;color:var(--ink)}
.stat-row-val.record{color:var(--coral)}
.stats-people{margin-top:1rem}
.stats-people-title{font-family:'Fraunces',serif;font-size:.85rem;font-style:italic;color:var(--ink);margin-bottom:.6rem}
.people-row{display:flex;align-items:center;gap:.6rem;margin-bottom:.35rem}
.people-bar-wrap{flex:1;background:var(--stone);border-radius:100px;height:8px;overflow:hidden}
.people-bar{height:100%;border-radius:100px;transition:width .4s ease}
.people-label{font-size:.7rem;color:var(--ink-soft);min-width:90px}
.people-val{font-size:.72rem;color:var(--slate);min-width:50px;text-align:right}

/* ── BOUTON INFO ZONES + MODAL ZONES ── */
.zone-info-btn{
  background:var(--sand-light);
  border:1px solid var(--line-strong);
  color:var(--ocean);
  width:24px;height:24px;border-radius:50%;
  font-size:.85rem;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Fraunces',serif;font-style:italic;
  padding:0;line-height:1;
  transition:all .15s;
}
.zone-info-btn:active{background:var(--ocean);color:white}
.modal-zones .zone-card{
  background:var(--sand);
  border:1px solid var(--line);
  border-left:4px solid;
  border-radius:4px;
  padding:.7rem .9rem;
  margin-bottom:.55rem;
}
.modal-zones .zone-card.zA{border-left-color:#c8553d}
.modal-zones .zone-card.zB{border-left-color:#b8862e}
.modal-zones .zone-card.zC{border-left-color:#8b4d3a}
.modal-zones .zone-card-title{
  font-family:'Fraunces',serif;
  font-size:1rem;font-weight:500;font-style:italic;
  color:var(--ink);margin-bottom:.25rem;
}
.modal-zones .zone-acads{
  font-size:.78rem;color:var(--ink-soft);line-height:1.5;
}

/* ── ONGLET RECETTES ── */
.rec-toolbar{
  max-width:1200px;margin:0 auto .7rem;padding:0 .75rem;
  display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;
}
.rec-search{
  flex:1;min-width:180px;max-width:380px;
  padding:.55rem .9rem;border:1px solid var(--line-strong);
  background:white;border-radius:100px;
  font-family:'Inter',sans-serif;font-size:.85rem;color:var(--ink);
}
.rec-search:focus{outline:none;border-color:var(--ocean)}
.rec-filters{
  max-width:1200px;margin:0 auto .8rem;padding:0 .75rem;
  display:flex;gap:.3rem;flex-wrap:wrap;
}
.rec-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:.75rem;
}
.rec-card{
  background:var(--sand-light);
  border:1px solid var(--line);
  border-radius:5px;
  overflow:hidden;
  cursor:pointer;
  display:flex;flex-direction:column;
  transition:transform .12s ease, box-shadow .12s ease;
}
.rec-card:active{transform:translateY(1px)}
.rec-card:hover{box-shadow:0 4px 12px rgba(29,43,54,.08)}
.rec-card-img{
  width:100%;aspect-ratio:4/3;
  background:var(--stone);

}
.rec-card-preview{

.modal-rec-read .rec-read-author{

}
.modal-rec-read .rec-read-photos{

.modal-rec-read .rec-section-title:first-child{margin-top:0}
.modal-rec-read .rec-section-body{

}
.modal-rec-read .rec-section-body strong{color:var(--coral);font-weight:600}

.rec-photos-edit{

}
.rec-photo-thumb{

}
.rec-photo-thumb .rec-photo-del{

  display:flex;align-items:center;justify-content:center;
  padding:0;

.rec-photo-add-btn{font-size:.78rem}

.rec-lightbox-close{

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:var(--sand-light);padding:.65rem 1.2rem;border-radius:3px;font-size:.82rem;z-index:200;transition:transform .3s;box-shadow:0 8px 24px rgba(0,0,0,.25)}

function colorFor(name){
  if(!name)return'#6b7a85';
  const n=name.trim().toLowerCase();let h=0;
  for(let i=0;i<n.length;i++){h=((h<<5)-h)+n.charCodeAt(i);h|=0}
  return PAL[Math.abs(h)%PAL.length];
}
function d2i(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function addD(iso,n){const d=new Date(iso+'T00:00');d.setDate(d.getDate()+n);return d2i(d)}
function fmtS(iso){return new Date(iso+'T00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
function fmtL(iso){return new Date(iso+'T00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}
function fmtDT(ts){return new Date(ts).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function nights(a,b){return Math.max(1,Math.round((new Date(b+'T00:00')-new Date(a+'T00:00'))/86400000))}
function bkAt(iso){return bookings.find(b=>iso>=b.start&&iso<b.end)}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// === HELPERS NOM (compat ancien format) ===
// `occupants` = qui vient (affiché sur le calendrier)
// `bookedBy`  = référent qui a réservé, vide si identique
// L'ancien format n'a que `name` → on le considère comme occupants
function bkLabel(b){
  if(!b)return'';
  return (b.occupants||b.name||'').trim();
}
function bkBookedBy(b){
  if(!b)return'';
  const v=(b.bookedBy||'').trim();
  // Si bookedBy est identique aux occupants, on n'affiche rien
  if(!v||v===bkLabel(b))return'';
  return v;
}
function uniqNames(){
  return[...new Set(bookings.map(b=>bkLabel(b)))].filter(Boolean).sort();
}
function shortN(name){
  if(!name)return'';
  let n=name.replace(/\s*\(.*?\)/g,'').trim();
  const m=n.match(/^(.+?)\s+et\s+(.+)$/i);
  if(m){const a=m[1].trim(),b=m[2].trim().split(/[-\s]/)[0];return a+'&'+b}
  return n;
}
function buildVacSet(){
  vacSet.clear();
  const periods=VAC_ZONES[zone]||[];
  periods.forEach(p=>{
    let c=p.s;
    // end est le dernier jour inclus → on va jusqu'à e inclus
    const eNext=addD(p.e,1);
    while(c<eNext){vacSet.add(c);c=addD(c,1)}
  });
}
function isVac(iso){return showVac&&vacSet.has(iso)}
function isFerie(iso){return showFerie&&!!FERIES[iso]}

async function load(){
  // Première charge : on lit une fois
  try{
    const [bkSnap, hSnap] = await Promise.all([get(bookingsRef), get(historyRef)]);
    bookings = bkSnap.exists() ? parseFbCollection(bkSnap.val()) : [];
    history = hSnap.exists() ? parseFbCollection(hSnap.val()) : [];

    // Si base vide, injecter les seeds
    if(!bookings.length){
      bookings = [...SEED];
      await saveBookings(false);
    }
    setConnState(true);
  }catch(e){
    console.error('Firebase load error:', e);
    bookings = [...SEED];
    history = [];
    setConnState(false);
  }
  updateStatus();
  render();

  // Écoute temps réel : dès que quelqu'un modifie, on recharge
  onValue(bookingsRef, (snap)=>{
    bookings = snap.exists() ? parseFbCollection(snap.val()) : [];
    updateStatus();render();
  }, (err)=>{console.error('Listen bookings error:', err);setConnState(false)});

  onValue(historyRef, (snap)=>{
    history = snap.exists() ? parseFbCollection(snap.val()) : [];
    renderHistoryView();
  }, (err)=>{console.error('Listen history error:', err)});
}

// Transforme l'objet Firebase en tableau, en filtrant les clés techniques (_pass)
function parseFbCollection(val){
  return Object.entries(val)
    .filter(([k,v]) => !k.startsWith('_') && typeof v === 'object' && v !== null)
    .map(([k,v]) => v);
}

async function saveBookings(notify=true){
  try{
    const obj = { _pass: FAMILY_PASS };
    bookings.forEach(b=>{obj[b.id]=b});
    await set(bookingsRef, obj);
  }catch(e){
    console.error('Firebase save error:',e);
    if(notify)toast('Erreur de sauvegarde — vérifiez votre connexion');
  }
}

async function saveHistory(){
  try{
    const last = history.slice(-100);
    const obj = { _pass: FAMILY_PASS };
    last.forEach((h,i)=>{obj['h_'+String(h.ts)+'_'+i]=h});
    await set(historyRef, obj);
  }catch(e){console.error('Firebase history save error:',e)}
}
function addHistory(action,bk,extra){
  history.push({
    ts:Date.now(),
    action,
    occupants:bkLabel(bk),
    bookedBy:bkBookedBy(bk),
    start:bk.start,
    end:bk.end,
    comment:bk.comment||'',
    extra:extra||''
  });
  saveHistory();
}
function updateStatus(){
  const n=bookings.length;
  document.getElementById('status').textContent=n===0?'Aucun séjour':n+' séjour'+(n>1?'s':'')+' enregistré'+(n>1?'s':'');
}

// Index stable des prénoms (pour alternance de 2 couleurs)
function bookingColorIdx(booking){
  // Alternance simple selon l'ordre chronologique des séjours
  // Tous les séjours triés par start, puis index pair/impair
  const sorted=[...bookings].sort((a,b)=>a.start.localeCompare(b.start));
  const idx=sorted.findIndex(b=>b.id===booking.id);
  return idx%2;
}

const BAND_COLORS=['#c8553d','#b8862e']; // corail malouin & ocre ajonc, alternance chaude

function drawBands(gridEl,overlay,monthIdx,daysInMonth,firstWeekday,year){
  overlay.innerHTML='';

  const allCells=[...gridEl.children];
  if(!allCells.length)return;

  const jourCell=allCells.find(el=>!el.classList.contains('empty'));
  if(!jourCell)return;

  const cellW=jourCell.offsetWidth;
  const cellH=jourCell.offsetHeight;
  // Hauteur de bande selon taille de cellule
  const isBig=gridEl.classList.contains('big');
  const bandH=isBig?24:20;

  // Pour chaque séjour qui intersecte ce mois
  const yr = year !== undefined ? year : curYearView;
  const monthStart=new Date(yr,monthIdx,1);
  const monthEnd=new Date(yr,monthIdx+1,0);
  const monthStartIso=d2i(monthStart);
  const nextMonthIso=addD(d2i(monthEnd),1);

  const bkInMonth=bookings.filter(b=>b.start<nextMonthIso && b.end>monthStartIso);

  bkInMonth.forEach(b=>{
    const visStart=b.start<monthStartIso?monthStartIso:b.start;
    const visEnd=b.end>nextMonthIso?nextMonthIso:b.end;
    const continuesLeft=b.start<monthStartIso;
    const continuesRight=b.end>nextMonthIso;

    let c=visStart;
    while(c<visEnd){
      // Trouver la cellule de `c` dans allCells
      const cell=allCells.find(el=>el.dataset && el.dataset.iso===c);
      if(!cell)break;

      const dateC=new Date(c+'T00:00');
      let dow=dateC.getDay();dow=dow===0?6:dow-1;
      const daysUntilEndOfWeek=6-dow;
      let bandEndIso=addD(c,daysUntilEndOfWeek+1);
      if(bandEndIso>visEnd)bandEndIso=visEnd;

      // Position de la cellule de départ dans la grille
      const startIdx=allCells.indexOf(cell);
      const row=Math.floor(startIdx/7);
      const col=startIdx%7;
      const spanDays=Math.round((new Date(bandEndIso+'T00:00')-new Date(c+'T00:00'))/86400000);

      // Géométrie dans bodyWrap (overlay et grille au même niveau)
      const left=col*cellW+2;
      const width=spanDays*cellW-4;
      // Position : bande en bas de la cellule, laisse de la place pour le numéro en haut
      const top=row*cellH + cellH - bandH - 2;

      const band=document.createElement('div');
      band.className='cal-band';
      band.style.left=left+'px';
      band.style.width=width+'px';
      band.style.top=top+'px';
      band.style.height=bandH+'px';
      band.style.background=BAND_COLORS[bookingColorIdx(b)];

      const isBandFirst=c===visStart;
      const isBandLast=bandEndIso===visEnd;
      // Chaque bande (sauf la première du séjour) "continue à gauche"
      if(!isBandFirst||continuesLeft)band.classList.add('cal-band-continues-left');
      if(!isBandLast||continuesRight)band.classList.add('cal-band-continues-right');

      band.textContent=shortN(bkLabel(b));
      band.title=`${bkLabel(b)} · ${fmtS(b.start)} → ${fmtS(b.end)}`;
      band.addEventListener('click',e=>{e.stopPropagation();openEdit(b)});

      overlay.appendChild(band);

      c=bandEndIso;
    }
  });
}

function setHint(step,msg){
  const hint=document.getElementById('selectHint');
  document.getElementById('shStep').textContent=step;
  document.getElementById('shMsg').innerHTML=msg;
  hint.classList.add('show');

function handleCellClick(iso,bk){
  if(selState===null){
    if(bk){openEdit(bk);return}
    selState={start:iso};
    setHint('2/2',`Arrivée : <span class="sh-date">${fmtS(iso)}</span> · Cliquez maintenant la date de <strong>départ</strong>`);
    updateSelVis(iso);return;
  }
  if(selState.start===null){
    if(bk){openEdit(bk);cancelSel();return}
    selState={start:iso};
    setHint('2/2',`Arrivée : <span class="sh-date">${fmtS(iso)}</span> · Cliquez maintenant la date de <strong>départ</strong>`);
    updateSelVis(iso);return;
  }
  let s=selState.start,e=iso;
  if(e<s){const t=s;s=e;e=t}
  cancelSel();
  openNewModal(s,addD(e,1));
}
function handleHover(iso){if(!selState||!selState.start)return;updateSelVis(iso)}
function updateSelVis(hover){
  if(!selState||!selState.start)return;
  const lo=selState.start<=hover?selState.start:hover;
  const hi=selState.start<=hover?hover:selState.start;
  document.querySelectorAll('[data-iso]').forEach(el=>{
    const d=el.dataset.iso;
    el.classList.remove('sel-start','sel-range','sel-end-hover');
    if(d===selState.start)el.classList.add('sel-start');
    else if(d>lo&&d<hi)el.classList.add('sel-range');
    else if(d===hover&&d!==selState.start)el.classList.add('sel-end-hover');
  });
}
function cancelSel(){
  selState=null;
  document.getElementById('selectHint').classList.remove('show');
  document.querySelectorAll('[data-iso]').forEach(el=>el.classList.remove('sel-start','sel-range','sel-end-hover'));
}

function updateNewDatesInfo(){
  const s=document.getElementById('fnStart').value;
  const e=document.getElementById('fnEnd').value;
  const info=document.getElementById('newDatesInfo');
  if(!s||!e){info.textContent='Sélectionnez les dates';info.style.color='var(--coral)';return}
  if(e<=s){info.textContent='⚠ La date de départ doit être après l\'arrivée';info.style.color='var(--coral)';return}
  const n=nights(s,e);
  info.style.color='';
  info.textContent=`${fmtL(s)} → ${fmtL(addD(e,-1))} · ${n} nuit${n>1?'s':''}`;
}
function openNewModal(s,e){
  newS=s;newE=e;
  // Pré-remplir les dates dans les champs (modifiables)
  document.getElementById('fnStart').value=s;
  document.getElementById('fnEnd').value=e;
  updateNewDatesInfo();
  document.getElementById('fnOccupants').value='';
  document.getElementById('fnBookedBy').value='';
  document.getElementById('fnComment').value='';
  const cf=bookings.find(b=>!(e<=b.start||s>=b.end));
  if(cf&&!confirm(`⚠️ Chevauchement avec ${bkLabel(cf)}.\nContinuer ?`))return;
  document.getElementById('modalNew').classList.add('show');
  setTimeout(()=>document.getElementById('fnOccupants').focus(),200);
}
function cancelNew(){document.getElementById('modalNew').classList.remove('show')}
async function saveNew(){
  const occupants=document.getElementById('fnOccupants').value.trim();
  const bookedBy=document.getElementById('fnBookedBy').value.trim();
  const start=document.getElementById('fnStart').value;
  const end=document.getElementById('fnEnd').value;
  if(!occupants){toast('Indiquez qui vient');return}
  if(!start||!end||end<=start){toast('Dates invalides');return}
  // Re-vérifier les chevauchements avec les dates (potentiellement modifiées)
  const cf=bookings.find(b=>!(end<=b.start||start>=b.end));
  if(cf&&!confirm(`⚠️ Chevauchement avec ${bkLabel(cf)}.\nContinuer ?`))return;
  const bk={
    id:'b_'+Date.now(),
    occupants,
    bookedBy:bookedBy||'',
    start,
    end,
    comment:document.getElementById('fnComment').value.trim(),
    createdAt:new Date().toISOString()
  };
  bookings.push(bk);
  addHistory('Ajout',bk);
  await saveBookings();cancelNew();await load();toast('Séjour ajouté ✓');
}
function openEdit(b){
  editingId=b.id;
  document.getElementById('fOccupants').value=bkLabel(b);
  document.getElementById('fBookedBy').value=(b.bookedBy||'');
  document.getElementById('fStart').value=b.start;
  document.getElementById('fEnd').value=b.end;
  document.getElementById('fComment').value=b.comment||'';
  document.getElementById('modal').classList.add('show');
}
function closeEdit(){document.getElementById('modal').classList.remove('show');editingId=null}
async function saveBk(){
  const occupants=document.getElementById('fOccupants').value.trim();
  const bookedBy=document.getElementById('fBookedBy').value.trim();
  const start=document.getElementById('fStart').value,end=document.getElementById('fEnd').value;
  if(!occupants||!start||!end||end<=start){toast('Données invalides');return}
  const cf=bookings.find(b=>b.id!==editingId&&!(end<=b.start||start>=b.end));
  if(cf&&!confirm(`⚠️ Conflit avec ${bkLabel(cf)}. Continuer ?`))return;
  const idx=bookings.findIndex(b=>b.id===editingId);
  if(idx>=0){
    const old=bookings[idx];
    // Nettoyer les anciens champs (name, people) si présents pour avoir un objet propre
    const updated={
      id:old.id,
      occupants,
      bookedBy:bookedBy||'',
      start,
      end,
      comment:document.getElementById('fComment').value.trim(),
      createdAt:old.createdAt||new Date().toISOString()
    };
    addHistory('Modification',updated,`Avant : ${bkLabel(old)} ${fmtS(old.start)}→${fmtS(old.end)}`);
    bookings[idx]=updated;
  }
  await saveBookings();closeEdit();await load();toast('Séjour modifié');
}
async function deleteBk(){
  const b=bookings.find(x=>x.id===editingId);if(!b)return;
  if(!confirm(`Supprimer le séjour de ${bkLabel(b)} ?`))return;
  addHistory('Suppression',b);
  bookings=bookings.filter(x=>x.id!==editingId);
  await saveBookings();closeEdit();await load();toast('Séjour supprimé');
}

function renderList(){
  const body=document.getElementById('listBody'),fb=document.getElementById('filterBar');
  fb.innerHTML='<span class="filter-label">Filtrer</span>';
  const all=document.createElement('button');all.className='chip'+(activeFilter==='all'?' active':'');all.textContent='Tous';
  all.onclick=()=>{activeFilter='all';renderList()};fb.appendChild(all);
  uniqNames().forEach(n=>{
    const c=document.createElement('button');c.className='chip'+(activeFilter===n?' active':'');
    c.innerHTML=`<span class="dot" style="background:${colorFor(n)}"></span>${esc(n)}`;
    c.onclick=()=>{activeFilter=n;renderList()};fb.appendChild(c);
  });
  let f=[...bookings];
  if(activeFilter!=='all')f=f.filter(b=>bkLabel(b)===activeFilter);
  f.sort((a,b)=>a.start.localeCompare(b.start));
  if(!f.length){body.innerHTML=`<div class="empty-state"><div style="font-size:1.8rem;opacity:.4;margin-bottom:.5rem">⚓</div><div>Aucun séjour.</div></div>`;return}
  const today=d2i(new Date());body.innerHTML='';
  const byY={};f.forEach(b=>{const y=b.start.slice(0,4);if(!byY[y])byY[y]=[];byY[y].push(b)});
  Object.keys(byY).sort().forEach(yr=>{
    const h=document.createElement('div');h.className='list-yr-head';h.textContent=yr;body.appendChild(h);
    byY[yr].forEach(b=>{
      const past=b.end<=today,n=nights(b.start,b.end);
      const lbl=bkLabel(b),resa=bkBookedBy(b);
      const card=document.createElement('div');card.className='list-booking'+(past?' past':'');
      card.style.borderLeftColor=colorFor(lbl);
      card.innerHTML=`<div><div class="list-date-range">${fmtS(b.start)} → ${fmtS(b.end)}</div><div class="list-nights">${n} nuit${n>1?'s':''}</div></div><div class="list-info"><div class="list-name">${esc(lbl)}</div>${resa?`<div class="list-meta">Réservé par ${esc(resa)}</div>`:''}${b.comment?`<div class="list-comment">« ${esc(b.comment)} »</div>`:''}</div><div class="list-edit">✎</div>`;
      card.onclick=()=>openEdit(b);body.appendChild(card);
    });
  });
}

    `;

  });

function computeStats(yr){
  const s0=yr+'-01-01',s1=(yr+1)+'-01-01';
  const occ=new Set();let stays=0;
  bookings.forEach(b=>{
    const s=b.start<s0?s0:b.start,e=b.end>s1?s1:b.end;
    if(s>=e)return;stays++;let c=s;
    while(c<e){occ.add(c);c=addD(c,1)}
  });
  const sorted=[...occ].sort();
  let mx=0,cur=0,prev=null;
  for(const d of sorted){cur=(prev&&addD(prev,1)===d)?cur+1:1;if(cur>mx)mx=cur;prev=d}
  return{days:occ.size,stays,record:mx};
}

function renderStatsView(){
  const body=document.getElementById('statsBody');
  const s25=computeStats(2025),s26=computeStats(2026);

  function yearBlock(yr,s){
    return`<div class="stats-year-block">
      <div class="stats-year-title">${yr}</div>
      <div class="stat-row"><span class="stat-row-label">Jours occupés</span><span class="stat-row-val">${s.days}</span></div>
      <div class="stat-row"><span class="stat-row-label">Séjours</span><span class="stat-row-val">${s.stays}</span></div>
      <div class="stat-row"><span class="stat-row-label">Record d'affilée</span><span class="stat-row-val record">${s.record}</span></div>
    </div>`;
  }
  body.innerHTML=`<div class="stats-grid">${yearBlock(2025,s25)}${yearBlock(2026,s26)}</div>`;
}

réparez la sauce :\n\nEpluchez et écrasez le gingembre en purée, coupez les oignons en lamelles, écrasez l’ail, coupez les tomates en quartiers et épépinez-les.\n\nFaites chauffer l’huile, jetez-y les oignons, l’ail et le gingembre, faites revenir. Ajoutez un verre d’eau tiède, la sauce de soja, les champignons, les tomates, le vinaigre et le sucre. Faites cuire 7 à 8 minutes à feu doux.\n\nDécortiquez les crevettes, enrobez-les de pâte et faites les frire dans l’huile de friture.\n\nDélayez la fécule avec 2 cuillerées à soupe d’eau froide, versez dans la sauce pour l’épaissir et vérifier l’assaisonnement.\n\nServez les beignets avec la sauce saupoudrée de coriandre hachée et accompagnez de riz nature.","source":"louli"},{"id":"lo_004","titre":"Biscuit au beurre","auteur":"Simone","ingredients":"**Ingrédients :**\n125 g de sucre\n50 g de farine\n50 g de fécule\n75 g de beurre\n4 oeufs","preparation":"Mélanger le sucre et les jaunes d’œufs jusqu’à ce que le mélange blanchisse. Ajouter la fécule mélangée à la farine puis les blancs battus en neige ferme. Ajouter le beurre fondu à la fin.\n\nVerser le mélange dans un moule plat carré beurré (genre couvercle de boîte de biscuits)\n\nFaire cuire à four doux","source":"louli"},{"id":"lo_005","titre":"Bisque d’étrilles","auteur":"Louis","ingredients":"","preparation":"**Ingrédients pour 4 personnes:**\n900 g d'étrilles,  rincées\n50 g de beurre\n50 g de carottes et 50 g de céleri, grossièrement hachés\n1 feuille de laurier\n2 c. à soupe de cognac\n4 tomates coupées en tranches\n1 c. à café de concentré de tomates\n7,5 cl de vin blanc sec\n1 tige d'estragon\n1,75 litre de fumet de poisson\n4 c. à soupe de crème fraîche\n1 pincée de poivre de Cayenne\n2 c. à café de jus de citron\nSel et poivre noir fraîchement moulu\n**Recette :**\n1-Portez  à ébullition une grande marmite d'eau bien salée. Plongez-y les étrilles, laissez l'ébullition reprendre,  comptez 2 minutes de cuisson et égouttez. Laissez refroidir et hachez grossièrement les carapaces.\n2- Faites fondre le beurre dans une grande casserole à fond épais et commencez par faire  cuire les légumes avec le laurier pendant 3 ou 4 minutes, sans les faire colorer.\n3- Versez le cognac, laissez cuire  à feu vif pour faire réduire.\n4-Ajoutez les tomates coupées, le concentré de tomate, le vin, I'estragon, et le fumet de poisson. Portez à ébullition puis laissez mijoter lentement pendant 30 minutes.\n5-Mixez  sommairement la soupe pour réduire les carapaces en morceaux de la taille d'un petit pois.\n6- Filtrez-la  ensuite à travers une passoire conique en pressant bien avec une petite louche pour extraire le maximum  de jus possible. Repassez-la une seconde fois dans une passoire encore plus fine.\n7- Replacez cette soupe sur le feu et faites-la cuire un moment pour en concentrer les arômes. A feu doux, ajoutez la crème, le poivre de Cayenne et le jus de citron.\nSalez et poivrez à votre goût.","source":"louli"},{"id":"lo_006","titre":"Blanquette de veau","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n1,200 Kg de veau coupé en morceaux (sauté de veau avec ou sans os)\n6 carottes\n1 oignon\nSel, poivre\n3 cuillerées à soupe de Maïzena\n1 dcl de crème\nThym et laurier\nUtilisez une cocotte-minute pour réduire la cuisson. Sinon, utilisez une cocotte normale avec un peu plus d’eau et une cuisson plus longue.","preparation":"Faites revenir l’oignon coupé en quartier dans un peu de matière grasse. Ajoutez les morceaux de veau et les faire dorer sur toutes les faces. Ajoutez les carottes coupées en rondelles, le thym et le laurier. Couvrez légèrement d’eau et assaisonnez.\n\nFermez la cocotte et laissez cuire 45 minutes sous pression.\n\nA la fin de la cuisson, ôtez un peu de bouillon s’il y en a trop. Délayez la Maïzena dans un peu d’eau et ajoutez-la au bouillon pour l’épaissir. Ajoutez la crème.\n\nServez avec du riz nature.\n\n**Variante :** on peut ajouter des champignons blancs et un poireau.","source":"louli"},{"id":"lo_007","titre":"Blinis","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n250 g de farine\n3 œufs\n1 paquet de levure chimique\n1 yaourt nature\n1 dcl de crème\n1,5 dcl de lait","preparation":"Mélangez la farine, la levure et les œufs. Mélangez le yaourt, la crème et le lait et délayer la pâte avec ce mélange.\n\nLaissez reposer la pâte si possible.\n\nUtilisez une petite poêle que vous huilerez de temps en temps et cuisez les blinis.\n\nGarnissez avec du saumon fumé ou du jambon et du gruyère.","source":"louli"},{"id":"lo_008","titre":"Bœuf aux poivrons","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n450 g de bœuf (si possible, merlan), coupé en lanières\n2 cuillerées à soupe de sauce de soja\n1 cuillerée à café de Maïzena\n1 pincée de poivre\n6 poivrons épépinés et coupés en lanières\n1 cuillerée de sel\n7 cuillerées à soupe d'huile","preparation":"Mélangez au bœuf coupé en lanières 1 cuillerée à soupe de sauce de soja, 1 cuillère à café de Maïzena et 1 pincée de poivre.\n\nFaites sauter vivement les poivrons et le sel dans 3 cuillerées a à soupe d'huile et mettez–les de côté.\n\nFaites chauffer 4 cuillerées à soupe d'huile et jetez-y le bœuf.\n\nDès qu'il prend couleur, ajoutez les poivrons et 1 cuillerée de sauce de soja.\n\nLaissez encore 1 minute sur le feu, en remuant sans cesse.\n\nServez chaud.\n\n**Nota **: On peut, pour les rendre plus digestes, griller auparavant les poivrons sur le barbecue ou sur le gaz et les éplucher avant de les couper en lamelles; on y perd un peu de goût !","source":"louli"},{"id":"lo_009","titre":"Bouillabaisse","auteur":"Louli","ingredients":"","preparation":"(Raymond OLLIVIER)\n**Louis**\n**Ingrédients :**\n200g de congre coupé en morceaux de 2cm d'épaisseur.\n4 vives\n2 rougets\n2 grondins\n2 saint Pierre\n2 rascasses\n...... selon marché !!\nFaire mariner les filets des poissons \"nobles\" (St Pierre ...) avec du thym, deux cuillers à café de liqueur à base d'anis et de l'huile d'olive pendant une heure.\n**Fumet ****:**    \t beurre, huile d'olive\n4 gousses d'ail hachées\n2 oignons émincés\n1 cœur de fenouil émincé en gros dés.\nCuire puis ajouter têtes et queues des poissons + 2 pincées de safran +1 bouquet garni, mouiller avec 1/4 de vin blanc et 1 litre et demi d'eau.\n**Cuire 15 à 20 minutes.**\nPasser le tout.\nRetirer les poissons de la marinade, assaisonner avec sel et poivre.\nLes pocher 3 ou 5 minutes dans le fumet en ébullition** (en les mettant dans une passoire pour les récupérer pour servir à part).**\nPréparer selon goût, pain sec ou grillé en tranches  frottées ou non à l'ail.\nServir pain + poissons + bouillon,  avec ou sans rouille.","source":"louli"},{"id":"lo_010","titre":"Bouillabaisse de morue","auteur":"Louis","ingredients":"**Ingrédients**** pour 4 à 5 personnes:**\n- Un kilo de morue\n- 130g d'oignons\n- 80g de blanc de poireau haché\n- 4 cuillères à soupe d'huile d'olive\n- 3 tomates épluchées et épépinées\n- 2 gousses d'ail\n- 2 verre de vin blanc sec\n- 3 verres d'eau\n- une pincée de safran en filaments\n- un bouquet garni\n- une cuillère à soupe de persil haché\n- du sel et du poivre","preparation":"Bien faire dessaler la morue ( 24h )dans une passoire plongée dans de l’eau froide.\n\nDans une sauteuse, faites revenir sans colorer les 130g d'oignons et les 80g de blanc de poireau haché, dans de l'huile d'olive.\n\nLorsque les légumes sont bien fondus, ajoutez les 3 tomates coupées en morceaux et les deux gousses d'ail.\n\nLaissez cuire cinq minutes à feu vif, mouillez avec le vin blanc et l'eau, ajoutez le safran, le bouquet garni, salez modérément, faites bouillir.\n\nAu premier bouillon, ajoutez la morue dessalée, coupée en morceaux carrés, arrosez avec 3 ou 4 cuillères d'huile d'olive.\n\nCouvrir et laissez cuire à feu moyen 25 minutes.\n\nAu dernier moment, poivrez avec du poivre fraîchement moulu et parsemez de persil haché.\n\n**Vous avez le choix entre deux façons de déguster ce plat : **\n\naccompagné de pommes de terre bouillies\n\nou\n\nen séparant le bouillon d'une part (qui sera garni de tranches de pain coupées fines et grillées) et , d'autre part , le poisson dressé dans un plat creux.","source":"louli"},{"id":"lo_011","titre":"Boulettes de kefta aux tomates","auteur":"Louis","ingredients":"**Pour 6 personnes :**\n500 g de bœuf haché\n1 petit oignon\n1 brin de coriandre\n3 brins de persil\n1 cuillerée à café de cumin\n1 cuillerée à café de piment doux (à doser)\n½ cuillerée à café de sel\n1.5 kg de tomates\n2 gousses d’ail hachées\n1 cuillerée à café de piment doux\n½ cuillerée à café de cumin\n1 pincée de piment fort\nPersil\nSel\n2 poivrons","preparation":"Mélangez la viande hachée avec l’oignon râpé, le persil et la coriandre. Ajoutez le cumin, le piment et le sel. Bien malaxer et réserver au frais.\n\nGrillez les poivrons à la flamme pour noircir la peau.\n\nJetez les tomates dans de l’eau bouillante puis pelez-les et épépinez-les. Faites-les cuire dans un peu d’huile d’olive avec l’ail, le persil haché, le cumin, le piment et le sel. Ajoutez les poivrons épluchés et coupés en dés.\n\nRoulez la viande hachée en boulettes de la taille d’une grosse bille. Jetez-les dans la sauce tomate et surveillez la cuisson : les boulettes doivent rester moelleuses. Laissez reposer quelques minutes feu éteint puis servez.","source":"louli"},{"id":"lo_012","titre":"Boulettes de porc au vermicelle","auteur":"Louis","ingredients":"**Pour 6 personnes :**\n500 g de porc pas trop maigre (échine)\n100 g de vermicelle\n250 g de chou chinois\n2 cuillerées à soupe de sauce de soja\n1 cuillerée à soupe de xérès\n1 ½  cuillerée à café de sucre\n1 œuf\n1 cuillerée à soupe de Maïzena\n3 ou 4 champignons noirs\n3 cuillerées à soupe d’huile\n1 petit morceau de gingembre\n2 petits oignons\n1 cuillerée à café de sel\n3 cuillerées à soupe d’eau ou de bouillon","preparation":"Hachez finement le porc puis ajoutez le soja, le sucre, l’œuf et la Maïzena. Répartissez en 12 boulettes que vous mettez au frigo 30 minutes.\n\nFaites tremper le vermicelle et les champignons dans de l’eau chaude 15 minutes.\n\nLavez et coupez le chou en lanières. Pelez et coupez le gingembre en fines lanières. Faites de même pour les oignons. Egouttez les champignons et le vermicelle.\n\nFaites dorer les boulettes dans un peu d’huile pendant 5 minutes à feu moyen et égouttez-les avec une écumoire.\n\nMettez les oignons et le gingembre à la place, ajoutez le chou et les champignons et laissez cuire 3 minutes en remuant bien.\n\nAssaisonnez, remettez les boulettes avec un peu d’eau ou de bouillon. Réduisez le feu, couvrez et laissez  mijoter 20 à 25 minutes.\n\nAjoutez le vermicelle et servez chaud.","source":"louli"},{"id":"lo_013","titre":"Brioche","auteur":"Louli","ingredients":"**Pour 2 moules à cake :**\n6 œufs\n500 g de farine\n200  g de beurre fondu\n180 g de sucre\n¼  de cube de levure de boulanger\n8 cuillerées à soupe d’eau ou de lait environ (à ajuster)\nSel (2 ou 3 g)","preparation":"La veille au soir, mélangez les ingrédients au batteur (farine, sel, sucre œufs puis beurre et ensuite levure délayée dans l’eau) et laissez la pâte lever 2 heures.\n\nFaites retomber la pâte et remettez-la à lever toute la nuit.\n\nLe matin, faites retomber la pâte et versez-la sur un plan fariné.  Etalez-la en forme de tarte. Pliez cette tarte en 4 puis étalez-la à nouveau et pliez-la. Recommencez une troisième fois.\n\nEnsuite, roulez la pâte en forme de boudin et coupez-la en six morceaux. Posez trois morceaux debout dans chaque moule beurré, recouvrez d’un torchon et faites lever deux à trois heures dans un endroit chaud.\n\nMettez à four moyen (Th 5) pendant 45 minutes. Testez la cuisson avec un couteau (il doit ressortir sec).\n\nLa brioche sera plus belle si vous la dorez avec un jaune d’œuf battu ou du lait sucré avant la cuisson.","source":"louli"},{"id":"lo_014","titre":"Brochettes d’agneau","auteur":"Louis","ingredients":"**Pour 6 personnes :**\n1 kg de viande de mouton (épaule ou gigot)\n1 gros oignon\n1 cuillerée à soupe d’huile\n1 bouquet de persil\n½  cuillerée à café de sel\n½  cuillerée à café de poivre\nCumin (facultatif)","preparation":"Coupez la viande en gros dés. Hachez le persil et râpez l’oignon. Mélangez tous les ingrédients dans un saladier et laissez reposer au frais 2 heures au moins.\n\nEnfilez la viande sur des brochettes et grillez au barbecue.","source":"louli"},{"id":"lo_015","titre":"Brochettes de porc (Solomilllo)","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n1 filet mignon de porc\nMarinade :\n1 gros oignon\n2 gousses d’ail\n1 bouquet de persil\n1 cuillerée à soupe d’huile de sésame\n2 cuillerées à soupe d’huile\n4 cuillerées à soupe de sauce de soja\nPiment\nSel","preparation":"Enlevez l’aponévrose et la graisse du filet. Coupez la viande en  dés perpendiculairement aux fibres. Préparez la marinade et mettez-y la viande. Laissez reposer au frais quelques heures.\n\nEnfilez la viande sur des brochettes et grillez au barbecue.\n\nDans une grande poêle, faites revenir le reste de marinade avec des pâtes chinoises jaunes cuites et des champignons noirs puis servez en accompagnement des brochettes.","source":"louli"},{"id":"lo_016","titre":"Brochettes de poulet","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n4 blancs de poulet\n200 g de jambon fumé\n1 paquet de poitrine fumée (facultatif)\n½ cuillerée à café de sucre\n½ cuillerée à café de 5 épices\n1 cuillerée à soupe de sauce de soja\nSalade verte","preparation":"Découper les blancs de poulet, le jambon et la poitrine en carrés de 2.5 cm de côté.\n\nFaire une sauce avec le sucre, les cinq épices et la sauce de soja. Ajouter une cuillerée à soupe d’eau et mettre les viandes dans la sauce. Laisser mariner une heure.\n\nMettre la viande en brochettes en mélangeant les viandes et faire griller.\n\nServir avec de la salade verte avec ou sans vinaigrette.","source":"louli"},{"id":"lo_017","titre":"Carpaccio de thon","auteur":"Louis","ingredients":"**Ingrédients pour 4 personnes :**\n225 g de filet de thon rouge\n3 citrons verts\nhuile d’olive","preparation":"Enveloppez la pièce de filet de thon rouge dans une grande feuille de film alimentaire pour lui donner une forme relativement circulaire;\n\nPlacez le rouleau au congélateur pendant 3 heures, sans le congeler à cœur.\n\nPlacer au congélateur les assiettes.\n\nSortez le thon du congélateur, déballez le et posez le sur une planche\n\nDécoupez-le en fines tranches avec un couteau très affûté.\n\nElles doivent être aussi fines que des tranches de saumon fumé.\n\nDisposez le sur les assiettes froides\n\nSaler, poivrer.\n\nArroser d'un mélange d'huile d'olive et de citron vert 10 mn avant de servir.\n\nServir avec du pain grillé.\n\n**Variante : **On peut sauter l’étape du congélateur mais il sera plus difficile d’obtenir de fines tranches.** **On peut utiliser de la lotte au lieu du thon","source":"louli"},{"id":"lo_018","titre":"Cake","auteur":"Louli","ingredients":"**Pour 1 moule à cake :**\n3 œufs\n300 g de farine\n190 de beurre\n190 g de sucre\n150 g de fruits confits hachés\n150 g de raisins secs\nRhum\nSel\nLevure","preparation":"Trempez les raisins secs dans du rhum au moins 12 heures.\n\nMélangez le sucre et le beurre ramolli puis ajoutez dans l’ordre les œufs, la farine, la levure, le sel. Roulez les fruits confits et les raisins dans un peu de farine et ajoutez-les à la pâte.\n\nTapissez le fond du moule de papier cuisson et versez la pâte.\n\nFaites cuire 15 minutes à four Th 6-7 puis fendez le cake en long et poursuivez la cuisson 1 h 20 à Th 3-4. Vérifiez la cuisson avec un couteau qui doit ressortir « sec ».","source":"louli"},{"id":"lo_019","titre":"Cake de Simone","auteur":"Simone","ingredients":"**Ingrédients :**\n125 g de beurre\n100 g de sucre\n200 g de farine\n1 paquet de levure\n60 g de raisins secs\nQuelques amandes\n75 g de beurre\n3 œufs","preparation":"Faire tremper les raisins dans une cuillerée de rhum. Faire fondre le beurre avec le sucre et travailler le mélange hors du feu, ajouter les jaunes d’œufs un à un en mélangeant bien  (1/4 h environ). Ajouter alors les blancs battus en neige ferme, la farine avec la levure et les fruits.\n\nMettre à four doux une heure environ.","source":"louli"},{"id":"lo_020","titre":"Calmars au riz","auteur":"Martine","ingredients":"**Ingrédients :**\n- des calmars\n- 1 gros oignon\n- 2 tomates moyennes (ou une grosse)\n- 1 poivron\n- 1 gousse d'ail\n- un peu de thym, de laurier du sel, du poivre\n.","preparation":"Couper le calmar en morceaux, le faire revenir avec l'huile d'olive et un gros oignon émincé, jusqu'à ce qu'il devienne translucide. Ajouter le riz (2 cuillères à soupe par personne plus une), ajouter 1 fois et demi d'eau,  puis les tomates,1 poivron,1 gousse d'ail, thym ,laurier, sel, poivre. Fermer la cocotte minute. Cuire 6 min à partir du sifflement de la cocotte.","source":"louli"},{"id":"lo_021","titre":"Calmars farcis aux légumes","auteur":"Martine","ingredients":"**Pour 4 personnes :**\n1 kg de calmars\n1 courgette\n1 poivron rouge\n5 tomates\n3 gousses d’ail\n1 oignon\n1 bouquet garni\nSel, poivre\nHuile d’olive","preparation":"Nettoyez les calmars.\n\nEbouillantez, pelez et épépinez les tomates puis coupez la chair en petits dés.\n\nCoupez les courgettes en prélevant 1 cm de chair avec la peau, jetez le centre.\n\nFaites griller le poivron à la flamme, épluchez-le puis coupez-le en dés.\n\nEcrasez l’ail et hachez l’oignon.\n\nDans un sautoir, faites chauffer l’huile d’olive puis ajoutez l’ail et l’oignon. Faites suer sans colorer.\n\nAjoutez les autres légumes et le bouquet garni. Assaisonnez et couvrez. Faites cuire 15 minutes à feu doux. Laissez refroidir.\n\nFarcissez les calmars de légumes puis fermez-les avec une pique. Faites-les cuire de 8 à 10 minutes dans un panier à cuisson vapeur.","source":"louli"},{"id":"lo_022","titre":"Calmar farci","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n4 calmars de taille moyenne (une main)\nMie de pain\n1 cuillerée à café de sauce de soja\nSel\nPoivre\nSauce :\n1 sucre\n2 cuillerées à soupe de nuoc-mam\n2 cuillerées à soupe d’eau\n2 cuillerées à soupe de vinaigre citronné\nPiment","preparation":"Nettoyez les calmars sans fendre le corps. Enlever la peau et l’intérieur. Gardez la tête en enlevant le bec et frottez les tentacules pour faire partir les petits cartilages des ventouses.\n\nHachez les ailerons avec les têtes et les tentacules et ajoutez l’équivalent en volume de mie de pain trempée et essorée. Salez et poivrez.\n\nRemplissez les corps des calmars aux ¾ et fermez avec un bâtonnet de bois.\n\nCuisez 6 minutes à la vapeur.\n\nEssuyez les calmars puis faites les revenir légèrement dans un peu d’huile à la poêle.\n\nTranchez les calmars en tranches de 5 mm d’épaisseur et servez avec la sauce dans de petites coupelles.","source":"louli"},{"id":"lo_023","titre":"Canard à l’orange","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 canard\n6 oranges\n1 citron\n½ dcl de vinaigre\n50 g de sucre\n25 g de farine\n25 g de matière grasse\n4 dcl de bouillon fait avec un bouillon Kub","preparation":"Faites cuire le canard au four pendant une heure puis découpez-le et conservez-le au chaud.\n\nPressez 4 oranges et le citron. Prélevez les zestes avec un couteau économe et coupez-les en fines lamelles. Faites blanchir les zestes 5 minutes à l’eau.\n\nFaites fondre la matière grasse dans une casserole, ajoutez la farine puis diluez avec le bouillon en remuant bien. Lorsque la sauce a pris ajoutez le jus et les zestes.\n\nFaites un caramel avec le sucre et le vinaigre et ajoutez-le à la sauce.\n\nCoupez les oranges restantes en fines tranches, peau comprise. Mettez le canard sur un plat avec les tranches d’orange, nappez avec la sauce et servez avec des chips ou des pommes de terre à l’eau.","source":"louli"},{"id":"lo_024","titre":"Canard au lait de coco","auteur":"Louli","ingredients":"**Ingrédients :**\n- 600g de canard (steaks, magret sans peau, aiguillettes…)\n- ½ bouquet de basilic\n- 2 poivrons verts\n- 2 poivrons rouges\n- 1 cuillerée à soupe de curry\n- 20 cl de lait de coco\n- 2 cuillerées à soupe de sauce de soja\n- 250 g de nouilles chinoises\n- Piment, sel, poivre\n.","preparation":"Faire griller la peau des poivrons pour les peler (facultatif). Découper le canard en fines lamelles.\n\nFaire chauffer un peu d’huile. Ajouter le lait de coco et le curry. Ajouter le canard et le faire cuire 4 min. Mélanger régulièrement puis ajouter les poivrons en lamelles, le soja et le basilic. Saler, poivrer, pimenter et continuer la cuisson 3 min.\n\nFaire cuire les nouilles 5 min à l’eau bouillante, les égoutter et les mettre dans un plat creux. Ajouter le canard et napper avec la sauce","source":"louli"},{"id":"lo_025","titre":"Canard laqué","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n1 canard\n1 cuillerée à soupe de miel\n2 cuillerées à soupe de sauce de soja\n1 cuillerée à soupe de 5 épices\ncolorant alimentaire rouge (facultatif)\n1 oignon\n1 gousse d’ail\nsel, poivre","preparation":"Mélangez les ingrédients dans un bol pour obtenir une laque homogène. Ajoutez un peu d’eau si nécessaire.\n\nPiquez abondamment et profondément le canard avec un couteau pointu.\n\nBadigeonnez le canard de laque à l’aide d’un pinceau environ 5 fois.\n\nLaissez reposer.\n\nMettez le canard au four pour 10 minutes et jetez la graisse rendue. Remettez à four doux pour 30 minutes. Pendant la cuisson, badigeonnez à nouveau de laque (encore 5 fois).\n\nOn peut aussi utiliser un tourne broche auquel cas, il est inutile de jeter l’huile rendue.","source":"louli"},{"id":"lo_026","titre":"Carpaccio de thon","auteur":"Louis","ingredients":"**Ingrédients pour 4 personnes :**\n225 g de filet de thon rouge\n3 citrons verts\nhuile d’olive","preparation":"Enveloppez la pièce de filet de thon rouge dans une grande feuille de film alimentaire pour lui donner une forme relativement circulaire;\n\nPlacez le rouleau au congélateur pendant 3 heures, sans le congeler à cœur.\n\nPlacer au congélateur les assiettes.\n\nSortez le thon du congélateur, déballez le et posez le sur une planche\n\nDécoupez-le en fines tranches avec un couteau très affûté.\n\nElles doivent être aussi fines que des tranches de saumon fumé.\n\nDisposez le sur les assiettes froides\n\nSaler, poivrer.\n\nArroser d'un mélange d'huile d'olive et de citron vert 10 mn avant de servir.\n\nServir avec du pain grillé.\n\n**Variante : **on peut utiliser de la lotte au lieu du thon","source":"louli"},{"id":"lo_027","titre":"Cassoulet Toulousain","auteur":"Louli","ingredients":"","preparation":"**Ingrédients :**\n1 kg de haricots secs (lingots de préférence)\n**Aromates :**\n3 carottes\n2 oignons\n3 clous de girofle\n2 branches de thym\n2 feuilles de laurier\nsel et poivre\n1 petite boîte de concentré de tomates\n**Charcuterie :**\n1 kg de saucisse de Toulouse\n500 g de couennes ou 6 tranches de poitrine demi-sel\n2 ailes de confit\nFaire tremper les haricots au moins 12 heures. (Même les variétés « sans trempage »)\nLes mettre dans une grande cocotte avec les aromates mais sans le concentré de tomates, couvrir d’eau et cuire 1 h 30.\nAjouter alors les couennes coupées en morceaux et le concentré de tomates et poursuivre la cuisson à feu doux encore 1 h.\nPendant ce temps, faire cuire la saucisse au four dans un plat pendant environ une heure. Elle doit être cuite mais pas desséchée.\nAjouter alors la saucisse aux haricots qui doivent commencer à « fondre » et à devenir pâteux.\nDix minutes avant de passer à table, ajouter les ailes de confit. Il s’agit juste de faire fondre la graisse et de réchauffer le confit. Il ne doit pas recuire et la graisse ne doit pas bouillir.\nSortir la charcuterie pour la découper. Verser les haricots dans un grand plat et remettre les morceaux de saucisse et de confit sur le dessus.\n**Variante :**\nAprès avoir cuit les haricots à l’eau et la saucisse au four, mettre le tout dans un plat à four muni d’un couvercle et achever la cuisson au four. A la fin de la cuisson, en ajoutant le confit, saupoudrer de chapelure et ôter le couvercle du plat pour réaliser une croûte dorée.\n**Remarques :**\nLa première cuisson des haricots à l’eau peut se réaliser à l’avance sans précaution particulière. Par contre, dès que les haricots commencent à fondre et à ressembler à un cassoulet, surveiller très attentivement la cuisson pour que le fond du plat n’accroche pas en donnant un goût de brûlé à l’ensemble du cassoulet.\nLes différentes recettes de cassoulet se différencient par la garniture de viande. A Castelnaudary, on y met du mouton. On peut remplacer le confit par un saucisson à cuire.","source":"louli"},{"id":"lo_028","titre":"Chaussons à la viande","auteur":"Louis","ingredients":"","preparation":"**Ingrédients :**\n500g de farine\n4 cuillerées à café  de levure chimique\n**Farce:**\n500g de palette ou échine de porc\n1 cuillerée à soupe  de Xérès\n3 cuillerées à soupe  de sauce de soja\n2 cuillerées à café de sucre\n1 cuillerée à café de sel\n1 cuillerée à soupe  d'huile de sésame\n1 petit morceau de gingembre\n1 cuillerée à café de Maïzena\n**Préparer la pâte :**\nMettre la farine et la levure dans une terrine, ajouter 250cc d'eau et travailler bien tous ces éléments pour obtenir une pâte homogène\n**Préparer la farce :**\nHachez la viande et mélanger la avec le xérès , la sauce de soja , le sucre , le sel , l'huile de sésame et la Maïzena. Pelez et hachez le morceau de gingembre : il vous en faut 2 cuillerées à café, ajoutez le à la préparation et mélangez .\nSéparez la pâte en deux parties égales ; posez-les sur une planche farinée et travaillez les bien ; roulez chaque morceau en un long cylindre de 5 cm de diamètre et coupez chaque cylindre en quinze tronçons ; aplatissez chacun avec la paume de la main, puis avec un rouleau à pâtisserie pour obtenir des disques de 7,5cm de diamètre\nDisposez une cuiller à soupe de farce au milieu de chaque disque de pâte , rabattez le bord vers le centre et pincez le en faisant pivoter d'un quart de tour pour bien enfermer la farce.\nRecouvrez le panier d'une marmite à vapeur avec un morceau de mousseline et disposez-y les chaussons en laissant entre eux un espace de un cm. Faites bouillir de l'eau dans la partie inférieure de la marmite et faites cuire 2O mn\nServez très chaud","source":"louli"},{"id":"lo_029","titre":"Choucroute","auteur":"Louli","ingredients":"**Ingrédients pour 6 personnes:**\n1 kg de choucroute crue\n2 oignons\n1 gousse d’ail\n¼ l de vin blanc\n7 ou 8 pommes de terre\n2 saucisses de Montbéliard\n2 tranches de poitrine fumée d’un cm d’épaisseur\n800 g de palette fumée\n12 saucisses de Francfort\n12 baies de genièvre (facultatif, seules les baies fraîches parfument le plat)","preparation":"Rincer la choucroute crue dans une passoire à l’eau froide. Mettre dans une cocotte, les oignons et l’ail hachés, la moitié de la choucroute, la palette fumée, la poitrine fumée, les saucisses de Montbéliard puis le reste de la choucroute.\n\nCouvrir à peine d’eau et faire cuire une heure puis ajouter le vin blanc et les pommes de terre épluchées. (On peut aussi cuire les pommes de terre à part)\n\nContinuer la cuisson une demi-heure. (Tester celle de pommes de terre)\n\nPoser les saucisses de Francfort 10 minutes sur le dessus pour les réchauffer.\n\nServir bien chaud après avoir découpé la palette en tranches.\n\nPour un « vrai » repas de l’Est, prévoir bière ou vin blanc d’Alsace et du Munster comme fromage.\n\n**Variante ****:**\n\nSi on aime les pommes de terre cuites à point, on peut les cuire à part. Cuites avec le chou, elles ont tendance à être « craquantes » au cœur.\n\nLe temps de cuisson indiqué est minimal, il peut être prolongé sans problème et ce plat se réchauffe très bien.\n\nSi on ne trouve pas de palette fumée, on peut la remplacer par des côtes fumées, de la palette demi-sel (dessalée) ou du jambonneau. Eviter la charcuterie déjà cuite car le plat est alors un peu sec.\n\nLa saucisse de Morteau ressemble à celle de Montbéliard mais elle est plus grosse.","source":"louli"},{"id":"lo_030","titre":"Confit de canard","auteur":"Louli","ingredients":"","preparation":"Acheter des canards de 6.5 kg environ. Ils doivent avoir des tendons souples à la patte.\n**Découper les canards :**\nEnlever les bouts des ailerons et la tête et les jeter. Couper ensuite les manchons et le cou et les mettre de côté. Commencer à découper sur le dos. Découper les pattes puis les magrets avec le reste de l’aile attenant. Laisser environ 1 cm de peau autour des morceaux. Garder la peau. La carcasse s’ouvre en bas du dos.\nSortir l’intérieur du canard et dérouler les organes pour récupérer la graisse. Détacher et vider le gésier et le mettre avec les ailerons. Ne pas mettre dans la graisse les deux petites glandes situées près de la queue. Eviter de salir la graisse ou de la laver.\n**Préparer le confit :**\nRecouvrir la planche de gros sel et rouler les morceaux dedans puis les déposer dans la bassine peau en dessous. Les laisser 24 heures.\nCouper toute la graisse en petits cubes et la mettre à fondre à feu très doux. Récupérer la graisse au fur et à mesure et la passer au chinois.\nA la fin, lorsqu’il ne reste que des petits bouts de peau, monter le feu et ajouter un verre d’eau salée. Tourner les fritons rapidement et les mettre dans une passoire avec un poids dessus jusqu’au lendemain.\n**Carcasses :**\nSaler légèrement les carcasses et les passer un quart d’heure au four.\n**Le lendemain :**\nMettre deux louches de graisse au fond du pot. Mettre le reste de graisse dans la bassine et y déposer les quartiers peau en bas après avoir secoué le sel. Faire cuire à feu très doux en faisant passer les morceaux du dessous au dessus. La cuisson prend entre une heure et une heure trente suivant la taille des quartiers. Ils sont cuits lorsqu’on peut les piquer sans que le sang ne perle. Il faut éviter de trop les cuire.\nMettre les quartiers dans le pot toujours, peau en bas, et verser dessus de la graisse chaude. Si nécessaire compléter le niveau avec de l’huile (sans goût).\nOn peut aussi mettre les pattes et les manchons en bocaux et les stériliser 30 minutes à 100°.\nCuire les restes de canards (cou, ailerons, gésiers) environ un quart d’heure à feu vif dans le reste de graisse et les mettre en bocal à stériliser ou en pot.","source":"louli"},{"id":"lo_031","titre":"Confiture d’abricots","auteur":"Simone","ingredients":"**Ingrédients :**\nfruits\nMême poids de sucre","preparation":"Dénoyauter les abricots. Préparer un sirop avec le sucre et un verre d’eau par livre de sucre. Quand le sirop bout à gros bouillons, y jeter les fruits. Cuire pendant 2 h ou 2 h 30 à feu vif.","source":"louli"},{"id":"lo_032","titre":"Confiture de coings","auteur":"Simone","ingredients":"**Ingrédients :**\n2 kg de fruits épluchés\n3 L d’eau\n2 kg de sucre","preparation":"Faire bouillir les fruits épluchés dans l’eau et laisser réduire de moitié. Retirer les fruits. Mettre le sucre dans le jus et laisser cuire jusqu’à ce que çà perle. Ajouter alors les fruits et laisser cuire jusqu’à ce çà perle à nouveau.","source":"louli"},{"id":"lo_033","titre":"Confiture de figues","auteur":"Simone","ingredients":"**Ingrédients :**\nFigues\n2 verres d’eau par kg de fruits\n1/4 kg de sucre par kilo de fruits\n1 citron","preparation":"Couper les queues des figues et les partager en deux. Faire un sirop avec l’eau et le sucre et y plonger les figues à ébullition. Laisser cuire jusqu’à ce çà perle.","source":"louli"},{"id":"lo_034","titre":"Confiture de groseilles","auteur":"Simone","ingredients":"**Ingrédients :**\nfruits\nMême poids de sucre","preparation":"Faire éclater les groseilles en les mettant à bouillir dans de l’eau (un verre par livre). Les passer à la moulinette à légumes puis au chinois pour ne garder que le jus.\n\nPréparer un sirop avec un verre d’eau par livre de sucre et quand il bout à gros bouillons, y jeter le jus de groseille. Laisser cuire 30 à 40 minutes à gros bouillons après la reprise de l’ébullition.","source":"louli"},{"id":"lo_035","titre":"Confiture d’oranges","auteur":"Simone","ingredients":"**Ingrédients :**\n1 kg de fruits\n3 L d’eau\n1 kg de sucre","preparation":"Eplucher toutes les oranges sauf une. Faire bouillir les fruits épluchés dans l’eau et laisser réduire de moitié. Retirer les fruits. Mettre le sucre dans le jus et laisser cuire jusqu’à ce que çà perle. Ajouter alors les fruits  et l’orange non épluchée et laisser cuire jusqu’à ce çà perle à nouveau.","source":"louli"},{"id":"lo_036","titre":"Confiture de pastèques","auteur":"Simone","ingredients":"**Ingrédients :**\n2 kg de fruits épluchés\n1 kg de sucre\n1 citron\n1 gousse de vanille","preparation":"Faire macérer les fruits avec le sucre une nuit. Faire cuire à grand feu jusqu’à ce que les fruits soient transparents.","source":"louli"},{"id":"lo_037","titre":"Coquilles Saint-Jacques","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n12 coquilles St Jacques\n12 crevettes ou gambas\n1 oignon\n1 gousse d’ail\n2 cuillerées à café de curry\n1 court bouillon\n1 petite boite de lait de coco\nbeurre","preparation":"Nettoyez les coquilles si elles sont fraîches. Si elles sont surgelées, .les mettre à décongeler dans un mélange eau-lait, moitié-moitié.\n\nHachez l’ail et les oignons et faites les revenir avec du beurre et le curry.\n\nArrosez avec un peu de court bouillon, 3 cuillerées à soupe de lait de coco et du sel.\n\nFaites épaissir la sauce et ajoutez les crevettes coupées en morceaux.\n\nGarnir chaque coquille de trois noix coupées en morceaux et nappez de sauce.\n\nMettre au four chaud pour 10 minutes puis grillez 3 minutes.","source":"louli"},{"id":"lo_038","titre":"Couscous","auteur":"Louis","ingredients":"**Pour 10 personnes :**\n1 kg de graine de couscous (moyenne ou fine suivant le goût)\n1,5 kg de viande (jarret de veau, épaule d’agneau)\n500 g d’oignons\n5 tomates\n4 carottes\n4 courgettes\n4 navets (facultatif)\n1 aubergine\n2 poivrons\n1 bouquet de coriandre\n1 dose de safran\nsel, poivre\nraisins secs (facultatif)","preparation":"Faites revenir les oignons dans un peu de matière grasse, puis ajoutez la viande, le safran, le sel et une cuillerée à café de poivre. Couvrez d’eau et laissez cuire.\n\nCoupez tous les légumes en morceaux.\n\nA mi-cuisson de la viande, ajoutez les carottes et les navets. A trois-quarts de cuisson de la viande, ajoutez les autres légumes, la coriandre, du sel et du poivre après avoir vérifié l’assaisonnement.\n\nLavez la graine de couscous dans de l’eau puis éliminez le maximum d’eau et laissez reposer 5 minutes.\n\nMettre la graine dans le couscoussier et laissez cuire 5 minutes après échappement de la vapeur. Versez la graine dans un grand plat, écrasez-la et arrosez-la d’un peu d’eau froide salée.\n\nRépétez l’opération.\n\nUne demi-heure avant de servir, remettez le couscous dans le couscoussier et laissez cuire 5 minutes après apparition de la vapeur. Remettez-le dans le plat et ajoutez du beurre et mélangez bien.\n\nServez la viande, les légumes et la graine sur trois plats séparés.","source":"louli"},{"id":"lo_039","titre":"Couscous au poisson","auteur":"Louli","ingredients":"","preparation":"***Louis :****Origine : Anna Maria Galante (Tunisie)*\n**Ingrédients pour 6 personnes:**\nGraine de couscous : 100 g par personne\nMérou ou dorade royale. Rougets ou rascasse et congre, saint Pierre…\n1 kg de merlan ou lieu noir ou cabillaud crus pour boulettes\t500 g d'oignons.\n1boite et demi de tomates pelées ou 1k 5 de tomates fraîches,\nCarottes,\nPotiron,\nCourgettes,\nPois chiches,\nPoivrons,\nOeufs, persil, ail,\nHarissa,\nCumin en poudre,\n1 cuillerée de poivre,\nSel,\nFeuilles de menthe.\n** **\n**Bouillon :**\nFaire revenir au \"Fruit d'or\"  oignons et tomates.\nMettre les têtes de poisson et congre, rascasse, grondin, vieilles. (Si possible dans une gaze pour les retirer en fin de cuisson).\nVerser dessus environ 2,5 litres d'eau et laisser bouillir une demi heure.\nSi vous n’avez pas de gaze, filtrez le tout pour avoir un bouillon clair sans débris.\nAjoutez les carottes, poivrons, pois chiches, potiron et courgettes.\nRéserver quelques courgettes pour pocher au dernier moment (2 mn).\nCuire une demi heure\nVérifier l'assaisonnement.\n**Boulettes **:\nI kg de filet de mérou ou de merlan crus haché + croûte de pain trempée\n+ oignons + persil + ail +  menthe hachés + un ou deux oeufs + sel +  poivre.\nBien malaxer et faire des boulettes de taille moyenne (diamètre 5 cm).\nLes passer ensuite dans 2 oeufs  battus et les rouler dans la farine. Faire frire à l'huile\n(Cristy Lesieur ou équivalent)\nQuand les boulettes sont frites, les recuire dans une sauce avec huile d'olive + tomates + ail + poivrons + harissa ou piment + eau, mijoter 20 minutes, la sauce doit réduire au maximum\n**Couscous **:\n600 g de couscous fin précuit\nLaver le couscous à l'eau courante plusieurs fois en changeant d'eau .\nMettre le bouillon dans le bas du couscoussier et placer le haut rempli de graine de couscous sur la marmite. Faire bouillir.\nSi besoin prévoir un joint avec du papier d’alu afin que la vapeur sorte par le haut\nAprès échappement de la vapeur, laisser cuire 5 mn.\nRetirer alors le couscous, le verser dans un grand plat et écraser les \"mottes\" à l'aide d'une fourchette ou à la main pour séparer les grains.\nLe remettre 5 minutes dans le haut du couscoussier.\nRetirer le couscous, le verser dans un grand plat et ajouter du beurre en fines lamelles, écraser le tout à la main.\nLe remettre 5 minutes dans le haut du couscoussier, avant de servir ajouter du beurre en lamelles et le présenter en \" pyramide ronde \"\n**Poissons:**\nPrévoir des filets de poissons \"nobles\" dorade, saint- pierre, rougets dont on détachera les filets frottés au cumin qui seront mis à pocher trois mn dans le bouillon avant de servir.\nServir graine, bouillon et légumes, boulettes, poissons très chaud !!\nNota : On peut ne servir que des boulettes de poisson sans les filets\nCrabe farci au porc et à la coriandre\n**Louis**\n**Ingrédients :**\n- Crabe\n- 200 g porc haché\n- 1 oignon haché\n- 1 c.a.c poivre noir\n- 15 g de sucre\n- coriandre hachée\n- 2 œufs\n- piment\nRéservez  le crabe décortiqué\nMalaxez le porc haché, l’oignon, le sucre, la coriandre\nAjoutez la chair de crabe et les blancs d’œufs.\nFarcissez la carapace de crabe (ou le récipient ) avec la pâte de crabe.\nMettre du jaune d’œuf battu avec du piment sur la farce y ajouter des feuilles de coriandre.\nCuire à la vapeur 20 minutes ou au four 15 minutes.\nServir avec de la salade verte.\nCrabe au vermicelle chinois\n**Louis**\nPrendre un crabe frais d'environ un kilo.\nFaire bouillir dans un demi-litre d'eau avec un oignon.\nQuand le crabe est cuit, sortir toute la chair, les œufs et les viscères, les faire sauter avec de l'oignon et de l'ail hachés fin.\nConserver le bouillon.\nFaire rissoler 30 g de vermicelle par personne (trempé d'avance) avec un corps gras dans une grande poêle.\nRemuer avec une cuillère pour qu'il n'accroche pas.\nVerser en même temps le bouillon de crabe pour que le vermicelle l'absorbe tout entier.\nAjouter 10 g de champignons parfumés trempés d'avance et coupés en quartiers.\nMêler avec le crabe.\nCouvrir et laisse cuire ensemble quelques minutes.\nSaler, poivrer abondamment et servir\nNota : A défaut de crabe frais on peut utiliser le crabe en boîte.\nDans ce cas il faut avoir un bouillon tout prêt pour arroser le vermicelle afin qu'il gonfle bien et qu'il n'accroche pas.\nOn peut aussi mettre le crabe dans des coquilles St Jacques avec un peu de chapelure et passer au four avant de servir.","source":"louli"},{"id":"lo_040","titre":"Crêpes","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n8 dcl de farine\n6 œufs\n1 l de lait\nsel\n1 dcl d’huile","preparation":"Mélangez la farine, le sel et les œufs. Ajoutez le lait et mélangez soigneusement.\n\nLaissez reposer la pâte si possible. Ajoutez l’huile au moment de cuire les crêpes.\n\nUtilisez une grande poêle que vous huilerez de temps en temps et cuisez les crêpes.","source":"louli"},{"id":"lo_041","titre":"Crevettes sautées","auteur":"Louli","ingredients":"**Pour 4 personnes :**\nGrosses crevettes\n1 gousse d’ail\n1 morceau de 2 cm de gingembre\n2 cuillerées à soupe se sauce Worcestershire\n1 cuillerée à soupe de sucre\n2 cuillerées à soupe de ketchup\nPour servir : laitue, menthe tomates","preparation":"Faites décongeler et séchez les crevettes. Hachez l’ail et épluchez le gingembre puis écrasez-le.\n\nFaites sauter les crevettes deux minutes sur chaque face dans un peu d’huile puis gardez-les au chaud.\n\nDans la poêle, ajoutez l’ail, le gingembre, laissez cuire une minute puis ajoutez la sauce Worcestershire, le ketchup et le sucre.\n\nServez avec les crevettes posées sur la laitue, les tomates et la menthe.","source":"louli"},{"id":"lo_042","titre":"Crumble aux pommes","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n6 pommes\n100 g de sucre\n120 g de beurre doux\n220 g de farine\n**Ingrédients:**\n1 oignon\n3 carottes\n3 courgettes\n40 à 60 cL de lait de coco\nCurry doux 1 à 2 cuillerées à café\nGingembre            \"            \"\n600 gr de lotte sans déchets\n300 gr de crevettes roses\n**Recette:**\nCouper l'oignon en rondelles et le faire suer dans de la matière grasse. Ajouter le curry et le gingembre et faire cuire 5 minutes en remuant. Ajouter le lait de coco. Faire cuire 5 minutes. Puis mettre les carottes et les courgettes coupées en lanières. Faire cuire à feux doux 15 minutes. Ajoutez la lotte. Cuire 10 minutes et 5 minutes avant de servir mettre les crevettes. Chauffer le plat de service, mettre les légumes, la lotte, les crevettes. Réduire la sauce et au moment de servir, lier avec un yaourt au lait entier ou de la crème épaisse.","preparation":"Dans un plat répartissez les pommes épluchées et coupées en petits dés. Saupoudrez-les avec la moitié du sucre.\n\nAvec la farine, le beurre et le sucre restant, faites une pâte sablée grossière.
