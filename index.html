 Recouvrez les pommes de cette pâte et mettez au four pour 35 minutes (Th 5-6)\n\nCurry de lotte au lait de coco","source":"louli"},{"id":"lo_043","titre":"Daube de sanglier","auteur":"Simone","ingredients":"**Ingrédients :**\n**Marinade :**\n1,5 l de vin rouge\n6 cuillerées à soupe de vinaigre\n4 carottes\n2 oignons\n2 branche de céleri\n2 clous de girofle\n3 cuillerées à soupe d’huile\n1 bouquet garni\n10 grains de poivre\n**Viande pour 8 personnes :**\n1,5 kg de sanglier\n150 g lard\n.","preparation":"Emincer les légumes de la marinade, les faire revenir dans l’huile. Mouiller avec le vin rouge et ajouter les aromates. Laisser frémir 30 min. Ajouter la vainde coupée en cubes et mettre au frais 48 h.\n\nFaire dorer le lard et les morceaux de sanglier, saupoudrer de farine sans faire roussir. Passer la marinade au chinois et l’ajouter à la viande. Saler, ajouter le bouquet garni et faire cuire 2h à feu doux.\n\nServir accompagné de pâtes et de croutons.","source":"louli"},{"id":"lo_044","titre":"Daurade au four","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n1 grosse daurade\n2 oignons\n1 gousse d’ail\n1 bouquet garni\n150 G de champignons de Paris\n1 citron\n4 tomates\n1 verre de vin blanc\n3 carottes","preparation":"Emincez les oignons, écrasez l’ail, coupez les carottes en rondelles, les tomates en quartiers et le citron en tranches.\n\nFaites revenir les oignons dans un peu de matière grasse puis ajoutez les carottes, les champignons et l’ail et laissez étuver à couvert 15 minutes.\n\nMettez les oignons et les carottes dans un plat à four, posez la daurade sur les légumes. Ajoutez les tomates autour. Fendez légèrement le dessus du poisson en glissez une tranche de citron dans chaque fente. Salez, poivrez et ajoutez un filet d’huile.\n\nEnfournez à Th 5. Au bout de 30 minutes, ajoutez le vin blanc et cuisez encore 15 minutes.\n\nServez avec du riz nature.","source":"louli"},{"id":"lo_045","titre":"Daurade farcie aux légumes","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n1 grosse daurade\nFarce\n1 tranche de pain\n250 g de crevettes\n4 échalotes\n1 gousse d’ail\n1 bouquet de persil\n2 œufs\n1 verre de lait\n150 G de champignons de Paris\n20 de beurre\nGarniture :\n1 citron\n4 tomates\n1 verre de vin blanc\n1 litre de moules\n1 échalotes","preparation":"Demandez au poissonnier d’enlever l’arête centrale de la daurade sans fendre entièrement la peau.\n\nHachez grossièrement les champignons et les échalotes. Faites-les revenir dans le beurre. Faites cuire un œuf dur. Faites tremper le pain dans le lait. Essorez le pain, hachez grossièrement l’œuf dur.\n\nMélangez le pain, les champignons, les échalotes,  l’œuf dur, les crevettes, le persil haché l’ail et ajoutez un œuf à la farce.\n\nRépartissez la farce à l’intérieur de la daurade et fermez avec des piques en bois.\n\nMettez la daurade dans un plat à four. Déposez des tranches de citron dessus et des quartiers de tomates autour. Huilez le poisson et enfournez 45 minutes Th 5.\n\nFaites ouvrir les moules avec une échalote et un peu de vin blanc. Arrosez la daurade avec le jus des moules et disposez les moules autour.","source":"louli"},{"id":"lo_046","titre":"Epaule d’agneau à la vapeur","auteur":"Louis","ingredients":"","preparation":"Remplir d'eau la partie inférieure d'un couscoussier\nA la partie supérieure, déposer l'épaule, face charnue en dessous, on peut la saupoudrer de cumin en poudre. La couvrir d'un linge propre et humide en coton\nFermer avec le couvercle et poser dessus un objet lourd\nCuire à feu vif deux heures\nVérifier la cuisson : la viande doit se détacher facilement avec les doigts\nServir avec du couscous et une soucoupe de sel et de cumin","source":"louli"},{"id":"lo_047","titre":"Epaule d’agneau façon méchoui","auteur":"Louis","ingredients":"Préparation 5 mn\nCuisson    40 mn\n**Ingrédients ****:**\n- Une épaule d’agneau (semi désossée )\n- 3 cuillerées à soupe d'huile d'olive\n- 60 g de beurre\n- Sel, poivre, cumin","preparation":"Mélangez les aromates et enduisez la viande\n\nChauffez le four à 250°\n\nInstallez l'épaule\n\nArrosez à 30 mn et enduisez l'épaule de beurre\n\nArrosez avec le jus et cuire 10 mn\n\nAu besoin terminer par un coup de gril","source":"louli"},{"id":"lo_048","titre":"Escalopes comtoises","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n4 escalopes fines et longues\n4 tranches de poitrine fumée\n4 tranches de gruyère\n1 boîte d’olives dénoyautées\n1 oignon\n2 dcl de crème\nsel et poivre\npiques de bois","preparation":"Sur chaque escalope, posez le fromage. Repliez l’escalope en deux, entourez-la de la poitrine fumée et fermez l’ensemble, soit avec des piques de bois, soit avec de la ficelle de cuisine.\n\nFaites revenir l’oignon dans un peu de matière grasse puis ajoutez les escalopes et faites les dorer de tous les côtés. Salez, poivrez. Baissez le feu et laissez cuire couvert environ 20 ou 25 minutes.\n\nSortez les escalopes de la cocotte. Mettez la crème à la place et grattez le fond de la cocotte. Ajoutez les olives puis remettez les escalopes.\n\nServez avec du riz nature.","source":"louli"},{"id":"lo_049","titre":"Far breton","auteur":"Yvonne","ingredients":"","preparation":"**Pour un plat creux de 20 cm sur 30 environ :**\n250 g de farine\n180 g de sucre (à ajuster suivant les goûts)\n6 œufs\n¾ L de lait\n1 sachet de 500g de pruneaux dénoyautés (ou pas)\nMélanger soigneusement la farine, le sucre, les œufs dans un saladier. Ajouter le lait.\nBeurrer le plat et étaler les pruneaux sur le fond.\nMettre au four thermostat 120° pour 45 minutes. Au bout de 45 minutes, monter le thermostat à 150° pour dorer le dessus du far et laisser cuire encore 45 minutes.\nRemarque : la difficulté est dans la cuisson. Si le four est trop fort, on obtient une croûte sur le dessus et un flan liquide dessous, si le four est trop doux, la farine se dépose au fond et le far est « stratifié » avec un fond coriace et un dessus liquide.\nLes valeurs ci-dessus sont pour mon four à chaleur tournante.","source":"louli"},{"id":"lo_050","titre":"Filets de poisson","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n400 g de filets de poisson (soles, limandes, merlans frais ou surgelés)\n30 g de beurre\n50 g de gruyère râpé\n½ dcl de crème fraîche\n½ dcl de whisky (facultatif)\nsel, poivre, fines herbes","preparation":"Pliez les filets en deux et fourrez-les de petits morceaux de beurre et de gruyère. Rangez-les dans un plat à four beurré. Ajoutez le gruyère restant, salez, poivrez et enfournez 10 minutes à four moyen (Th 6).\n\nAu bout de 10 minutes, ajoutez le whisky, la crème et les fines herbes puis remettez au four pour 10 minutes.\n\nServez avec du riz, des pommes de terre à l’eau ou des champignons sautés.","source":"louli"},{"id":"lo_051","titre":"Filet de loup aux olives et au citron confit","auteur":"Louis","ingredients":"**Ingrédients :**\n4 filets de loup\n4 tomates\n1 oignon\n1 gousse d’ail\n150 g d’olives vertes dénoyautées\n1 citron confit\n½ botte de persil\n1 cuillerée à café de harissa\n½ cuillerée à café de curcuma\n10 cl d’huile\nsel, poivre\nmenthe fraîche\n.","preparation":"Découpez les filets de loup en pavés\n\nEpépinez les tomates et concassez-les en petits dés.\n\nEcrasez l’ail\n\nFaites revenir l’oignon dans un peu d’huile d’olive. Ajoutez les tomates et l’ail et salez. Faites revenir 10 minutes.\n\nCoupez le citron confit en julienne et enlevez la pulpe. Faites tremper les lamelles dans l’eau pour enlever vinaigre et sel.\n\nBlanchissez les olives 10 minutes dans de l’eau bouillantes puis rafraîchissez-les à l’eau froide.\n\nAjoutez les olives, le citron et le persil haché aux tomates, mélangez délicatement. Laissez mijoter à feu doux 2 minutes.\n\nSalez et poivrez les pavés de loup. Badigeonnez-les de harissa, curcuma et huile d’olive. Faites-les cuire 4 minutes de chaque côté.\n\nServez dans les assiettes en ajoutant la concassée de tomates et un peu de menthe.","source":"louli"},{"id":"lo_052","titre":"Flan aux poires","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n100 g de farine\n125 g de sucre\n½ paquet de levure\n2 œufs\n¼ l de lait\n50 g de matière grasse\n2 cuillerées à soupe de rhum (facultatif)\n500 g de poires\n½ paquet de sucre vanillé","preparation":"Mélangez la farine, le sucre et la levure. Ajoutez les jaunes d’œufs et le ¼ du lait. Ajoutez le reste du lait chauffé avec le beurre. Mélangez bien et ajoutez le rhum et les blancs battus en neige.\n\nVersez la pâte dans un plat beurré, couvrez de quartiers de poires et cuisez 40 mn à four moyen (Th 4 ou 5).\n\nServez tiède ou froid, saupoudré de sucre vanillé.\n\n**Variante :**\n\nOn peut utiliser des pommes ou des pêches.","source":"louli"},{"id":"lo_053","titre":"Foie de canard au naturel","auteur":"Simone","ingredients":"**Ingrédients :**\n1 foie gras\n15 g de sel par kg de foie\n9 g de poivre par kg de foie\n.","preparation":"Mélanger le sel et le poivre et le répartir sur le foie en l’ouvrant un peu. Envelopper de papier sulfurisé (blanc) en faisant un paquet le plus hermétique possible, ficeler comme un rosbeef. Mettre 24h au réfrigérateur.\n\nPrendre 1 kg de graisse d’oie pour un foie de 600 g. Mettre dans une cocotte à grand feu. Dès que la graisse est fondue, y mettre le foie empaqueté. Couvrir la cocotte et mettre au four th 3 pendant 35 minutes.\n\nLaisser refroidir deux heures dans la cocotte ouverte, enlever le papier et mettre dans la graisse côté rond dessous. Mettre au frigo pendant 48 heures au moins et le sortir 4 à 5 heures avant de le servir. Couper en tranches avec un couteau trempé dans l’eau chaude et servir avec du pain grillé.","source":"louli"},{"id":"lo_054","titre":"Foie gras d’oie ou de canard","auteur":"Louli","ingredients":"","preparation":"Acheter des foies d’oie de 800g maximum ou 500g pour les canards.\nMettre les foies à tremper dans de l’eau froide dès l’achat puis les ranger dans un linge.\nSortir les foies et les éponger soigneusement. Mettre sur la planche 15 g de gros sel et 3g de poivre par kg de foie et rouler le foie dedans. Faire tomber l’excédent.\nCouper les lobes du foie puis recouper les lobes en morceaux pour mettre dans des bocaux de 350g . Le bocal doit être rempli au maximum jusqu’à 1 cm du bord.\nMettre une capsule à chaque bocal puis stériliser 1h30 à 100°. Laisser les foies refroidir dans le stérilisateur. Les sortir pour enlever l’eau du couvercle et vérifier la capsule.","source":"louli"},{"id":"lo_055","titre":"Fondue de légumes","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 oignon\n1 gousse d’ail\n3 brins de persil\nlégumes au choix","preparation":"Coupez les légumes en morceaux. Emincez l’ail, hachez l’oignon et le persil.\n\nFaites revenir l’oignon et l’ail dans un peu d’huile d’olive. Ajoutez les autres légumes avec du sel et du poivre, couvrez et laisser mijoter en remuant régulièrement. Les légumes doivent fondre mais ne doivent pas être « bouillis ». Ajoutez si besoin un peu d’huile ou un peu d’eau.\n\nAssociations :\n\nTomates-courgettes-aubergines-poivron\n\nCarottes-pommes de terres (précuites à l’eau)\n\nHaricots plats (cocos plats) - carottes\n\nCourgettes-tomates-poivron","source":"louli"},{"id":"lo_056","titre":"Fumet de poissons","auteur":"Louli","ingredients":"","preparation":"**Louis**** :**\n**Ingrédients :**\n1 kg de carcasses de poissons (limandes, soles, turbot, barbue..;)\n2,4 l d'eau\n1 oignon haché\n1 bulbe de fenouil haché\n100 g de céleri émincé\n100 g de carottes hachées\n25g de petits champignons\n1 brin de thym\n**Recette :**\nMettre poissons et eau : cuire 20 minutes\nFiltrer, ajouter légumes + thym jusqu' ébullition.\nMijoter 35 mn >>> 1,2 l\nFiltrez et utilisez ou conservez au froid","source":"louli"},{"id":"lo_057","titre":"Galette de pommes de terre","auteur":"Louli","ingredients":"","preparation":"**Ingrédients pour 4 personnes:**\n450 g de pommes de terre\n½ cuillerée à soupe de beurre fondu\n1 ou 2 cuillerées à soupe d’huile\nsel et poivre\n**Recette :**\nEpluchez les pommes de terre et râpez-les grossièrement puis arrosez-les immédiatement de beurre fondu et remuez bien.\nFaites chauffer l’huile dans une poêle et ajoutez les pommes de terre. Formez une couche régulière et bien tassée et laissez cuire à feu moyen pendant 7 à 10 minutes, jusqu’à ce que le dessous soit bien doré.\nDétachez la galette du fond en secouant la poêle puis couvrez la poêle d’une plaque métallique et retournez le tout en tenant fermement la plaque.\nRemettez un peu d’huile dans la poêle si elle a l’air sèche et faites glisser la galette dedans et poursuivez la cuisson jusqu’à ce que la galette soit bien croustillante des deux côtés. Servez chaud.\nIl est possible de réaliser plusieurs petites galettes au lieu d’une grande. Seul le temps de cuisson doit être un peu raccourci.","source":"louli"},{"id":"lo_058","titre":"Gambas au curry (créole)","auteur":"Louli","ingredients":"**Ingrédients :**\n- des gambas crues (assez grosses : du 20-30) : environ 5 à 6 par personne\n- 2 oignons moyens\n- 2 tomates moyennes (ou une grosse)\n- 1 gousse d'ail\n- 1 petit morceau de gingembre (2 cm)\n- un peu d'huile (2 à 3 cuillerées à soupe)\n- 1/2 cuillerée à café de curcuma\n- un peu de thym, du sel, du poivre\n.","preparation":"- Préparer les crevettes : enlever la tête, la carapace et le boyau en incisant le dos (si elles sont surgelées, le boyau sort avec la tête)\n\n- préparer les épices : émincer les oignons, écraser l'ail et le gingembre. émincer ou couper en petits dés les tomates (entières)\n\n- faire chauffer l'huile\n\n- faire blondir les oignons ; ajouter ensuite l'ail et le gingembre écrasé, le thym, le sel et le poivre.\n\n- puis ajouter le curcuma  et bien remuer pour bien l’incorporer.\n\n- puis ajouter les tomates, remuer et laisser cuire (remettre le couvercle éventuellement pour bien faire suer). Remuer de temps en temps afin d'incorporer les tomates et de faire une sauce homogène (si çà attache un peu, ajouter un tout petit peu d’eau)\n\n- quand les tomates ont fondu et que la sauce est à peu près homogène, ajouter les crevettes en les mélangeant à la sauce.\n\n- faire cuire ensuite à feu très doux :.les crevettes vont rendre un peu de leur eau. Attention, si le feu est trop vif, les crevettes vont trop rétrécir en perdant leur eau et devenir dures. C'est la partie délicate pour avoir des crevettes fondantes: surveiller et remuer régulièrement, s’il le faut, rajouter un petit peu d'eau et laisser mijoter jusqu'à ce que la sauce soit un peu épaisse. (cuisson : environ 10 minutes)","source":"louli"},{"id":"lo_059","titre":"Gaspacho","auteur":"Yvonne","ingredients":"**Ingrédients pour 6 personnes :**\n1 concombre\n8 tomates\n2 poivrons verts\n3 petits oignons\n3 gousses d'ail\n1 dl d'huile d'olive\n1/2 dl de vinaigre de vin\n8 tranches de pain de mie\nSel et poivre.","preparation":"Eplucher les tomates, égrenez-les  coupez-les en dés.\n\nRéservez un peu de ces trois légumes pour le décor.\n\nDans un bol à mixer, mettez la mie de pain, l'ail, l'oignon émincé, l'huile d'olive , le vinaigre, tous les légumes, sel et poivre.\n\nMixez et versez cette préparation dans une soupière, ajoutez 1 litre 1/4 d'eau mélangez et mettez 4 h au frigo.\n\nServez glacé en tasse en présentant en même temps des croûtons de pain frits à l'huile et les dés de légumes réservés.","source":"louli"},{"id":"lo_060","titre":"Gâteau aux oranges","auteur":"Simone","ingredients":"**Ingrédients :**\n500 g de farine\n250 g de sucre\n1 paquet de levure\n1 verre d’huile\n3 oranges\n3 œufs\n.","preparation":"Mélanger les œufs et le sucre, ajouter l’huile, la farine, la levure et le jus d’orange.\n\nMettre dans un moule beurré et cuite 20 à 30 minutes à four chaud.","source":"louli"},{"id":"lo_061","titre":"Gâteau aux pommes","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n5 cuillerées à soupe bombées de farine\n4 cuillerées à soupe de sucre\n3 cuillerées à soupe de lait\n2 cuillerées à soupe d’huile\n1 œuf\n1 pincée de sel\n2 pommes\n½ paquet de levure\nPour la crème :\n80 g de beurre\n80 g de sucre\n1 œuf\nvanille ou sucre vanillé","preparation":"Mélangez la farine, le sucre, la levure et le sel. Ajoutez le lait, l’huile et travaillez au batteur. Versez dans un moule rond de 22 ou 24 cm de diamètre, beurré et fariné. Couvrez de minces tranches de pommes et mettez à four moyen (Th 4).\n\nPréparez la crème : faites fondre le beurre au micro-ondes et ajoutez le sucre et l’œuf.\n\nAu bout de 25 mn, quand le gâteau commence à lever, arrosez-le avec la crème et continuez la cuisson 15 mn.\n\nAu sortir du four, couvrez le gâteau d’un couvercle métallique : cela aidera à le démouler.","source":"louli"},{"id":"lo_062","titre":"Gâteau de semoule","auteur":"Louli","ingredients":"**Pour 8 personnes :**\n¾ l de lait\n50 g de beurre\n3 œufs\n120 g de semoule (semoule de blé dur, pas semoule de couscous)\n80 g de sucre\nzeste d’orange (facultatif)","preparation":"Faites bouillir le lait avec le beurre et le zeste râpé d’une orange. Au moment de l’ébullition, versez la semoule. Cuisez 3 ou 5 minutes en remuant constamment. Retirez du feu et ajoutez le sucre, les jaunes d’œufs puis les blancs battus en neige. Versez dans un grand moule ou plusieurs petits et laissez refroidir.","source":"louli"},{"id":"lo_063","titre":"Gaufres","auteur":"Recette de Simone","ingredients":"**Ingrédients**\n- 200 g de farine\n- 60 g de beurre\n- 60 g de sucre\n- 3 œufs\n- 1/4 de litre de lait\n- 1 pincée de sel\n- 1 paquet de sucre vanillé\n-  kirsch ou rhum, suivant les goûts","preparation":"Faire ramollir le beurre, mélanger avec le sucre, le sucre vanillé, le sel , 2 oeufs entier et un jaune bien battus .\n\nAjouter la farine, délayer avec le lait et parfumer.\n\nIncorporer le 3ème blanc d’oeuf battu en neige.\n\nAu moment où on commence à cuire la pâte qui doit être assez liquide pour être versée à la cuillère.\n\nPoser sur une assiette et saupoudrer de sucre.\n\nA déguster chaudes !\n\n**mode d’emploi:**\n\nBrancher le gaufrier 12 minutes environ, beurrer légèrement les plaques pour la ère gaufre, inutile de beurrer pour les suivantes ; étaler la pâte sur le moule intérieur, fermer l’appareil.\n\nIl suffit de 2 ou 3 minutes pour cuire une gaufre.","source":"louli"},{"id":"lo_064","titre":"Gibier sauce grand veneur","auteur":"Simone","ingredients":"**Ingrédients :**\n**Marinade :**\n¾ l de vin rouge\n6 cuillerées à soupe de vinaigre\n2 carottes\n2 oignons\n1 gousse d’ail\n1 bouquet garni\n5 grains de poivre\n**Sauce grand veneur :**\n100 g de lard gras\n60 g de farine\n2 verres de marinade\n¾ l d’eau\n50 g de crème fraîche\n1 cuillerée à café de moutarde\n1 cuillerée à café de gelée de groseille\nSel, poivre\n**Garniture :**\n1 kg de purée de marrons non sucrée\n30 g de beurre\n70 g de crème fraîche\n**Viande pour 8 personnes :**\n2 kg de cuissot de chevreuil\n.","preparation":"Mettre les morceaux de viande avec les déchets et les petits morceaux de peau dans la marinade. Laisser macérer au frais en retournant de temps en temps pendant 2 ou 3 jours.\n\nPréparer la sauce : Faire fondre le lard en morceaux dans une cocotte, ajouter les déchets de la marinade et les aromates. Saupoudrer de farine et faire blondir. Ajouter les verres de marinade et l’eau avec le sel et le poivre. A ébullition, baisser le feu et laisser mijoter une heure à découvert.\n\nPendant ce temps, essuyer les morceaux de viande, les tartiner de beurre et les mettre dans un plat à four. Faire cuire à four chaud environ 1 heure.\nRéchauffer la purée de marrons au bain-marie avec sel, poivre, crème et beurre.\n\nSortir le rôti du four et le garder au chaud.\n\nAjouter un verre de marinade au jus de cuisson. Ajouter le jus déglacé à la sauce. Couper le feu et ajouter la crème. Passer la sauce au chinois et ajouter moutarde et gelée de groseille.\nServir la viande en tranches sur un lit de purée de marrons. Présenter la sauce à part.","source":"louli"},{"id":"lo_065","titre":"Gratin dauphinois","auteur":"Louli","ingredients":"**Pour 5 personnes :**\n1 kg de pommes de terre\n50 g de beurre\n1 gousse d’ail (facultatif)\n50 g de gruyère râpé\nsel, poivre\n1/3 l de lait\n2 œufs\n½ dcl de crème","preparation":"Epluchez et coupez les pommes de terre en fines rondelles. Mettez-les à cuire avec le lait pendant environ ¼ d’heure.\n\nEgouttez les pommes de terre en gardant le lait.\n\nBeurrez un plat à gratin et frottez-le d’ail. Disposez les rondelles de pomme de terre mélangées avec de petits bouts de beurre et le gruyère râpé. Salez et poivrez.\n\nCouvrez avec le lait auquel vous aurez ajouté les œufs et la crème.\n\nMettez au four (Th 5) et au bain-marie pendant une heure trente.","source":"louli"},{"id":"lo_066","titre":"Harira","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n200 g de viande de bœuf pour pot-au-feu, coupée en dés\n500 g oignons\n200 g de pois chiches déjà trempés 12 h\n150 g de lentilles vertes\nvermicelle\n125 g de concentré de tomates\n200 g de farine\n1 bouquet de coriandre\n1 bouquet de persil\n1 branche de céleri\n1 dose de safran\n1 cuillerée à café de poivre moulu\n2 cuillerées à soupe d’huile\nsel\n**Ingrédients **\n20 à 24 grosses huîtres\nGros sel pour mise au four\n30g de beurre\n1 blanc de poireau\nSel et poivre\n1 pincée de sucre\nJus de citron\n10cl de vin blanc sec\n1 pincée de safran\n150g de crème fraîche\n1 jaune d'œuf","preparation":"Faire revenir dans l’huile, oignons, viande et céleri. Laisser cuire 5 minutes sans dorer. Ajouter ¾ L d’eau et les épices. Mélanger 2 minutes. Ajouter ¾ L d’eau et les pois chiches. Cuire sous pression 20 minutes.\n\nFaites cuire les lentilles séparément.\n\nMélanger 1 L d’eau avec la farine, le concentré, le persil et la coriandre hachés. Ajouter à la soupe avec les lentilles. Ajouter le vermicelle et laisser cuire 15 minutes environ jusqu’à ce que le voile blanchâtre de la surface disparaisse.\n\nHuîtres gratinées au blanc de poireau\n\n**Louis**\n\nRetirez les huîtres de leurs coquilles et conservez-les au réfrigérateur.\n\nLavez les coquilles et disposez-les sur un  lit de gros sel\n\nDans une poêle, faites suer le blanc de poireau dans le beurre sans cesse de remuer, ajoutez le sel, le poivre, le sucre.\n\nCouvrez et laissez mijoter\n\nArrosez de jus de citron.\n\nDans une casserole, portez à ébullition le vin et le safran.\n\nLaissez bouillir jusqu'à réduction de moitié\n\nDans un bol, mélangez la crème et le jaune d'œuf, puis versez ce mélange dans une casserole avec le vin.\n\nRemuez constamment jusque la sauce épaississe, sans bouillir.\n\nSalez poivrez et retirez du feu\n\nGarnissez chaque coquille de blanc de poireau, posez les huîtres par-dessus, et versez la sauce.\n\nPlacez les huîtres sous le grill préchauffé, jusqu'à ce que les huîtres gratinent.\n\nServez aussitôt.","source":"louli"},{"id":"lo_067","titre":"Jambalaya","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n300 g de riz\n3 œufs\n200 g de queues de crevettes\n200 g de jambon\n1 petite boîte de crabe\n1 poivron\n3 tomates\n1 branche de céleri\n1 concombre\n3 oignons\n2 gousses d’ail\n1 petite boîte de petits pois\n1 petite boîte d’haricots verts\n2 cuillerées à soupe de sauce de soja\n1 cuillerée à soupe de nuoc-mam\nciboulette\nmenthe\nsel, poivre et piment\nCe jambalaya est la version américaine du riz cantonnais. La garniture peut varier suivant les goûts …et les restes du frigo.","preparation":"Faites cuire le riz tout seul.\n\nPréparez les légumes : faites griller la peau du poivron et épluchez-le. Trempez les tomates dans l’eau bouillante enlevez la peau et les pépins. Epluchez le concombre et ôtez le maximum de graines.\n\nCoupez tous les légumes en petits morceaux ainsi que le jambon.\n\nDans une sauteuse, faites revenir les oignons coupés, sortez-les et mettez à la place le poivron. Sortez-les et mettez à la place l’ail et le céleri. Ajoutez les tomates, le jambon, les crevettes, le crabe et le concombre qui doit rester croquant. Sortez les ingrédients de la sauteuse.\n\nBattez chaque œuf en omelette séparément et faire cuire comme une fine crêpe. Coupez ces omelettes miniatures en lanières.\n\nRemettez un peu d’huile dans la sauteuse et ajoutez-y le riz puis tous les éléments ainsi que la ciboulette et la menthe. Ajoutez le nuoc et le soja. Rectifiez l’assaisonnement avec le sel et le piment et servez très chaud.","source":"louli"},{"id":"lo_068","titre":"Lapin aux pruneaux","auteur":"Louli","ingredients":"Yvonne\n**Pour 4 personnes :**\n1 lapin\n2 tranches de lard\n1 oignon\n4 carottes\n1 sachet de pruneaux dénoyautés\n1 cuillerée de farine\n1 branche de thym","preparation":"Découpez le lapin en morceaux et le lard en lardons.\n\nFaites revenir l’oignon dans une sauteuse, puis faire revenir les morceaux de lapin. Sortir le lapin de la cocotte.\n\nMouiller le fond de la cocotte avec un peu d’eau puis ajouter la farine et délayer en rajoutant éventuellement un peu d’eau.\n\nRemettre le lapin, le lard, les carottes coupées en rondelles et le thym. Assaisonner, couvrir et laisser mijoter 30 minutes à feu doux.\n\nEn fin de cuisson, ajouter les pruneaux pour les réchauffer.\n\nServir avec du riz ou des pommes de terre à l’eau.","source":"louli"},{"id":"lo_069","titre":"Lapin grillé au cumin","auteur":"Louli","ingredients":"","preparation":"**Louis**** : **\n**Ingrédients pour 4 personnes:**\n4 épaules de lapin\n1 cuillerée à soupe de cumin en poudre\n6 cuillerées à soupe  d'huile d'olive\nle jus de 3 citrons\n1 ou 2 étoiles d'anis étoilé\nsel, poivre\n**Recette :**\nDans un récipient, verser l'huile, le jus des citrons et l'anis, saler poivrer. Ajouter le cumin, bien mélanger.\nFaire mariner les morceaux de lapin 10 mn\nEgoutter les morceaux de lapin, les faire cuire sur un gril ou un barbecue, pas trop près de la braise, 6 minutes par face.\nServir avec un taboulé à la menthe et à la coriandre bien frais\nOn peut faire mariner les morceaux de lapin la veille de la cuisson en les maintenant au frais.","source":"louli"},{"id":"lo_070","titre":"Lotte à la sauce tomate","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n500 g de lotte sans déchets, coupée en morceaux\n2 oignons\n1 gousse d’ail\n100 g de matière grasse\n1 petite boîte de coulis de tomates\n1 dcl de vin blanc\n1 dcl de crème\nsel, poivre","preparation":"Faites revenir la lotte dans la matière grasse puis sortez-la. Mettez à la place l’oignon et l’ail hachés puis ajoutez la tomate et remettez le poisson. Ajoutez le vin blanc, le sel et le poivre et faites cuire à feu doux environ 20 mn.\n\nAu moment de servir, liez la sauce avec la crème.","source":"louli"},{"id":"lo_071","titre":"Lotte \" P'tit Louis \"","auteur":"Louis","ingredients":"**Ingrédients pour 4 personnes **\n600 g de joues de lotte\n6 tomates\n1 oignon\nPersil\nBouquet de coriandre","preparation":"Peler les tomates dans l'eau bouillante et les épépiner.\n\nFaire fondre les oignons,  y ajouter les tomates le persil puis le coriandre un peu de sel et de poivre ou du piment selon le goût, jusqu'à obtenir une sauce onctueuse.\n\nFiltrer le tout dans un chinois.\n\nReprendre la sauce en y ajoutant un verre à Porto d'eau froide  contenant deux cuillères à café de Maïzena.\n\nFaire mijoter les joues de lotte 10 mn dans la sauce.\n\nServir éventuellement avec un mince filet de jus de citron.","source":"louli"},{"id":"lo_072","titre":"Madeleines","auteur":"Simone","ingredients":"**Ingrédients :**\n3 œufs\n5 cuillerées à soupe de sucre\n3 cuillerées à soupe de farine\nJus de citron\n½ paquet de levure\n1 cuillerée de lait\nsel\n.","preparation":"Travailler les ingrédients avec les jaunes d’œufs, incorporer les blancs battus. Mettre dans un moule beurré à four chaud.","source":"louli"},{"id":"lo_073","titre":"Marbré","auteur":"Simone","ingredients":"**Pour 6 personnes :**\n125 g de beurre doux\n250 g de sucre\n250 g de farine\n½ tasse de lait\n3 œufs\n1 paquet de levure\n125 g de chocolat à cuire","preparation":"Mélangez le beurre fondu et le sucre, travaillez jusqu’à ce que le mélange blanchisse. Ajoutez les jaunes d’œufs, le lait et la farine ainsi que les ¾ du paquet de levure.\n\nBattez les blancs en neige et ajoutez-les. Séparez la pâte en deux.\n\nFaites fondre le chocolat au micro-onde avec un peu d’eau et incorporez-le à une moitié de pâte.\n\nBeurrez un moule et remplissez-le alternativement avec la pâte au chocolat et la pâte nature.\n\nMettez à four doux (Th 5) environ 45 minutes. (Vérifiez la cuisson avec un couteau)","source":"louli"},{"id":"lo_074","titre":"M Chaoulat","auteur":"Louli","ingredients":"","preparation":"**Commentaire :** Recette de Louis, agneau de Tunisie pour 4 personnes\n**Ingrédients :**\nPréparation de la kefta :\n1 kg d'agneau de fin de gigot, collier, foie de viande hachée\n10 cl d'eau de fleur d'oranger\n1 c à s de paprika doux\n1 c à s de curcuma\n1 bâton de cannelle\n1 c à c de boutons de rose en poudre\n1 citron\n10 cl d'huile d'olive\nsel\nDécoration :\nFeuilles de menthe\n1 pomme de terre\n1/2 citron\n**Recette :**\nLa veille faites revenir les pistils de safran dans une poêle à sec afin de les rendre craquants. Réduisez les en poudre avec un pilon. Incorporez les à la fleur d'oranger et laisser mariner 12 heures.\nCoupez les différents morceaux d'agneau en portions et assaisonnez-les avec le sel, le curcuma, le paprika, le bâton de cannelle et la poudre de boutons de rose.\nAjoutez l'huile d'olive et la préparation de fleur d'oranger safranée.\nA l'aide de deux cuillères en bois malaxer la viande pour que les épices s'imprègnent.\nFaites cuire la pomme de terre dans de l'eau salée et réservez-la pour la décoration.\nMettez la viande à cuire à feu vif pendant 10 mn\nAjoutez 2 verres d'eau et laissez cuire environ 40 mn pour obtenir une sauce jaunâtre et onctueuse.\nAvant de dresser la viande dans l'assiette, arrosez-la de jus de citron.\nDécorez avec la pomme de terre et les morceaux de foie, une feuille de menthe et une rondelle de citron.","source":"louli"},{"id":"lo_075","titre":"Merveilles","auteur":"Simone","ingredients":"**Ingrédients :**\n700 g de farine\n4 œufs\n70 g beurre\n200 g sucre\nZeste ½ citron râpé\nSel\n.","preparation":"Dans un saladier, mélanger les œufs, le citron et le sucre jusqu’à ce que le mélange blanchisse. Ajouter la moitié de la farine, mélanger  et ajouter le reste. Couper la boule de pâte en 4. Etendre chaque morceau à 1/3 cm d’épaisseur. Découper les merveilles et les jeter dans de l’huile bouillante, les retourner et les égoutter sur du Sopalin. Sucrer et consommer tiède.","source":"louli"},{"id":"lo_076","titre":"Morue simili\" à la Portugaise \"","auteur":"Louis","ingredients":"**Ingrédients pour une sauteuse :**\n2 oignons\n3 gousses d'ail\n5 tomates\n6 pommes de terres\n500 g de morue ou plus","preparation":"Faire dessaler la morue dans une passoire plongée dans un récipient d’eau pendant 12h\n\nDans une sauteuse avec couvercle permettant une cuisson à l'étouffée,\n\nfaire sauter dans de l'huile d'olive , oignons hachés , ail , safran en filaments .\n\nY ajouter des tomates coupées horizontalement, sans pépins, pour couvrir le fond de la sauteuse.\n\nAjouter ensuite ,1/4 de verre d'eau contenant : 3 cuillers à café de Maïzena, une cuiller à soupe de Ketchup, du piment en poudre et du sel.\n\nMettre ensuite des rondelles de pomme de terre d'un demi centimètre d'épaisseur (plutôt plus) pour napper ainsi toute la surface des tomates.\n\n**Ne pas remuer.**\n\nLaisser mijoter entre **20 et 30 minutes** (plutôt plus) **avec le couvercle**\n\n10 minutes avant de servir déposer sur le dessus la morue bien dessalée coupée en morceaux de 5x8 cm environ.\n\n**Laisser cuire 6 minutes avec le couvercle**\n\nServir ainsi dans la sauteuse.\n\nLe principe est de cuire par strates, oignons, ail, tomates puis pommes de terre et enfin morue.\n\n***La recette est valable avec du cabillaud frais en morceaux épais.***","source":"louli"},{"id":"lo_077","titre":"Mousse au chocolat","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n6 œufs\n250 g de chocolat à cuire\n125 g de beurre non salé\n1dcl de crème","preparation":"Au micro-ondes ou au bain-marie (de préférence), faites fondre le chocolat avec un peu d’eau. Ajoutez les jaunes, le beurre fondu et la crème. Battez les blancs en neige ferme. Ajoutez la moitié des blancs au mélange, mélangez bien. Ajouter l’autre moitié plus délicatement.\n\nCouvrez d’un film et mettez au frais au moins 12 heures.","source":"louli"},{"id":"lo_078","titre":"Muffins au chocolat et aux bananes","auteur":"Laurence et Sandrine","ingredients":"**Pour 12 muffins :**\n150g de chocolat à cuire, cassé en morceaux\n2 petites bananes écrasées\n10 cl de lait demi écrémé\n2 œufs\n225 g de farine\n150 g de beurre fondu\n1 pincée de sel\n1 cuillerée à café de levure chimique\n150 g de sucre roux","preparation":"Préchauffer le four th 7 (200°C). Mettre le lait, les œufs et le beurre dans un saladier et fouetter jusqu’à obtention d’un mélange homogène.\n\nDans un autre saladier, mélanger la farine, le sel et  la levure. Ajouter le sucre et le chocolat et bien mélanger.\n\nVerser le premier saladier dans le second sans remuer et incorporer les bananes.\n\nDéposer un peu de mélange dans 12 petites barquettes en papier et faire cuire 20 minutes. Laisser refroidir sur une grille.","source":"louli"},{"id":"lo_079","titre":"My-Sao","auteur":"Louli","ingredients":"**Recette de Louis, **pour quatre personnes** :**\n2 paquets de pâtes jaunes chinoises\n1 poulet désossé (ou des blancs de poulet, plus secs mais plus rapides à utiliser)\n5 carottes\n2 oignons\n1 céleri en branche\n2 poireaux\n3 cuillerées à soupe de sauce de soja\n1 cuillerée à soupe de Maïzena\n1 cuillerée à café de sucre en poudre\n1 cuillerée à soupe de vinaigre blanc\n1 tasse d'eau (à ajuster)\nsel et poivre","preparation":"Deux heures avant le repas, faites cuire les pâtes dans de l'eau bouillante salée. Egouttez-les en les détachant les unes des autres. Etalez-les sur un torchon.\n\nCoupez la chair du poulet en dés et faites les revenir à la poêle avec un peu de margarine. .\n\nAjoutez la maïzena délayée dans la tasse d'eau avec le vinaigre, le sucre et la sauce de soja. Salez, poivrez et pimentez éventuellement. Couvrez et finissez la cuisson\n\nPendant la cuisson du poulet, coupez les oignons en fines rondelles et faites-les fondre doucement dans une casserole avec un peu d'huile.\n\nCouvrez et laissez cuire sans blondir 15 minutes.\n\nAjoutez alors les autres légumes coupés en très petits morceaux. Laissez cuire encore 20 minutes.\n\nEn fin de cuisson, salez, poivrez, et gardez au chaud.\n\nFaites griller rapidement les nouilles (à la poêle ou mieux dans la friteuse). Elles doivent être saisies et croquantes.\n\nTapissez le fond des bols avec les nouilles grillées, ajoutez un peu de poulet et de légumes ainsi qu'un jus de citron.","source":"louli"},{"id":"lo_080","titre":"Nems","auteur":"Louli","ingredients":"**Recette de Louis, **pour 20 nems environ** :**\n10 g de champignons noirs séchés\n50 g de vermicelle transparent\n200 g d échine de porc\n150 g de crevettes\n2 gousses d’ail\n1 oignon\n1 œuf\nsel et poivre\n1 laitue\nmenthe\nnuoc-mâm\n**Sauce :**\nPresser un citron. Ajouter autant d’eau puis autant de Nuoc-Mâm que de jus de citron. Ajouter un demi-sucre. Répartir dans des coupelles.","preparation":"Faire cuire dans de l’eau bouillante le vermicelle et les champignons noirs pendant 3 minutes. Les égoutter.\n\nHacher la viande, l’ail, les oignons et les champignons noirs.\n\nCouper le vermicelle cuit en petits morceaux ainsi que les crevettes.\n\nMélanger le tout avec l’œuf, le sel et le poivre.\n\nPréparer un plat creux (genre plat à tarte) plein d’eau. Y faire tremper 2 galettes. Lorsqu’elles se ramollissent, les sortir et les poser sur un torchon humide. Les remplacer par d’autres.\n\nEtaler une galette, poser une cuillère à soupe de farce dessus. Tasser la farce en forme de petit boudin de 6 cm sur 2 environ et rouler la galette autour. Il faut serrer les galettes mais ne pas les déchirer.\n\nPréparer ainsi toutes les nems.\n\nJuste avant le repas, faire chauffer un fond d’huile dans une poêle et faire revenir les nems par paquets de 6. Il faut les retourner pour les dorer de tous les côtés. Les poser au fur et à mesure sur du papier absorbant.\n\nServir les nems avec de la salade verte et de la menthe et la sauce.","source":"louli"},{"id":"lo_081","titre":"Œufs en cocotte","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n4 œufs\n4 cuillerées à soupe de crème\n25 g de beurre\nsel, poivre","preparation":"Versez la crème dans des petits moules individuels, salez, poivrez. Ajoutez un œuf dans chaque moule et faites cuire au bain-marie dans un four très chaud (Th 8) pendant 6 à 8 mn pour que le blanc soit pris.\n\n**Variante :**\n\nOn peut ajouter du jambon, du fromage, des fines herbes.","source":"louli"},{"id":"lo_082","titre":"Omelette Norvégienne","auteur":"Yvonne","ingredients":"**Ingrédients :**\nUne boîte de 24 biscuits à la cuillère\n3/4 de litre de glace vanille Carte d’or\n5 blancs d’oeufs\n150 g sucre vanillé + sucre ordinaire\n1 cuiller d’alcool de poire ou d’Armagnac pour flamber","preparation":"Mettre sur le fond d’un plat long une couche continue de biscuits cuillers qui a pour but de former un isolant entre le fond du plat , qui passe au four , et la glace posée dessus à la cuiller et sans la lisser , car il faut qu’elle présente des aspérités pour accrocher la meringue .\n\nPendant que le four préchauffe un quart d’heure, monter la meringue en battant vivement , 5 blancs d’oeufs et 150 g de sucre vanillé .\n\nRecouvrir la glace d’une couche assez épaisse de meringue que l’on peut un peu poudrer de sucre.\n\nPasser le tout  au four + grill pendant 5 mn.\n\nFlamber l’omelette à sa sortie du four, à l’alcool de poire ou à l’Armagnac.","source":"louli"},{"id":"lo_083","titre":"Osso bucco","auteur":"Louli","ingredients":"**Pour 6 personnes :**\nJarret de veau coupé en tranches\n3 oignons\n400 g de carottes\n2 branches de céleri\n2 gousses d’ail\n1 bouquet garni\n500 g de tomates fraiches ou une boite de pulpe de tomates\n¼ l de bouillon de volaille\n1 dl de vin blanc (facultatif)\n6 cuillerées à soupe d’huile d’olive\n1 cuillerée à soupe de zeste de citron râpé\n1 cuillerée à soupe de zeste d’orange râpé","preparation":"Dans une cocotte à fond épais, faites revenir les tranches de veau dans l’huile.\n\nEpluchez les oignons et le céleri et émincez-les. Pelez et coupez les carottes en rondelles.\n\nLorsque la viande est dorée, sortez-la de la cocotte et mettez les légumes à la place avec l’ail. Couvrez et laissez étuver 10 minutes.\n\nPlongez les tomates dans de l’eau bouillante. Pelez-les, épépinez-les et coupez la chair en petits morceaux.\n\nMettez la viande dans la cocotte avec les tomates, le bouillon, le vin blanc et le bouquet garni. Salez et poivrez. Couvrez et laissez mijoter à feu doux 1 heure 15 minutes.\n\nSortez la viande de la cocotte et mettez à la place les zestes et le persil. Versez le mélange sur la viande et servez avec des pâtes ou du riz nature.","source":"louli"},{"id":"lo_084","titre":"Paella","auteur":"Louli","ingredients":"","preparation":"Louis\n**Ingrédients pour 10 personnes:**\n1 poulet tendre ou un morceau de veau\n500 g de calmars\n10 langoustines ou 500 g de crevettes\n1 l de moules ou gros coquillages\n1 tranche de petit salé fumé ou quelques petites saucisses.\n1 petite langouste ou chair d'araignée de mer ou des étrilles.\n2 poivrons verts, 2 poivrons rouges.\n1 boite de petits pois.\n1 cuiller à café de safran.\n1 gros oignon, qq gousses d'ail.\n4 tomates réduites à l'huile ou concentré (1 petite boite)\n30 cuillerées à soupe de riz (le rincer longtemps à l'avance jusqu'à ce que l'eau soit claire et bien le laisser sécher sur un torchon)\nHuile d'olive, poivre de Cayenne doux ou fort\nFaire dorer et cuire le poulet en morceaux ou le veau, les saucisses, le petit salé, les sortir de la poêle.\nFaire dorer les oignons coupés fin, puis l'ail émincé.\nDans le four chaud ou sur le barbecue, enlever la peau des poivrons.\nMettre les morceaux de poivrons dans la poêle avec les oignons, ainsi que les calmars.\nLaisser prendre couleur.\nMettre le tout dans une casserole plus haute que la poêle pour y faire ouvrir les coquillages et les langoustines etc...\nAjouter les tomates (il doit y avoir du jus dans la casserole  il servira à mouiller le riz)\nSaler, poivrer, safraner.\nSur un feu de charbon constant  mettre la poêle à paella avec un fond d'huile d'olive, y faire revenir le riz bien sec qui doit crisser sous la cuiller de bois.\nMouiller alors avec le bouillon et y verser tous les coquillages, légumes etc qui auront été  salés poivrés safranés et ne plus remuer.\nAjouter de l'eau chaude si le bouillon n'est pas suffisant :\nle niveau devant affleurer la surface du riz.\nLaisser cuire doucement et régulièrement une heure environ, ajouter un peu d'eau ou du jus de cuisson des étrilles, si nécessaire en cours de cuisson.\nLaisser reposer qq minutes avant de servir pour que le riz boive bien le jus et que les grains se détachent.\nServir tel quel.","source":"louli"},{"id":"lo_085","titre":"Petits pains","auteur":"Louli","ingredients":"","preparation":"**Généralités :**\nPréparer la pâte avec le programme sans cuisson\nVerser la pâte sur le plan de travail fariné, la diviser en 10 morceaux (si possible, peser pour que les pains aient la même taille)\nFaçonner chaque pain en forme de boule en « rentrant la pâte » par en dessous. Poser les pains avec la partie lisse dessus.\nLaisser lever une demi-heure environ.\nEntailler chaque pain à l’aide de ciseaux.\nFaire chauffer le four à 220°.\nVerser un demi verre d’eau sur la plaque pour produire de la vapeur qui dorera les pains.\nCuire entre 15 et 20 minutes environ. Les pains doivent être « secs » au toucher et avoir l’air durs.\n**Pains de seigle aux raisins :**\nDans l’ordre :\n- 280 ml d’eau\n- 1 cuillère à café de sel\n- 1 cuillère à soupe d’huile d’olive (ou de beurre)\n- 2 cuillerées à café de sucre\n- 1 cuillerée à café de jus de citron\n- 330 g de farine blanche\n- 200 g de farine de seigle\n- 1 cuillerée à café de levure\nLaisser le processus démarrer puis ajouter en malaxant à nouveau 10 minutes\n- 100 g de raisins secs\n**Pains à la figue et aux noisettes :**\nDans l’ordre :\n- 270 ml d’eau\n- 1 cuillère à café de sel\n- 1 cuillère à soupe d’huile d’olive (ou de beurre)\n- 2 cuillerées à café de sucre\n- 390 g de farine blanche\n- 60 g de farine de seigle\n- 1 cuillerée à café de levure\nLaisser le processus démarrer puis ajouter\n- 70 g de figues sèches coupées en morceaux\n- 20 g de noisettes grossièrement concassées\n**Pains complets aux noisettes :**\nDans l’ordre :\n- 220 ml d’eau\n- 1 cuillère à café de sel\n- 1 cuillère à soupe d’huile d’olive\n- 1 cuillère à café de miel\n- 1 cuillerée à café de jus de citron\n- 350 g de farine aux cinq céréales\n- 1 cuillerée à café de levure\nLaisser le processus démarrer puis ajouter\n- 20 g de noisettes grossièrement concassées\nVariante : au lieu de petits pains, on peut fabriquer deux pains longs. Allonger alors la cuisson à 20 minutes\n**Pâte à pizza: pour 2 pizzas de 30 cm**\n- 235 g d’eau\n- 12 g de beurre fondu\n- 25 g de sucre\n-1 cuillerée à café de sel\n- 385 g de farine\n- 1 cuillerée à café de levure\nPartager la pâte en deux, étaler. Si possible, laisser lever encore 20 minutes, garnir, cuire 10-12 min à 220°.","source":"louli"},{"id":"lo_086","titre":"Pastilla au pigeon (Maroc)","auteur":"Louis","ingredients":"","preparation":"**Pour le feuilletage :**\n10 à 30 feuilles de bricks selon la taille.\n150 g de beurre fondu\n2 jaunes d'œufs\n**Pour la farce :**\nPigeonneaux bien tendres (2 à 6)\n2 bottes de persil plat.\n1 botte de coriandre frais.\n4 gros oignons\n1 cuiller à café de sel.\n1/2 cuillerée à café de poivre\n1/2 cuillerée à café de gomme arabique moulu\n1 cuiller à soupe de sucre\n1/4 de cuillère à café de noix de muscade\n1/4 de cuillère à café de gingembre\n1/4 de cuillère à café de pistil de safran\n1 cuillère à café de cannelle\n1 verre d'eau\n3 cuillères à soupe d'huile\n5 à 10 œufs\nOn peut remplacer les épices par une cuillère à café de Ras-el-Hanout\n**Pour la pâte d****'****amande :**\n400g d'amandes décortiquées\n1/2 cuillère à café de cannelle\n1 cuillère à soupe d'eau de fleur d'oranger\n100g de sucre\n2 cuillères à soupe d'huile pour frire les amandes\n**Pour la décoration :**\n100g de sucre glace. 1 cuillère à café de cannelle\nDans une grande marmite, mettez l'huile, les oignons émincés, la coriandre hachée, le sel, le sucre et les épices.\nMélanger et disposer dessus les pigeons entiers.\nFaites revenir à feu vif.\nAttendez le premier bouillon et baisser le feu ; couvrez puis laisser cuire à feu doux pendant 3/4 d'heure. Otez les pigeons et laisser mijoter encore une vingtaine de minutes.\nPendant ce temps désossez les pigeons.\nCassez les œufs un à un et incorporez les à la sauce de la cocote en mélangeant bien sur feux doux. Retirez du feu.\nEmondez vos amandes, séchez-les et faites-les frire : il faut qu'elles dorent sans brûler.\nPassez les à la moulinette. Mettez-les dans un saladier et ajoutez-y le sucre, la cannelle et la fleur d'oranger.\nAu milieu d'un grand moule rond bien beurré, disposez 3 ou 4 feuilles de brick beurrées superposées pour que le poids de la farce ne déchire pas le fond de la pastilla.\nPuis formez une corolle tout autour pour garnir le fond. Les feuilles doivent se chevaucher et déborder largement le pourtour du moule.\nN'oubliez pas de badigeonner chaque feuille avec un pinceau trempé dans le beurre fondu\nDisposez sur ce fond une couche de pâte d'amandes puis une couche de feuilles bien beurrées, puis une couche de farce de pigeonneaux et alternez les couches jusqu'à épuisement.\nRefermez la pastilla comme une tourte en ourlant le fond avec les bords.\nUtilisez un jaune d'œuf pour coller les feuilles.\nEnfournez pendant une vingtaine de minutes à thermostat 6-7\nDressez sur un plat de céramique. Saupoudrez de sucre glace toute la surface de la pastilla et décorez avec de la cannelle.","source":"louli"},{"id":"lo_087","titre":"Pâte brisée","auteur":"Louli","ingredients":"**Pour un moule à tarte :**\n250 g de farine\n125 g de beurre\n½  cuillerée à café de sel\n5 cuillerées à soupe d’eau","preparation":"Mettre la farine dans un saladier avec le sel. Couper le beurre en tous petits morceaux puis malaxez à la main. Il s’agit d’écraser le beurre pour obtenir des « miettes » de beurre enrobé de farine. Lorsque tout le beurre est amalgamé à la farine, ajoutez l’eau et mettez la pâte en boule. A partir de ce moment, il faut éviter de trop pétrir. La quantité d’eau dépend de la farine : il faut que la pâte prenne en boule (elle se casse par manque d’eau) sans être détrempée.\n\nMettre la pâte au frigo ½ heure puis l’étaler pour garnir le plat.\n\nRemarque : on peut diminuer le beurre à 100 g si la préparation est riche (comme pour une quiche par exemple).\n\nLa même pâte sert pour toutes les tartes. Seules certaines tartes sucrées demandent une pâte sablée qui contient du sucre ne plus.","source":"louli"},{"id":"lo_088","titre":"Pâte à choux","auteur":"Simone","ingredients":"**Ingrédients :**\n125 g de farine\n75 g de beurre\n15 g de sucre\nSel\n¼ L d’eau\n4 œufs\n.","preparation":"Mettre l’eau dans une casserole avec le sel, le sucre, le beurre et faire chauffer. A ébullition, retirer du feu et ajouter la farine en tamisant. Bien remuer pour obtenir une pâte compacte (au besoin chauffer un peu à nouveau). Hors du feu, incorporer les œufs un par un jusqu’à ce que la pâte mollisse.\n\nDéposer en petits paquets sur une plaque beurrée et mettre à four chaud. Les laisser refroidir puis les garnir de crème pâtissière.","source":"louli"},{"id":"lo_089","titre":"Pastilla aux grains de sésame et aux amandes","auteur":"Louis","ingredients":"","preparation":"**Ingrédients ****:**\n20 feuilles de brick\n250 g de miel\n500 g de grains de sésame\n1 kg d'amandes émondées\n500 g de sucre en poudre\n1 cuillerée à soupe d'eau de fleur d'oranger\n300 g de beurre fondu\nhuile d'arachide\nGrillez les grains de sésame dans une poêle avec un tout petit peu d'huile, puis pilez-les grossièrement. Ils ne doivent surtout pas être réduits en purée.\nFaites aussi dorer les amandes et concassez les\nDans un saladier, mélanger amandes, sésame, sucre en poudre, eau de fleur d'oranger et 2 cuillerées à soupe de beurre fondu.\nDans une tourtière beurrée, étalez 3 feuilles de brick en badigeonnant chacune des feuilles avec un pinceau trempé dans du beurre fondu.\nEnsuite disposez, en partant du centre, une corolle de feuilles de brick comme s'il s'agissait de pétales d'une grande fleur. N'oubliez pas de badigeonner chacune de ces feuilles en laissant déborder l'extérieur.\nAu milieu disposez une bonne couche de farce de sésame et d'amandes.\nRefermez la tourte en rabattant les feuilles sur la farce.\nAvec les autres feuilles beurrées, recouvrez la pastilla en \"bordant\" la tourte pour la refermer hermétiquement.\nMettez à four moyen pendant une demi-heure environ.\nA la sortie du four arrosez de miel tiède.\nNota : Cette pastilla accompagne le café à merveille et se conserve une bonne vingtaine de jours","source":"louli"},{"id":"lo_090","titre":"Pâtés","auteur":"Recette de Simone","ingredients":"","preparation":"Acheter deux kg de foie de canard.\n**Farce hachée fin à commander au boucher :**\n4 kg de chair à saucisse\n1.5 kg de gorge de porc\n500 g de foie de porc\n**Préparer les pâtés :**\nAjouter du sel et du poivre à la farce environ 25 g de sel et 3 g de poivre par kg de farce, sauf si la farce est déjà salée par le boucher bien sûr.\nAjouter le foie coupé en morceaux et malaxer soigneusement.\nCuire dans une poêle une petite miette de pâté pour goûter l’assaisonnement. Rectifier.\nLaisser un peu reposer.\nMettre en bocaux de 200 g.\n**Stériliser :**\n2h30 à 100°. Laisser refroidir dans le stérilisateur. Ouvrir les couvercles pour enlever l’eau et vérifier la capsule.","source":"louli"},{"id":"lo_091","titre":"Pho","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n1 kg de jarret ou de poitrine de bœuf\n100 g de filet de bœuf\n50 g de pâtes de riz\n1 morceau de 3 cm de gingembre\n1 oignon\n5 clous de girofle\n3 grains de badiane (anis étoilé en pharmacie)\n10 grains de coriandre\nsel\nciboule\ncoriandre fraîche\nnuoc-mam","preparation":"Faites griller le gingembre et l’oignon sous un gril jusqu’à ce que l’écorce noircisse. Après refroidissement, enlever la peau noircie, hachez l’oignon et râpez le gingembre.\n\nMettez le bœuf et le sel dans un fait-tout et couvrez d’eau. Portez à ébullition 2 minutes et égouttez. Rincez à l’eau froide puis remettez la viande dans le fait tout lavé, ajoutez 2 litres d’eau et faites bouillir. Baissez le feu et laissez mijoter 1 ½ h à découvert jusqu’à ce que le liquide réduise d’un tiers. Ajoutez les aromates, l’oignon et le gingembre et laissez mijoter une heure de plus.\n\nPassez le bouillon sur un linge mouillé.\n\nFaites cuire les pâtes dans de l’eau et égouttez-les. Coupez le bœuf en lamelles très fines.\n\nDans les bols, répartissez la viande et les pâtes. Couvrez de bouillon très chaud. Saupoudrez de ciboule hachée, de coriandre. Assaisonnez de nuoc et d’un peu de jus de citron .","source":"louli"},{"id":"lo_092","titre":"Porc à l’aigre douce","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n700 g d’échine de porc désossée\n4 cuillerées à soupe d’huile\n2 gousses d’ail\n2 branches de céleri\n1 oignon\n6 cuillerées à soupe de vinaigre\n6 cuillerées à soupe rases de sucre\n6 cuillerées à soupe d’eau\n1 cuillerées à soupe de sauce Worcestershire\n1 cuillerée à soupe de ketchup\n250 g de chair d’ananas (frais ou en boîte)\n1 tomate\n1 cuillerée à soupe de Maïzena\n3 cuillerées à soupe de persil haché","preparation":"Découpez la viande en petits dés. Pelez l’ail. Emincez le céleri et l’oignon. Coupez l’ananas en dés. Ebouillantez la tomate pour la peler, l’épépiner et la couper en dés.\n\nDans une poêle, faites revenir la viande dans l’huile. Ajoutez ensuite le céleri, l’ail et l’oignon. Mélangez, ajoutez le sucre, laissez caraméliser et ajoutez le vinaigre. Ajoutez l’eau dans laquelle vous avez délayé la Maïzena, le ketchup, le sel, la sauce Worcestershire. Laissez mijoter 5 minutes puis ajoutez la tomate. Laissez cuire 10 minutes et ajoutez l’ananas. Laissez encore cuire 10 minutes.\n\nServez chaud parsemé de persil haché.","source":"louli"},{"id":"lo_093","titre":"Porc au caramel et aux cinq parfums","auteur":"Louis","ingredients":"**Ingrédients pour 4 personnes:**\n800g de travers de porc en un morceau\n5 épices\n2 cuillerées à soupe de sauce de soja\n2 gousses d’ail\n4 morceaux de sucre\nnuoc-mam\nriz gluant ou nature","preparation":"Prendre le morceau de porc Le couper en petits carrés de 2 cm de coté ou en bandes.\n\nLes frotter avec de la poudre de cinq parfums.\n\nFaire mariner dans deux cuillerées à soupe de sauce de soja où l'on aura mis deux gousses d'ail haché fin et une cuiller à café de poudre de cinq parfums.\n\nVerser la viande avec le jus dans la casserole.\n\nAjouter un demi litre d'eau.\n\nFaire cuire à petit feu pendant une heure et jusqu'à ce qu'il ne reste presque plus d'eau.\n\nFaire un caramel foncé avec quatre morceaux de sucre ;\n\nVerser sur la viande. Bien retourner pour que toute la viande prenne la couleur.\n\nLaisser mijoter encore quinze minutes.\n\nServir chaud ou froid avec du riz nature ou du riz gluant cuit à la vapeur et le nuoc-mam","source":"louli"},{"id":"lo_094","titre":"Porc aux haricots rouges","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n500 g de haricots rouges à faire tremper la veille\n1 tranche épaisse de jambon\n500 g de saucisson\n3 oignons\n1 poivron vert\n2 pieds de céleri en branche\n3 échalotes\nthym et laurier\n2 l d’eau","preparation":"Faites griller le poivron à la flamme ou au barbecue et pelez-le.\n\nCoupez les légumes en petits morceaux.\n\nFaites cuire ensemble les haricots, la viande et les légumes. La cuisson doit être longue et douce et durer environ 3 heures.\n\nServir la pâte obtenue avec du riz blanc","source":"louli"},{"id":"lo_095","titre":"Potage au potiron","auteur":"Recette de Louis, pour 4 personnes","ingredients":"","preparation":"**Ingrédients :**\nUn bon morceau de potiron bien jaune\nUne ou deux belles pommes de terre\nUn oignon\nSupprimez la peau et les pépins, coupez la chair en gros dés, ajoutez un peu de sel et faites sauter à la casserole sur feu très doux, puis ajoutez une grosse pomme de terre coupée en morceaux et un peu d'eau.\nSalez, poivrez et cuisez environ 15 minutes\nPendant ce temps là, dans une poêle faites brunir un oignon coupé menu avec du beurre et mettez le tout dans la casserole de potage.\nLorsque le potiron peut facilement se mettre en purée : le passer au tamis et garder l'eau.\nPassez au mixer\nMettez la purée résultante dans la casserole avec un bon morceau de beurre et tournez vivement pour le faire fondre et rendre la purée plus légère.\nAjoutez l'eau de cuisson et très peu de lait pour en faire un velouté.\nAu moment de servir liez avec un peu de crème épaisse, servez au premier bouillon sur du pain coupé en tranches minces ou grillées et ajoutez une pincée de poivre blanc.\nCela doit être moelleux et un peu poivré.","source":"louli"},{"id":"lo_096","titre":"Poulet curry","auteur":"Louis","ingredients":"","preparation":"**Ingrédients***** pour 6 personnes****** :***\n1 gros poulet (ou 2 petits)\n250 g de petit salé\n3 grandes cuillerées d'huile\n3 grandes cuillerées de farine\n2 grandes cuillerées de poudre de curry (dose à adapter suivant la fraicheur du curry)\n1 gros oignon\n1 bouquet de persil, thym, laurier.\n20 g de gingembre (un morceau de 2 ou 3 cm)\n10 clous de girofle\nsel et poivre\n1 brique de lait de coco (20 cl)\n½ paquet de noix de coco en poudre\nRiz normal ou riz gluant (à faire tremper la veille ou au moins deux heures avant le repas). Pour le riz gluant, doubler les quantités habituelles de riz.\n- découper le poulet en morceaux et enlever le maximum de peau.\n- faire revenir dans l'huile, le petit salé coupé en petits morceaux, le retirer du feu lorsqu'il est légèrement rissolé .\n- faire revenir légèrement les morceaux de poulets en y ajoutant à la fin l'oignon coupé en morceaux.\n- placer la casserole sur feu doux, replacer le petit salé et le poulet. Dans un bol, mélanger de l’eau avec la farine et le curry. Verser dans la cocotte et mettre à ce moment toutes les épices, y compris le lait de coco, couvrir la casserole et laisser le tout mijoter très lentement pendant 45 minutes.\n- un quart d’heure avant de servir, ajouter la poudre de coco.\n- présenter séparément, avec le curry, du riz normal ou gluant et des « rougaïs »\n**ROUGAIS au choix**\n| - noix de coco râpée - cacahuètes écrasées - purée d'aubergines cuite - tomates crues coupées - tomates frites - oignons grillés - oeufs durs coupés menus - concombres crus | - poivrons verts crus - poivrons rouges cuits - avocats crus - mangochestnut - sauce tomate très pimentée - bananes crues - bananes frites |\n| --- | --- |","source":"louli"},{"id":"lo_097","titre":"Poulet au gingembre","auteur":"Louli","ingredients":"- **Louis**\n- **Ingrédients :**\npoulet de 1,5 kg\n1 morceau de gingembre de 5cm environ, épluché et écrasé\n2 cuillères à soupe de vinaigre blanc\n5 cuillères à soupe d’huile\n1 oignon émincé\n3 échalotes hachées\n3 gousses d’ail écrasées\n2 feuilles de citronnelle hachées\n180 cc d’eau\n1 cuillère à soupe de nuoc-mam\n1 cuillère à café de sucre\npoivre noir fraîchement moulu\nfeuilles de coriandre fraîches découpées.\n***","preparation":"Désossez le poulet et coupez la chair en petits morceaux.\n\nMélangez le gingembre et le vinaigre dans un petit bol et réservez.\n\nChauffer l’huile dans une grande poêle à frire.\n\nMettez l’oignon, les échalotes, l’ail et  la citronnelle à dorer 4-5 minutes à feu modéré sans couvrir.\n\nAjoutez les morceaux de poulet et faites–les cuire en remuant 3 minutes.\n\nVidez l’huile.\n\nAjoutez le mélange de gingembre et de vinaigre, ainsi que l’eau, et assaisonnez avec le nuoc-mâm, le sucre, le poivre.\n\nCouvrez et laissez mijoter 30 minutes ou jusqu’à ce que le poulet soit tendre.\n\nServez aussitôt garni de feuilles de coriandre.\n\nPoivrez légèrement si nécessaire.","source":"louli"},{"id":"lo_098","titre":"Poulet aux bambous","auteur":"Louli","ingredients":"","preparation":"**Louis: **\n**Ingrédients pour 4 personnes:**\n1 poulet désossé (ou des blancs de poulet)\n60 g de beurre ou de matière grasse\n1 boîte de pousses de bambou (en morceaux plutôt qu’émincées)\n1 morceau de sucre\n1 cuillerée à soupe de vinaigre\n1 cuillerée à soupe de farine\n1 cuillerée à café de cinq-épices\nsel et poivre\n**Recette :**\nDésossez et coupez le poulet en cubes. Saupoudrez les morceaux de cinq-épices, faites-les blanchir dans le beurre, salez, poivrez.\nAjoutez le sucre, le vinaigre, la farine dilués dans un verre d'eau et les pousses de bambou coupées en lamelles.\nMélangez bien et laissez cuire à petit feu pendant 25 minutes.\nServez avec du riz nature.","source":"louli"},{"id":"lo_099","titre":"Poulet aux olives et aux citrons confits.","auteur":"Louis","ingredients":"","preparation":"**Ingrédients :**\nPoulets entiers ou en morceaux\n100 g d'olives confites\n2 citrons confits\n2 oignons\n8 gousses d'ail\n1/2 cuillerée à café de safran\n1 bouquet de coriandre noué d'un fil\n1 demi verre à thé d'huile d'olive\nSel et poivre\nDans une sauteuse à couvercle mettre huile, safran, les oignons et l'ail hachés très fin, le sel et le poivre et faire blondir doucement.\nPuis faire revenir  les poulets soit entiers soit, **plus facilement**, coupés en morceaux avec abats,  bien les dorer sur tous les côtés et ajouter le bouquet de coriandre.\nRecouvrir d'eau (environ un grand verre) et  cuire à feu modéré, puis à feu doux jusqu'à obtenir une sauce onctueuse.\nAu besoin l'épaissir avec une cuillère à café de Maïzena dans très peu d'eau froide\nRetirer la coriandre de la sauteuse.\nRecouvrir d'olives confites (en principe violettes, mais vertes aussi, avec ou sans noyaux selon goût ) et de citrons confits coupés en lamelles.\nLaisser cuire doucement cinq minutes.\nNapper de sauce et servir chaud.\nEn l'absence de \" tajine\" ce plat peut se servir  en fait-tout.\nLes citrons confits existent en bocaux, dans les \" bons marchés \" ou peuvent être facilement réalisés ... auparavant!\n**Citrons confits :**\n**Ingrédients pour un bocal de 5 litres**\n15 gros citrons non traités\n250 g de gros sel\nLaver et brosser avec soin les citrons. Les faire tremper pendant 4h dans de l'eau. Les passer de nouveau sous l'eau. Oter les pédoncules. Essuyer et couper les citrons en 4 quartiers, dans le sens de la hauteur. Les mettre dans un récipient, ajouter le sel et mélanger.\nTasser les citrons dans un bocal hermétique. Fermer aussitôt et stocker dans un endroit bien sec .\n**Remarque :**\nLes citrons confits se conservent parfaitement dans un endroit sec, pendant plusieurs mois. Les prélever avec une cuiller en bois à chaque besoin.\nSi malgré tout il arrive que la couche supérieure des citrons moisisse, jeter les fruits abîmés et placer les autres dans un nouveau bocal.","source":"louli"},{"id":"lo_100","titre":"Poulet express","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 poulet\nfarine, lait\nsel, poivre","preparation":"Coupez le poulet en morceaux. Trempez les morceaux de poulet dans le lait puis mettez-les dans un saladier. Ajoutez la farine, fermez  le saladier et secouez pour enrober les morceaux régulièrement.\n\nVersez un peu d’huile dans une poêle creuse et faites dorer les morceaux de poulet sur les deux faces une minute de chaque côté. Salez, et poivrez.\n\nBaissez le feu et couvrez la poêle avec un couvercle plus petit pour que la vapeur s’évacue. Laissez cuire le poulet 8 minutes puis retournez les morceaux et cuisez encore 8 minutes.\n\n**Variante :**\n\nOn peut sortir le poulet et ajouter un peu de crème dans la poêle pour obtenir de la sauce.","source":"louli"},{"id":"lo_101","titre":"Quiche aux poireaux","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 paquet de pâte brisée\n2 œufs\n1 dcl de crème\n2 dcl de lait\n2 tranches de jambon\n1 poireau\n1 oignon\ngruyère râpé","preparation":"Placez la pâte brisée dans un moule. Placez la feuille de cuisson par-dessus et recouvrez-la de haricots secs.\n\nMettez au four (TH 5) pour 15 mn.\n\nPendant ce temps, coupez le poireau et l’oignon et faites-les revenir sans colorer dans un peu de matière grasse. Mélangez les œufs battus, le lait et la crème dans un saladier.\n\nEnlevez les haricots secs et répartissez les poireaux et le jambon sur la pâte puis recouvrez du mélange œufs-crème et ajoutez le gruyère.\n\nEnfournez pour à nouveau 15 mn.\n\nEn fin de cuisson, éteignez le four et laissez la quiche 5 minutes en attente.","source":"louli"},{"id":"lo_102","titre":"Quiche lorraine","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 paquet de pâte brisée\n2 œufs\n1 dcl de crème\n2 dcl de lait\n2 tranches de jambon\n2 tranches de lard\ngruyère râpé","preparation":"Placez la pâte brisée dans un moule. Placez la feuille de cuisson par-dessus et recouvrez-la de haricots secs.\n\nMettez au four (TH 5) pour 15 mn.\n\nPendant ce temps, coupez le lard et le jambon. Mélangez les œufs battus, le lait et la crème dans un saladier.\n\nEnlevez les haricots secs et répartissez le lard et le jambon sur la pâte puis recouvrez du mélange œufs-crème et ajoutez le gruyère.\n\nEnfournez pour à nouveau 15 mn.\n\nEn fin de cuisson, éteignez le four et laissez la quiche 5 minutes en attente.","source":"louli"},{"id":"lo_103","titre":"Rouille","auteur":"Louis","ingredients":"","preparation":"**Ingrédients pour Harissa (à faire d’abord):**\nPoivrons rouges rôtis\n1 c.à.c de tomate concentrée\n1 c.à.c de coriandre hachée\n1 pincée de pistil de safran\n2 piments rouges finement hachés\n1/4 de c.à.c de poivre de cayenne\n1/2 c.à c de sel\n**Recette :**\nDans un bol :\nPoivrons + concentré de tomates + coriandre + safran + piment + poivre + sel\nmixer en laissant dans le mixer l'équivalent de 2 c.à s si on veut faire une rouille avec.\nHumecter pain avec fumet de poisson , le presser , mettre dans le mixer + 1 c.à s harissa + ail + jaune d'oeuf + sel.\nMixer.\nVerser huile d'olive dans le mixer en marche pour avoir une rouille épaisse et moelleuse.\nFrigo = 3 jours","source":"louli"},{"id":"lo_104","titre":"Roulé à la confiture","auteur":"Simone","ingredients":"**Ingrédients :**\n80 g de sucre\n2 œufs\n40 g de fécule de pomme de terre\n½ pot de confiture\nUn peu de sucre glace","preparation":"Mélanger le sucre et les jaunes d’œufs jusqu’à ce que le mélange blanchisse. Ajouter la fécule puis les blancs battus en neige ferme.\n\nVerser le mélange dans un moule plat carré beurré (genre couvercle de boîte de biscuits)\n\nFaire cuire 10 minutes à four très chaud. Dès que le gâteau est cuit, il faut aller très vite : retourner le gâteau sur un papier beurré, recouvrir de confiture puis rouler en serrant le plus possible. Saupoudrer de sucre glace.","source":"louli"},{"id":"lo_105","titre":"Rouleaux de printemps","auteur":"Louli","ingredients":"**Recette de Louis, **pour 20 rouleaux environ **:**\n200 g d échine de porc\n150 g de crevettes décortiquées\n2 tranches de poitrine de porc\n200 g de germes de soja\nciboulette\nmenthe\n1 citron\nsel et poivre\n1 laitue\nnuoc-mâm\n**Sauce :**\nPresser un citron. Ajouter autant d’eau puis autant de Nuoc-Mâm que de jus de citron. Ajouter un demi-sucre. Répartir dans des coupelles.","preparation":"Faire cuire dans de l’eau bouillante le porc et la poitrine.\n\nCouper la viande et les crevettes en morceaux très fins mais en utilisant plutôt un hachoir à main qu’un mixer :\n\nCouper aussi grossièrement les germes de soja.\n\nMélanger le tout en ajoutant de la ciboulette et des feuilles de menthe coupées aux ciseaux puis un peu de zeste de citron, le jus d’un citron, du sel et du poivre\n\nPréparer un plat creux (genre plat à tarte) plein d’eau. Y faire tremper 2 galettes. Lorsqu’elles se ramollissent, les sortir et les poser sur un torchon humide. Les remplacer par d’autres.\n\nPrendre une galette ramollie, poser dessus un petit morceau de feuille de laitue sans nervure, et une cuillère à soupe de farce sur la laitue. Tasser la farce en forme de petit boudin de 6 cm sur 2 environ et rouler les galettes autour. Il faut serrer les galettes mais ne pas les déchirer.\n\nPréparer ainsi tous les rouleaux.\n\nOn peut aussi ne pas mettre la salade dans le rouleau de printemps mais la servir à part comme pour les nems.\n\nServir les rouleaux avec de la sauce.","source":"louli"},{"id":"lo_106","titre":"Salade avocat pamplemousse","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 salade verte\n1 pamplemousse\n1 avocat\n6 bâtonnets de surimi ou une petite boîte de crabe\ngermes de soja (facultatif)","preparation":"Dans un saladier, placez la salade au fond. Coupez le pamplemousse en deux et sortez les morceaux à l’aide d’une petite cuillère. Faites-le au dessus de la salade pour récupérer le jus. Coupez l’avocat en petits bouts et ajoutez-le ainsi que les germes de soja.\n\nAssaisonnez avec de l’huile d’olive qui va se marier avec le jus du pamplemousse.\n\n**Variante **: remplacer le surimi en bâton par des « miettes » de surimi ou par des crevettes ou du saumon fumé","source":"louli"},{"id":"lo_107","titre":"Salade de carottes","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 kg de carottes\n1 gousse d’ail\n1 morceau de gingembre\nraisins secs\n3 cuillerées à soupe de miel","preparation":"Pelez et coupez les carottes en rondelles. Faites-les cuire à feu doux 25 minutes avec de l’huile, l’ail, les raisins, le gingembre râpé, du sel, du poivre et un peu d’eau.\n\nAjoutez le miel en fin de cuisson.\n\nServez tiède ou froid.","source":"louli"},{"id":"lo_108","titre":"Salade de poivrons","auteur":"Louis","ingredients":"**Pour 4 personnes :**\n3 poivrons vert, rouge et jaune si possible.\n6 tomates\n1 gousse d’ail\ncumin\nhuile d’olive","preparation":"Faites griller les poivrons à la flamme ou au barbecue et pelez-les.\n\nPlongez les tomates dans l’eau bouillante, enlevez la peau et les graines.\n\nCoupez poivron et chair de tomates en morceaux et mettez-les dans un saladier.\n\nAjoutez l’ail écrasé, du sel, du poivre, du cumin et un peu d’huile d’olive et mélangez.","source":"louli"},{"id":"lo_109","titre":"Saumon mariné","auteur":"Louis","ingredients":"**Ingrédients pour 6 personnes:**\n1kg de saumon\n50g de gros sel\n50g de sucre\nPoivre blanc en grain\n2 bottes d'aneth\n**Sauce moutarde :**\n3 cuillers à soupe de moutarde douce\n3 cuillers à soupe de sucre\n1/2 cuillerée à café de vinaigre\nAneth haché","preparation":"Hacher l'aneth en brins. Concasser quelques grains de poivre. Bien mélanger avec le sucre et le gros sel.\n\nPrélever les filets de saumon et enlever les arêtes avec soin.\n\nEponger le saumon sans le laver .Dans un plat large, disposer le premier filet ( la peau en dessous ).\n\nSaupoudrer abondamment avec le mélange aromatisé.\n\nSuperposer le deuxième filet : le poisson est alors reconstitué.\n\nPoser dessus un poids assez lourd et le laisser mariner au frigo DEUX jours.\n\nAvant de le servir mettre le saumon (nettoyé de la saumure) 15 minutes au congélateur pour le raffermir et faciliter la découpe en tranches très fines de type \" carpaccio \".\n\nPréparer la sauce moutarde :\n\nMélanger la moutarde, le vinaigre et le sucre. Incorporer l'huile en filet en fouettant.\n\nParfumer d'aneth haché.\n\nServir sur ou avec des tranches de pain grillées.\n\nAccompagner d'épinards ou de pommes vapeur.","source":"louli"},{"id":"lo_110","titre":"Savarin","auteur":"Simone","ingredients":"**Ingrédients :**\n2 œufs\n60 g de farine\n60 g de sucre\n½ paquet de levure\n3 ou 4 cuillérées de lait ou de crème fraîche.","preparation":"Mélanger les jaunes avec le sucre, bien remuer puis ajouter la farine puis le lait et la levure. Battre les blancs en neige et les incorporer au mélange. Verser dans un moule bien beurré et mettre à four chaud 30 minutes environ.","source":"louli"},{"id":"lo_111","titre":"Sangria","auteur":"Simone","ingredients":"**Ingrédients  pour 6 personnes:**\n1 bouteille de très bon rosé\n2 oranges\n6 pèches\n5 cl de cognac\n60 g de sucre\n1 morceau de cannelle\nEau gazeuse suivant le goût","preparation":"Mettre dans un pichet le vin , le sucre le jus d’une orange, la seconde orange coupée en tranches, les pêches pelées et coupées en tranches, le cognac. Mélanger et mettre au réfrigérateur.\n\nAu moment de servir, mettre un ou deux glaçons dans les verres et remplir de sangria avec ou sans eau gazeuse.","source":"louli"},{"id":"lo_112","titre":"Soufflé au fromage","auteur":"Louli","ingredients":"**Pour 4 personnes :**\nBéchamel :\n80 g de matière grasse\n60 g de farine\n4 dcl de lait\nsel poivre\n4 œufs\n70 g de gruyère râpé","preparation":"Faites fondre la matière grasse, ajoutez la farine puis le lait et remuez jusqu’à obtention d’une sauce bien lisse.\n\nHors du feu, ajoutez les jaunes d’œufs, le gruyère et les blancs battus en neige. Salez, poivrez et remplissez un moule aux deux tiers de sa hauteur.\n\nEnfournez dans un four préchauffé (Th 7) pour 30 minutes environ. Vérifiez la cuisson et servez-le aussitôt.\n\n**Variante :**\n\nOn peut ajouter au soufflé du jambon, des champignons.","source":"louli"},{"id":"lo_113","titre":"Soupe à l’oignon","auteur":"Simone","ingredients":"**Ingrédients :**\n1 oignon\n1 cuillerée à soupe de farine\nGruyère\nsel\n.","preparation":"Hacher l’oignon et le faire frire à feu doux. Ajouter une bonne cuillerée de farine et du  sel puis 1 L ½ d’eau. Laisser mijoter 20 minutes.\n\nPréparer des croûtons (au beurre ou au grille-pain) et les placer dans des terrines allant au four.\n\nVerser la soupe et ajouter le gruyère râpé puis gratiner au four.","source":"louli"},{"id":"lo_114","titre":"Soupe au crabe et aux asperges","auteur":"Louli","ingredients":"","preparation":"**Louis:**\n**Bouillon de base :**\n1,5 l d'eau salée et très poivrée\nune carcasse de poulet, sans le gras\nun morceau de jarret de veau\nun gros oignon\n2 ou 3 étoiles de Badiane\nfaire bouillir une heure, enlever la viande, laisser refroidir, dégraisser , au besoin filtrez pour obtenir un bouillon clair et goûteux.\n**Ingrédients :**\n1,5 l de bouillon de poule (voir plus haut)\n1 cuiller à café de sel\npoivre noir fraîchement moulu\n300 g de chair de crabe défaite en morceaux\n350g de pointes d'asperges en boîte, égouttées, coupées en deux\n1 cuillère à soupe de Maïzena\n4 cuillères à soupe d'eau\n1 blanc d'oeuf battu (un peu)\n**Recette :**\nPortez le bouillon à ébullition dans une grande casserole et ajoutez le sel, le poivre, la chair de crabe et les asperges.\nDans une tasse, délayez la Maïzena avec l'eau pour obtenir une crème.\nVersez-la dans la soupe et laissez cuire, en remuant sans cesse à la cuillère de bois, jusqu'à ce qu'elle épaississe.\nLaissez bouillir le mélange deux minutes de plus en remuant de temps en temps.\nEn remuant, ajoutez le blanc d'œuf qui va former des filaments.\nRectifiez l'assaisonnement ajoutez en surface de la ciboulette coupée et servez aussitôt","source":"louli"},{"id":"lo_115","titre":"Soupe au pistou","auteur":"Louli","ingredients":"**Pour 8 personnes :**\n400 g de haricots secs (à faire tremper la veille)\n300 g de haricots plats mange-tout\n3 tomates\n3 courgettes\n3 oignons\n3 carottes\n2 gros poireaux\n2 belles pommes de terre\n1 bouquet garni\n4 gousses d’ail\n15 feuilles de basilic\n100 g de macaroni ou de grosses pâtes cylindriques\n60 g de parmesan râpé\n7 cuillères à soupe d’huile d’olive\nsel, poivre","preparation":"Mettez les haricots secs trempés à cuire avec 3 l d’eau froide et le bouquet garni pendant 1 h 30. Salez à mi-cuisson.\n\nPelez les oignons, coupez-les en fines rondelles ainsi que le blanc du poireau. Pelez les tomates et découpez les en dés ainsi que tous les autres légumes.\n\nDans un faitout, faites blondir oignons et poireaux avec 4 cuillerées d’huile, ajoutez les tomates écrasées et laissez cuire 10 minutes à feu vif, salez, poivrez.\n\nAjoutez les autres légumes, y compris les haricots secs et leur eau de cuisson, sans le bouquet garni.\n\nCouvrez et laissez cuire 1 h. Vérifiez l’assaisonnement. Faites cuire les macaronis à l’eau.\n\nLe pistou : pelez l’ail et pilez-le. Ajoutez le basilic et continuez de pilez. Incorporez en travaillant à la fourchette le parmesan et le reste d’huile. Hors saison, le basilic est fade, on peut utiliser du pistou en bocal.\n\nVersez la soupe dans une soupière très chaude, ajoutez le macaroni et le pistou. Remuez et servez.","source":"louli"},{"id":"lo_116","titre":"Soupe aux vermicelles de soja et au poulet","auteur":"Louis","ingredients":"**Ingrédients pour 4 personnes:**\nUn morceau de gingembre de 2 à 3 cm .Un oignon\n50 à 100 g de vermicelles transparents ou « cheveux d’anges »\n1 kg de jarret ou de poitrine de bœuf\nUne cuillère et demi à soupe de sel\n2 litres d'eau\n**Un sachet aromatique comprenant :**\n5 clous de girofle\n3 grains de badiane ou anis étoilé (Pharmacie)\n10 graines de coriandre\n100 g de filet de bœuf en tranches très fines\n**Pour servir :**\n2 cuillères à soupe de ciboules hachées, quelques feuilles de coriandre fraîche hachées,\n4 à 6 cuillères à café de nuoc-mâm.","preparation":"Faites griller le gingembre sous un gril 15 minutes jusqu'à ce que l'écorce noircisse.\n\nLaisser refroidir et grattez l'écorce.\n\nRâpez la chair et réservez la.\n\nPréparez l'oignon non épluché de la même façon.\n\nPelez-le lorsqu'il a refroidi et hachez la chair.\n\nRéservez le.\n\nPlacez le bœuf et le sel dans une casserole et couvrez d'eau.\n\nPortez à ébullition et laissez cuire 2 minutes à feu vif, puis égouttez.\n\nRincer bien à l'eau froide, égouttez de nouveau et mettez le bœuf dans une casserole propre.\n\nAjoutez 2 litres d'eau et faites bouillir.\n\nBaisser le feu et laisser mijoter 1h 1/2 à découvert, jusqu'à ce que le liquide réduise d'un tiers.\n\nAjouter les aromates, l'oignon et le gingembre, laissez mijoter une heure de plus et passez le bouillon sur un linge mouillé.\n\nPortez une grande casserole d'eau à ébullition et faites cuire les vermicelles 3 à 5 minutes\n\nPassez au chinois au moment de servir\n\nRépartissez les vermicelles dans quatre bols\n\nY ajouter selon goût :\n\ndu blanc de poulet poché et découpé en longues lamelles , des champignons parfumés mis à tremper, des champignons noirs et des crevettes pochées le tout découpé en lamelles\n\nCouvrez de bouillon brûlant, saupoudrez de ciboule et de coriandre et ajoutez environ une cuillère et demi à soupe de nuoc-mâm, citronnez le tout discrètement.","source":"louli"},{"id":"lo_117","titre":"Taboulé","auteur":"Louli","ingredients":"**Pour 6 personnes :**\n250 g de semoule\n500 g de tomates bien mûres\n2 oignons\n2 cuillerées à soupe de persil haché\n1 cuillerée à soupe de menthe fraîche hachée\n6 cuillerées à soupe d’huile\n1 citrons\n1 concombre\nsel et poivre","preparation":"Râper les tomates et les oignons. Mélangez-les avec la semoule, la menthe, le persil, l’huile, du sel et du poivre. Ajoutez le jus des citrons. Assaisonnez. Ajoutez le concombre en dés et laissez reposer au frais 4 heures.","source":"louli"},{"id":"lo_118","titre":"Tajine de lapin au citron confit","auteur":"Louli","ingredients":"","preparation":"**Louis :**\n**Ingrédients pour 6 personnes :**\n1 lapin entier découpé\n1 citron confit\n4 oignons + 4 gousses d'ail\n50 g de beurre, sel\n1/2 cuillerée à café  de gingembre frais râpé\n1/2 cuillerée à café  de cumin en poudre\n1 bâton de cannelle\n2 g de filaments de safran\n1 bouquet de coriandre\n1 bouquet de persil\nfond de volaille ( à défaut maggi cub)\n**Recette :**\nEmincer les oignons. Ecraser l'ail. Hacher le persil et la coriandre\nDans un grand faitout, faire fondre le beurre avec un peu d'huile d'olive , y faire revenir les morceaux de lapin.\nDès qu'ils sont bien dorés, ajouter les oignons et les faire colorer également\nRéserver le foie\nAjouter le gingembre, le cumin, la cannelle, le safran, l'ail et 30 cl de fond de volaille\nSaler. Bien mélanger le tout et laisser cuire à feu moyen environ 30 mn\nSi nécessaire, ajouter à nouveau 20cl de fond de volaille en cours de cuisson\nEnsuite, ajouter le citron coupé en lamelles, le persil et la coriandre\nAjouter le foie et laisser cuire 10 mn\nOn peut y ajouter dans le dernier quart d'heure, des pommes de terre épluchées et coupées en gros morceaux.\nServir chaud, éventuellement dans un plat à tajine.","source":"louli"},{"id":"lo_119","titre":"Tajine de poulet aux pruneaux","auteur":"Louli","ingredients":"**Pour 4 personnes :**\n1 poulet de 1,5 kg\n200 g de pruneaux\n100 de raisins\n1 oignon\n250 d’oignons blancs à sauce\n1 gousse d’ail\n1 bouquet de persil\n¼ de bouquet de coriandre\n50 g de beurre ou de matière grasse\nsafran\nsel, poivre, piment","preparation":"Faites tremper les pruneaux. Hachez le persil, la coriandre, l’ail et l’oignon. Découpez le poulet en morceaux. Enlevez la peau si vous le désirez.\n\nMettez le beurre dans une cocotte. Faites-y revenir le mélange et les morceaux de poulet 3 minutes à feu vif.\n\nAjoutez le safran, le poivre, le piment et 1 l d’eau chaude. Couvrez aux ¾ et laissez cuire 50 minutes à feu très doux.\n\nAjoutez alors les raisins et les petits oignons épluchés et cuisez encore 20 minutes. Le tajine doit juste frémir.\n\nDénoyautez les pruneaux. Ecrasez en 5 à la fourchette et ajoutez-les au tajine en remuant. Ajoutez les autres pruneaux entiers.\n\nServez avec de la semoule de couscous.","source":"louli"},{"id":"lo_120","titre":"Tartare de dorade à la coriandre","auteur":"Louis","ingredients":"**Ingrédients pour 4 personnes:**\n600g de filets de dorade\n2 échalotes\n2 tomates\n1 cuiller à café de grains de coriandre\n1 bouquet
